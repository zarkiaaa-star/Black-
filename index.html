const DepositModal = ({ onClose, onSuccess }) => {

    setLoading(false);
    onClose();
  };
  return (
    <ModalWrapper onClose={onClose} title="💳 شحن الرصيد">
      <div className="rounded-xl p-3 mb-4 text-center" style={{background:"rgba(212,175,55,0.08)",border:"1px solid rgba(212,175,55,0.25)"}}>

      </div>
      <div className="flex gap-2 mb-4">
        {methods.map(m=>(
          <button key={m.id} onClick={()=>setMethod(m.id)}
            className="flex-1 py-2 rounded-xl text-xs font-bold transition-all border"
            style={method===m.id?{borderColor:"#d4af37",background:"rgba(212,175,55,0.1)",color:"#d4af37"}:{borderColor:"#2a2a2a",color:"#666"}}>
            {m.label}
          </button>
        ))}

        style={{background:"#1a1a1a",border:"1px solid #2a2a2a"}}
        onFocus={e=>e.target.style.borderColor="#d4af37"}
        onBlur={e=>e.target.style.borderColor="#2a2a2a"}/>

        style={{background:loading?"#2a2a2a":"linear-gradient(135deg,#d4af37,#f0cc60)",color:"#000"}}>
        {loading?"⏳ جارٍ المعالجة...":"تأكيد الإيداع ✅"}

};

/* ═══════════════════════════════════════════
   TASK CARD
═══════════════════════════════════════════ */
const TASK_DUR=40;

const TaskCard = ({ task, index, locked, onComplete, onFail }) => {
  const [status,setStatus]=useState("idle");
  const [secs,setSecs]=useState(TASK_DUR);
  const iv=useRef(null);

  useEffect(()=>{
    const onVis=()=>{ if(document.hidden&&status==="running"){ clearInterval(iv.current); setStatus("failed"); onFail(index); }};
    document.addEventListener("visibilitychange",onVis);
    return ()=>document.removeEventListener("visibilitychange",onVis);
  },[status]);

  useEffect(()=>()=>clearInterval(iv.current),[]);

  const start=()=>{
    if(locked||status!=="idle")return;
    setStatus("running"); setSecs(TASK_DUR);
    iv.current=setInterval(()=>setSecs(s=>{
      if(s<=1){ clearInterval(iv.current); setStatus("done"); onComplete(index,task.reward); return 0; }
      return s-1;
    }),1000);
  };

  const cancel=()=>{
    if(status!=="running")return;
    clearInterval(iv.current); setStatus("failed"); onFail(index);
  };

  const pct=((TASK_DUR-secs)/TASK_DUR)*100;

  const cfg={
    idle:   {bc:"#2a2a2a",bg:"#111"},
    running:{bc:"#d4af37",bg:"#1a1200"},
    done:   {bc:"#10b981",bg:"#001a0a"},
    failed: {bc:"#ef4444",bg:"#1a0000"},
  }[status];

  return (
    <div className="rounded-2xl p-4 transition-all duration-300 fade-in"
         style={{background:cfg.bg,border:`1px solid ${cfg.bc}`,opacity:locked&&status==="idle"?0.35:1}}>
      <div className="flex justify-between items-start mb-3">
        <div className="flex-1 ml-3">
          <p className="text-white font-bold text-sm">{task.title}</p>
          <p className="text-gray-500 text-xs mt-0.5">توثيق وتحليل البيانات الاستثمارية</p>
        </div>
        <div className="text-right flex-shrink-0">
          {status==="idle"&&!locked&&<span className="text-xs text-gray-500 block mb-1">⏱ 40ث</span>}
          {status==="running"&&<span className="text-xs font-bold block mb-1 pulse-anim" style={{color:"#d4af37"}}>جارٍ...</span>}
          {status==="done"&&<span className="text-xs font-bold block mb-1" style={{color:"#10b981"}}>✅ تم</span>}
          {status==="failed"&&<span className="text-xs font-bold block mb-1" style={{color:"#ef4444"}}>❌ ملغي</span>}
          <p className="font-black text-base" style={{color:"#10b981"}}>+${task.reward}</p>
        </div>
      </div>

      {status==="running"&&(
        <div className="mb-3">
          <div className="rounded-full overflow-hidden mb-1.5" style={{height:8,background:"#2a2a2a"}}>
            <div className="h-full rounded-full transition-all duration-1000"
                 style={{width:`${pct}%`,background:"linear-gradient(to right,#d4af37,#f0cc60)"}}/>
          </div>
          <p className="text-center text-xs font-black tabular-nums" style={{color:"#d4af37"}}>
            {secs} ثانية متبقية
          </p>
        </div>
      )}

      <div className="flex gap-2">
        {status==="idle"&&!locked&&(
          <button onClick={start} className="flex-1 py-2.5 rounded-xl font-black text-xs transition-all active:scale-95"
            style={{background:"linear-gradient(135deg,#d4af37,#f0cc60)",color:"#000"}}>
            ▶ ابدأ المهمة
          </button>
        )}
        {status==="idle"&&locked&&(
          <div className="flex-1 py-2.5 rounded-xl font-bold text-xs text-center text-gray-600"
               style={{background:"#1a1a1a",border:"1px solid #222"}}>🔒 محجوبة حتى الغد</div>
        )}
        {status==="running"&&(
          <>
            <div className="flex-1 py-2.5 rounded-xl text-xs text-center text-gray-500 font-bold"
                 style={{background:"#1a1a1a"}}>⏳ لا تغادر الصفحة...</div>
            <button onClick={cancel}
              className="w-10 h-10 rounded-xl flex items-center justify-center font-bold text-sm"
              style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.4)",color:"#ef4444"}}>✕</button>
          </>
        )}
        {status==="done"&&(
          <div className="flex-1 py-2.5 rounded-xl text-xs text-center font-bold"
               style={{background:"rgba(16,185,129,0.1)",color:"#10b981",border:"1px solid rgba(16,185,129,0.2)"}}>
            ✅ الربح أُضيف لرصيدك
          </div>
        )}
        {status==="failed"&&(
          <div className="flex-1 py-2.5 rounded-xl text-xs text-center font-bold"
               style={{background:"rgba(239,68,68,0.08)",color:"#ef4444",border:"1px solid rgba(239,68,68,0.2)"}}>
            ❌ خُسر الربح — مهام موقوفة
          </div>
        )}
      </div>
    </div>
  );
};

const UpgradesPage = ({ user, setUser }) => {
  const [sel,setSel]=useState(null);

    if(user.package.id===pkg.id)return;
    if(pkg.price>0&&user.balance<pkg.price){ setToast({msg:"❌ رصيد غير كافٍ — يرجى شحن الرصيد أولاً",type:"error"}); return; }
    setSel(pkg);
  };

  const confirm=()=>{
    setUser(u=>({...u,package:sel,balance:sel.price===0?u.balance:+(u.balance-sel.price).toFixed(2)}));
    setToast({msg:`✅ تم الترقية إلى ${sel.name} بنجاح!`,type:"success"});
    setSel(null);
  };

  return (
    <div className="p-4 pb-28 space-y-4 page-transition scroll-hide overflow-y-auto">

          <div key={pkg.id} className="relative rounded-3xl overflow-hidden transition-all duration-300"
               style={{border:`1px solid ${isActive?"#d4af37":"#2a2a2a"}`,transform:isActive?"scale(1.01)":"scale(1)"}}>
            {/* BG */}
            <div className={`absolute inset-0 bg-gradient-to-br ${pkg.color} opacity-25`}/>

              {/* Header */}

                  <h3 className="text-white font-black text-xl">{pkg.name}</h3>
                  <p className="font-black text-2xl" style={{color:pkg.accent}}>{pkg.priceLabel}</p>

               style={{borderColor:pkg.accent+"50",color:pkg.accent,background:pkg.accent+"12"}}>
            {pkg.icon} {pkg.name} Member
          </div>
          <GoldDivider/>
          <div className="grid grid-cols-3 gap-2 text-sm">
            {[
              {label:"الرصيد",    value:`$${fmt(user.balance)}`,   color:"#d4af37"},
              {label:"الباقة",    value:pkg.name,                  color:pkg.accent},
              {label:"الانضمام",  value:user.joinDate,             color:"#10b981"},
            ].map((s,i)=>(
              <div key={i} className="rounded-xl p-3" style={{background:"#1a1a1a"}}>
                <p className="text-xs text-gray-500">{s.label}</p>
                <p className="font-black text-sm mt-0.5" style={{color:s.color}}>{s.value}</p>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Verification Badge */}
      <div className="flex items-center gap-3 rounded-2xl p-4"
           style={{background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.25)"}}>
        <div className="w-10 h-10 rounded-full flex items-center justify-center text-lg"
             style={{background:"rgba(16,185,129,0.15)"}}>✅</div>
        <div>
          <p className="text-white font-bold text-sm">حساب موثق رسمياً</p>
          <p className="text-xs text-gray-500">NYSE: BLK — EIN: 32-0174431 — AES-256</p>
        </div>
        <div className="mr-auto">
          <div className="w-2 h-2 rounded-full pulse-anim" style={{background:"#10b981"}}/>
        </div>
      </div>

      {/* Menu Items */}
      <div className="space-y-2.5">
        {items.map((it,i)=>(
          <button key={i} onClick={it.fn}
            className="w-full flex items-center gap-4 rounded-2xl p-4 transition-all active:scale-[0.98]"
            style={{background:"#111",border:"1px solid #1e1e1e"}}>
            <div className="w-11 h-11 rounded-xl flex items-center justify-center text-xl flex-shrink-0 border"
                 style={{color:it.color,borderColor:it.color+"40",background:it.color+"12"}}>
              {it.icon}
            </div>
            <div className="text-right flex-1">
              <p className="text-white font-bold text-sm">{it.label}</p>
              <p className="text-gray-600 text-xs mt-0.5">{it.sub}</p>
            </div>
            <span className="text-gray-600 text-xl">›</span>
          </button>
        ))}
      </div>

      {/* Version */}
      <div className="text-center py-2">
        <p className="text-gray-700 text-xs">BlackRock Task Earn v2.0.0</p>
        <p className="text-gray-800 text-xs">© 2025 BlackRock, Inc. All rights reserved.</p>
      </div>

      {/* Logout */}
      <button className="w-full flex items-center justify-center gap-2 py-3.5 rounded-2xl font-bold text-sm"
        style={{border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.06)",color:"#f87171"}}>
        🚪 تسجيل الخروج
      </button>

      {showSec&&<SecurityModal onClose={()=>setShowSec(false)}/>}
      {showCo&&<CompanyModal onClose={()=>setShowCo(false)}/>}
    </div>
  );
};

/* ═══════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════ */
const NAV=[
  {id:"home",     icon:"🏠", label:"الرئيسية"},
  {id:"tasks",    icon:"⚡", label:"المهام"},
  {id:"upgrades", icon:"🚀", label:"الترقيات"},
  {id:"profile",  icon:"👤", label:"حسابي"},
];

const BottomNav = ({ active, setActive }) => (
  <div className="fixed bottom-0 left-0 right-0 z-40 px-3 pb-3">
    <div className="max-w-md mx-auto rounded-3xl shadow-2xl"
         style={{background:"rgba(10,10,10,0.97)",backdropFilter:"blur(20px)",border:"1px solid #2a2a2a"}}>
      <div className="flex justify-around items-center py-2">
        {NAV.map(item=>{
          const on=active===item.id;
          return (
            <button key={item.id} onClick={()=>setActive(item.id)}
              className="flex flex-col items-center gap-0.5 px-5 py-2 rounded-2xl transition-all duration-200 active:scale-90"
              style={on?{background:"rgba(212,175,55,0.1)"}:{}}>
              <span className="text-2xl transition-all duration-200" style={{opacity:on?1:0.4,transform:on?"scale(1.15)":"scale(1)"}}>
                {item.icon}
              </span>
              <span className="text-xs font-bold transition-all duration-200"
                    style={{color:on?"#d4af37":"#444"}}>
                {item.label}
              </span>
              {on&&<div className="w-1 h-1 rounded-full" style={{background:"#d4af37"}}/>}
            </button>
          );
        })}
      </div>
    </div>
  </div>
);

/* ═══════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════ */
const TITLES={
  home:     {main:"BlackRock",         sub:"NYSE: BLK — Task Earn Platform"},
  tasks:    {main:"المهام اليومية",    sub:"⚡ Daily Task Engine"},
  upgrades: {main:"خطط الترقية",       sub:"🚀 Upgrade & Maximize Earnings"},
  profile:  {main:"حسابي",            sub:"👤 My Account & Settings"},
};

const TopBar = ({ page }) => {
  const t=TITLES[page]||TITLES.home;
  return (
    <div className="sticky top-0 z-30 px-4 py-3 flex items-center justify-between"
         style={{background:"rgba(10,10,10,0.97)",backdropFilter:"blur(20px)",borderBottom:"1px solid #1a1a1a"}}>
      <div>
        <h1 className="font-black text-lg leading-none" style={{color:"#d4af37"}}>{t.main}</h1>
        <p className="text-gray-600" style={{fontSize:10}}>{t.sub}</p>
      </div>
      <div className="flex items-center gap-2 rounded-xl px-3 py-1.5" style={{background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.2)"}}>
        <div className="w-2 h-2 rounded-full pulse-anim" style={{background:"#10b981"}}/>
        <span className="text-xs font-bold" style={{color:"#10b981"}}>LIVE</span>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════
   SPLASH SCREEN
═══════════════════════════════════════════ */
const Splash = ({ onDone }) => {
  const [p,setP]=useState(0);
  useEffect(()=>{
    const t=setInterval(()=>setP(v=>{ if(v>=100){ clearInterval(t); setTimeout(onDone,300); return 100; } return v+2; }),40);
    return ()=>clearInterval(t);
  },[]);
  return (
    <div className="fixed inset-0 flex flex-col items-center justify-center z-[999]"
         style={{background:"#0a0a0a"}}>
      <div className="text-center fade-in">
        <div className="w-24 h-24 rounded-3xl flex items-center justify-center text-5xl mx-auto mb-5 glow-anim"
             style={{background:"linear-gradient(135deg,#1a1200,#2a2000)",border:"2px solid #d4af37"}}>
          ⬛
        </div>
        <h1 className="font-black text-3xl mb-1" style={{color:"#d4af37"}}>BlackRock</h1>
        <p className="text-gray-500 text-sm mb-2">Task Earn Platform</p>
        <p className="text-gray-700 text-xs mb-10">NYSE: BLK — EIN: 32-0174431</p>
        <div className="w-48 h-1.5 rounded-full overflow-hidden mx-auto" style={{background:"#1a1a1a"}}>
          <div className="h-full rounded-full transition-all duration-100"
               style={{width:`${p}%`,background:"linear-gradient(to right,#d4af37,#f0cc60)"}}/>
        </div>
        <p className="text-gray-600 text-xs mt-3">{p}%</p>
        <p className="text-gray-700 text-xs mt-2">جارٍ التحميل...</p>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════ */
const App = () => {
  const [ready,setReady]=useState(false);
  const [page,setPage]=useState("home");
  const [user,setUser]=useState(INIT_USER);

  if(!ready) return <Splash onDone={()=>setReady(true)}/>;

  const renderPage=()=>{
    switch(page){
      case "home":     return <HomePage     user={user} setUser={setUser}/>;
      case "tasks":    return <TasksPage    user={user} setUser={setUser}/>;
      case "upgrades": return <UpgradesPage user={user} setUser={setUser}/>;
      case "profile":  return <ProfilePage  user={user}/>;
      default:         return null;
    }
  };

  return (
    <div className="min-h-screen max-w-md mx-auto relative" style={{background:"#0a0a0a",color:"#fff",fontFamily:"Cairo,sans-serif"}} dir="rtl">
      <TopBar page={page}/>
      <main style={{minHeight:"calc(100vh - 60px)"}}>{renderPage()}</main>
      <BottomNav active={page} setActive={setPage}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
