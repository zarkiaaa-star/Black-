<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>BlackRock</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#09090B;
  --bg2:#111113;
  --bg3:#18181B;
  --border:#27272A;
  --border2:rgba(255,255,255,0.06);
  --text:#FAFAFA;
  --text2:#A1A1AA;
  --text3:#71717A;
  --gold:#C9A84C;
  --gold2:#E8C97A;
  --gold-dim:rgba(201,168,76,0.12);
  --green:#22C55E;
  --green-dim:rgba(34,197,94,0.1);
  --red:#EF4444;
  --red-dim:rgba(239,68,68,0.1);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Cairo','Inter',sans-serif;overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:0px}

/* BLK Logo Font */
.logo-font{font-family:'Inter',sans-serif;font-weight:800;letter-spacing:-0.5px}

/* Typography */
.t-hero{font-size:2rem;font-weight:800;line-height:1.1;letter-spacing:-0.5px}
.t-xl{font-size:1.25rem;font-weight:700;letter-spacing:-0.3px}
.t-lg{font-size:1rem;font-weight:600}
.t-md{font-size:0.875rem;font-weight:500}
.t-sm{font-size:0.75rem;font-weight:400;color:var(--text2)}
.t-xs{font-size:0.7rem;font-weight:400;color:var(--text3)}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.card-inner{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;overflow:hidden}

/* Divider */
.divider{height:1px;background:var(--border);width:100%}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:0.65rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}

/* Gold accent */
.gold{color:var(--gold2)}
.gold-bg{background:linear-gradient(135deg,#C9A84C,#F0D080)}

/* Animated elements */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes carouselMove{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.anim-up{animation:fadeUp .35s ease both}
.anim-fade{animation:fadeIn .25s ease both}
.anim-pulse{animation:pulse 2s ease infinite}
.anim-spin{animation:spin .8s linear infinite}

/* Bottom Nav */
.bottom-nav{
  background:rgba(9,9,11,0.95);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom,0px);
  flex-shrink:0;
}

/* Page scroll area */
.page-scroll{flex:1;overflow-y:auto;overflow-x:hidden}

/* Input */
.blk-input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;color:var(--text);font-size:0.9rem;
  font-family:'Cairo',sans-serif;outline:none;transition:border-color .2s;
}
.blk-input:focus{border-color:var(--gold)}
.blk-input::placeholder{color:var(--text3)}

/* Button */
.btn-gold{
  background:linear-gradient(135deg,#B8923A,#D4AF37,#C9A84C);
  color:#000;font-weight:800;border-radius:12px;border:none;
  transition:opacity .2s,transform .1s;cursor:pointer;
}
.btn-gold:active{opacity:.85;transform:scale(0.98)}

.btn-outline{
  background:transparent;border:1px solid var(--border);color:var(--text2);
  border-radius:12px;cursor:pointer;transition:all .2s;font-family:'Cairo',sans-serif;
}
.btn-outline:hover{border-color:var(--gold);color:var(--text)}

/* Modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);
  backdrop-filter:blur(12px);z-index:999;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-sheet{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:24px 24px 0 0;width:100%;max-width:430px;
  max-height:88vh;overflow-y:auto;
  padding-bottom:env(safe-area-inset-bottom,24px);
  animation:fadeUp .3s ease;
}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:9px;margin:14px auto 20px}

/* Top bar */
.topbar{
  background:var(--bg);border-bottom:1px solid var(--border);
  flex-shrink:0;padding-top:env(safe-area-inset-top,0px);
}

/* Carousel */
.carousel-wrapper{overflow:hidden;border-radius:14px}
.carousel-track{display:flex;animation:carouselMove 30s linear infinite;width:max-content}
.carousel-track:hover{animation-play-state:paused}

/* Progress ring */
.ring-bg{fill:none;stroke:var(--bg3);stroke-width:5}
.ring-fill{fill:none;stroke-width:5;stroke-linecap:round;stroke-dasharray:220;transition:stroke-dashoffset 1s linear}

/* Tag line */
.tag-live{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:999px;
  background:var(--green-dim);border:1px solid rgba(34,197,94,.2);
  color:var(--green);font-size:.65rem;font-weight:700;letter-spacing:.5px;
}

/* Stat box */
.stat-box{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:14px}

/* List row */
.list-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border2)}
.list-row:last-child{border-bottom:none}

/* Package gradient map */
.pkg-starter{background:linear-gradient(135deg,#1c1c1e,#28282C)}
.pkg-nexus{background:linear-gradient(135deg,#0D1B3E,#132455)}
.pkg-orbit{background:linear-gradient(135deg,#1A0D3E,#2A1555)}
.pkg-apex{background:linear-gradient(135deg,#2D1A00,#3D2500)}
.pkg-stellar{background:linear-gradient(135deg,#0D2E1A,#0A3D22)}
.pkg-supernova{background:linear-gradient(135deg,#2D0D0D,#3D1010)}
.pkg-galaxy{background:linear-gradient(135deg,#1F0A2D,#2D0F3F)}

/* Number counter animation */
@keyframes countUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.count-anim{animation:countUp .4s ease}

/* Toast */
.toast-wrap{
  position:fixed;top:calc(env(safe-area-inset-top,0px) + 60px);
  left:50%;transform:translateX(-50%);z-index:9999;
  min-width:260px;max-width:340px;
  animation:slideDown .3s ease;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ── DATA ── */
const PACKAGES = [
  {id:'starter',  name:'Starter',   price:0,     tasks:5,  daily:0.17,  days:3,  colorA:'#9CA3AF',colorB:'#6B7280',accent:'#D1D5DB'},
  {id:'nexus',    name:'NEXUS',     price:28,    tasks:5,  daily:0.86,  days:30, colorA:'#3B82F6',colorB:'#1D4ED8',accent:'#93C5FD'},
  {id:'orbit',    name:'ORBIT',     price:106.4, tasks:10, daily:3.44,  days:30, colorA:'#8B5CF6',colorB:'#6D28D9',accent:'#C4B5FD'},
  {id:'apex',     name:'APEX',      price:380,   tasks:25, daily:13.1,  days:30, colorA:'#C9A84C',colorB:'#92640A',accent:'#F0D080'},
  {id:'stellar',  name:'STELLAR',   price:1200,  tasks:50, daily:44.4,  days:30, colorA:'#10B981',colorB:'#065F46',accent:'#6EE7B7'},
  {id:'supernova',name:'SUPERNOVA', price:3120,  tasks:80, daily:124.8, days:30, colorA:'#EF4444',colorB:'#991B1B',accent:'#FCA5A5'},
  {id:'galaxy',   name:'GALAXY',    price:7800,  tasks:130,daily:339,   days:30, colorA:'#A855F7',colorB:'#7E22CE',accent:'#D8B4FE'},
];

const NEWS = [
  {img:'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=600&q=80',title:'أسواق المال العالمية',sub:'BlackRock Report'},
  {img:'https://images.unsplash.com/photo-1590283603385-17ffb3a7f29f?w=600&q=80',title:'إدارة الأصول 2025',sub:'Investment Update'},
  {img:'https://images.unsplash.com/photo-1642790106117-e829e14a795f?w=600&q=80',title:'محافظ الاستثمار',sub:'Portfolio Strategy'},
  {img:'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&q=80',title:'نمو رأس المال',sub:'Capital Growth'},
  {img:'https://images.unsplash.com/photo-1559526324-4b87b5e36e44?w=600&q=80',title:'أسواق السندات',sub:'Fixed Income'},
  {img:'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=600&q=80',title:'موارد الطاقة',sub:'Energy Markets'},
];

/* ── STORAGE ── */
const S = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
const today=()=>new Date().toISOString().split('T')[0];

/* ── ICONS ── */
const Icon=({name,size=20,color='currentColor'})=>{
  const s={width:size,height:size,display:'inline-block',flexShrink:0};
  const icons={
    home:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    task:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
    upgrade:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
    profile:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    shield:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
    building:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><line x1="9" y1="22" x2="9" y2="12"/><line x1="15" y1="22" x2="15" y2="12"/><line x1="9" y1="12" x2="15" y2="12"/></svg>,
    arrow:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>,
    check:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
    plus:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    minus:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    lock:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>,
    star:<svg style={s} viewBox="0 0 24 24" fill={color} stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    globe:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>,
    close:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    info:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
    wallet:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 000 4h4v-4z"/></svg>,
    chart:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
    users:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,
  };
  return icons[name]||null;
};

/* ── TOAST ── */
function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t)},[]);
  const cfg={
    success:{bg:'rgba(34,197,94,0.12)',border:'rgba(34,197,94,0.3)',color:'#4ADE80',icon:'✓'},
    error:  {bg:'rgba(239,68,68,0.12)', border:'rgba(239,68,68,0.3)', color:'#F87171',icon:'✕'},
    info:   {bg:'rgba(201,168,76,0.12)',border:'rgba(201,168,76,0.3)',color:'#F0D080',icon:'i'},
  }[type]||{bg:'rgba(255,255,255,0.08)',border:'rgba(255,255,255,0.15)',color:'#fff',icon:'i'};
  return(
    <div className="toast-wrap">
      <div style={{background:cfg.bg,border:`1px solid ${cfg.border}`,borderRadius:14,padding:'12px 16px',display:'flex',alignItems:'center',gap:10,backdropFilter:'blur(20px)'}}>
        <div style={{width:22,height:22,borderRadius:'50%',background:cfg.bg,border:`1px solid ${cfg.border}`,display:'flex',alignItems:'center',justifyContent:'center',color:cfg.color,fontSize:11,fontWeight:800,flexShrink:0}}>{cfg.icon}</div>
        <span style={{fontSize:'0.83rem',color:'#F4F4F5',fontWeight:500}}>{msg}</span>
      </div>
    </div>
  );
}

/* ── SHEET MODAL ── */
function Sheet({title,onClose,children}){
  return(
    <div className="modal-bg anim-fade" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-sheet">
        <div className="modal-handle"/>
        <div style={{padding:'0 20px 8px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
          <span style={{fontSize:'1rem',fontWeight:700,color:'#FAFAFA'}}>{title}</span>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:'50%',border:'1px solid var(--border)',background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
            <Icon name="close" size={14} color="var(--text2)"/>
          </button>
        </div>
        <div style={{padding:'12px 20px 20px'}}>{children}</div>
      </div>
    </div>
  );
}

/* ── CAROUSEL ── */
function NewsCarousel(){
  const items=[...NEWS,...NEWS];
  return(
    <div className="carousel-wrapper" style={{height:160}}>
      <div className="carousel-track" style={{gap:10}}>
        {items.map((n,i)=>(
          <div key={i} style={{width:240,height:160,borderRadius:14,overflow:'hidden',position:'relative',flexShrink:0}}>
            <img src={n.img} alt={n.title} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>{e.target.src='https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=400'}}/>
            <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 55%)'}}/>
            <div style={{position:'absolute',bottom:12,right:12,left:12}}>
              <div style={{fontSize:'0.65rem',color:'var(--gold2)',fontWeight:700,marginBottom:3,letterSpacing:.5,textTransform:'uppercase'}}>{n.sub}</div>
              <div style={{fontSize:'0.8rem',color:'#fff',fontWeight:600,lineHeight:1.3}}>{n.title}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   HOME PAGE
══════════════════════════════════════ */
function HomePage({user,setUser,showToast}){
  const [sheet,setSheet]=useState(null);
  const [amount,setAmount]=useState('');
  const pkg=PACKAGES.find(p=>p.id===user.packageId)||PACKAGES[0];

  const doDeposit=()=>{
    const v=parseFloat(amount);
    if(!v||v<=0){showToast('أدخل مبلغاً صحيحاً','error');return}
    const u={...user,balance:+(user.balance+v).toFixed(2),
      activity:[...(user.activity||[]),{label:`إيداع`,amount:v,date:today()}]};
    setUser(u);S.set('blk_u',u);
    showToast(`تم إيداع $${v.toFixed(2)}‎ بنجاح`,'success');
    setSheet(null);setAmount('');
  };
  const doWithdraw=()=>{
    const v=parseFloat(amount);
    if(!v||v<=0){showToast('أدخل مبلغاً صحيحاً','error');return}
    if(v>user.balance){showToast('الرصيد غير كافٍ','error');return}
    const u={...user,balance:+(user.balance-v).toFixed(2),
      activity:[...(user.activity||[]),{label:`سحب`,amount:-v,date:today()}]};
    setUser(u);S.set('blk_u',u);
    showToast(`طلب سحب $${v.toFixed(2)}‎ قيد المعالجة`,'success');
    setSheet(null);setAmount('');
  };

  return(
    <div className="page-scroll anim-up" style={{padding:'0 0 24px'}}>

      {/* Balance Hero */}
      <div style={{padding:'24px 20px 20px',borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <div>
            <div className="t-xs" style={{marginBottom:4,letterSpacing:1,textTransform:'uppercase'}}>إجمالي الرصيد</div>
            <div style={{fontSize:'2.6rem',fontWeight:800,color:'#FAFAFA',lineHeight:1,letterSpacing:'-1px',fontFamily:'Inter,sans-serif'}} className="count-anim">
              <span style={{fontSize:'1.4rem',fontWeight:600,color:'var(--text2)',marginLeft:4}}>$</span>
              {user.balance.toFixed(2)}
            </div>
            <div style={{fontSize:'0.78rem',color:'var(--text3)',marginTop:6}}>
              ≈ {(user.balance*250).toLocaleString('ar-DZ')} دج
            </div>
          </div>
          <div style={{textAlign:'left'}}>
            <div className="tag-live"><span className="anim-pulse" style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block'}}></span>LIVE</div>
            <div style={{fontSize:'0.72rem',color:'var(--text3)',marginTop:6,textAlign:'center'}}>NYSE: BLK</div>
          </div>
        </div>

        {/* Action Buttons */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <button className="btn-gold" style={{padding:'14px',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontSize:'0.88rem'}}
            onClick={()=>{setSheet('deposit');setAmount('')}}>
            <Icon name="plus" size={16} color="#000"/>
            شحن الرصيد
          </button>
          <button className="btn-outline" style={{padding:'14px',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontSize:'0.88rem',fontFamily:'Cairo,sans-serif'}}
            onClick={()=>{setSheet('withdraw');setAmount('')}}>
            <Icon name="minus" size={16}/>
            سحب الأرباح
          </button>
        </div>
      </div>

      {/* Stats Row */}
      <div style={{padding:'16px 20px 0',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        {[
          {label:'مهام اليوم', value:pkg.tasks,       icon:'task',  color:'var(--gold2)'},
          {label:'ربح يومي',  value:`$${pkg.daily}`, icon:'chart', color:'var(--green)'},
          {label:'الباقة',    value:pkg.name,         icon:'star',  color:pkg.colorA},
        ].map((s,i)=>(
          <div key={i} className="stat-box" style={{textAlign:'center'}}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:6}}>
              <Icon name={s.icon} size={16} color={s.color}/>
            </div>
            <div style={{fontSize:'0.88rem',fontWeight:700,color:s.color,marginBottom:2}}>{s.value}</div>

/* ══════════════════════════════════════
   TASKS PAGE
══════════════════════════════════════ */
function TasksPage({user,setUser,showToast}){
  const pkg=PACKAGES.find(p=>p.id===user.packageId)||PACKAGES[0];
  const perTask=+(pkg.daily/pkg.tasks).toFixed(5);

  const initTS=()=>{
    const s=S.get('blk_ts',{});
    return s.date===today()?s:{date:today(),done:0,blocked:false};
  };
  const [ts,setTS_]=useState(initTS);
  const [running,setRunning]=useState(false);
  const [sec,setSec]=useState(40);
  const [activeIdx,setActiveIdx]=useState(null);
  const cancelled=useRef(false);
  const timer=useRef(null);

  const saveTS=v=>{setTS_(v);S.set('blk_ts',v)};

  const startTask=()=>{
    if(ts.blocked){showToast('مهامك محجوبة حتى الغد ⛔','error');return}
    if(ts.done>=pkg.tasks){showToast('أكملت جميع مهامك اليوم 🎉','info');return}
    cancelled.current=false;
    setSec(40);setRunning(true);setActiveIdx(ts.done);
    let t=40;
    timer.current=setInterval(()=>{
      t--;setSec(t);
      if(t<=0){clearInterval(timer.current);if(!cancelled.current)finishTask()}
    },1000);
  };

  const finishTask=()=>{
    setRunning(false);setActiveIdx(null);
    const nts={...ts,done:ts.done+1};saveTS(nts);
    const nu={...user,
      balance:+(user.balance+perTask).toFixed(5),
      totalEarned:+((user.totalEarned||0)+perTask).toFixed(5),
      activity:[...(user.activity||[]),{label:`مهمة #${nts.done} — ${pkg.name}`,amount:perTask,date:today()}]
    };
    setUser(nu);S.set('blk_u',nu);
    showToast(`✓ اكتملت المهمة +$${perTask}`,'success');
  };

  const cancelTask=()=>{
    if(!running)return;
    cancelled.current=true;
    clearInterval(timer.current);
    setRunning(false);setActiveIdx(null);setSec(40);
    saveTS({...ts,blocked:true});
    showToast('ألغيت المهمة — حُجبت مهامك حتى الغد','error');
  };

  useEffect(()=>()=>clearInterval(timer.current),[]);

  const circumference=220;
  const dashOffset=circumference-(circumference*((40-sec)/40));
  const pct=Math.round((ts.done/pkg.tasks)*100);

  return(
    <div className="page-scroll anim-up">

      {/* Header */}
      <div style={{padding:'20px 20px 16px',borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div className="t-xs" style={{marginBottom:4,letterSpacing:1,textTransform:'uppercase'}}>المهام اليومية</div>
            <div style={{fontSize:'1.5rem',fontWeight:800,color:'#FAFAFA',letterSpacing:'-0.5px'}}>
              {ts.done}<span style={{color:'var(--text3)',fontSize:'1rem',fontWeight:500}}>/{pkg.tasks}</span>
            </div>
          </div>
          {/* Circular progress */}
          <div style={{position:'relative',width:72,height:72}}>
            <svg width="72" height="72" style={{transform:'rotate(-90deg)'}}>
              <circle cx="36" cy="36" r="30" className="ring-bg"/>
              <circle cx="36" cy="36" r="30" className="ring-fill"
                style={{stroke:ts.blocked?'var(--red)':pkg.colorA,strokeDashoffset:circumference-(circumference*(ts.done/pkg.tasks))*1.38}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{fontSize:'0.9rem',fontWeight:800,color:ts.blocked?'var(--red)':pkg.colorA}}>{pct}%</span>
            </div>
          </div>
        </div>

        {/* Mini stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginTop:16}}>
          {[
            {l:'المكتملة',  v:ts.done,                c:'var(--green)'},
            {l:'المتبقية',  v:Math.max(0,pkg.tasks-ts.done), c:'var(--gold2)'},
            {l:'ربح/مهمة', v:`$${perTask}`,          c:'var(--text)'},
          ].map((s,i)=>(
            <div key={i} className="card-inner" style={{padding:'10px',textAlign:'center'}}>
              <div style={{fontSize:'0.9rem',fontWeight:800,color:s.c}}>{s.v}</div>
              <div className="t-xs" style={{marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Blocked */}
      {ts.blocked&&(
        <div style={{margin:'16px 20px'}}>
          <div style={{background:'var(--red-dim)',border:'1px solid rgba(239,68,68,.25)',borderRadius:16,padding:'20px',textAlign:'center'}}>
            <div style={{width:48,height:48,borderRadius:'50%',background:'rgba(239,68,68,.15)',border:'1px solid rgba(239,68,68,.3)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
              <Icon name="lock" size={20} color="var(--red)"/>
            </div>
            <div style={{fontSize:'0.95rem',fontWeight:700,color:'var(--red)',marginBottom:6}}>المهام محجوبة</div>
            <div style={{fontSize:'0.78rem',color:'var(--text3)'}}>ألغيت مهمة قبل اكتمالها. ستُفتح مهامك في اليوم التالي.</div>
          </div>
        </div>
      )}

      {/* All done */}
      {!ts.blocked&&ts.done>=pkg.tasks&&(
        <div style={{margin:'16px 20px'}}>
          <div style={{background:'var(--green-dim)',border:'1px solid rgba(34,197,94,.25)',borderRadius:16,padding:'20px',textAlign:'center'}}>
            <div style={{fontSize:'2rem',marginBottom:8}}>🎉</div>
            <div style={{fontSize:'0.95rem',fontWeight:700,color:'var(--green)',marginBottom:4}}>أنجزت جميع مهام اليوم</div>
            <div style={{fontSize:'1.1rem',fontWeight:800,color:'var(--gold2)'}}>+${pkg.daily.toFixed(2)}</div>
            <div style={{fontSize:'0.72rem',color:'var(--text3)',marginTop:2}}>تحققت في رصيدك</div>
          </div>
        </div>
      )}

      {/* Timer */}
      {running&&(
        <div style={{margin:'16px 20px',padding:'24px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:20,textAlign:'center'}}>
          <div style={{position:'relative',width:120,height:120,margin:'0 auto 16px'}}>
            <svg width="120" height="120" style={{transform:'rotate(-90deg)'}}>
              <circle cx="60" cy="60" r="52" fill="none" stroke="var(--bg3)" strokeWidth="6"/>
              <circle cx="60" cy="60" r="52" fill="none"
                stroke="var(--green)" strokeWidth="6" strokeLinecap="round"
                strokeDasharray="327" strokeDashoffset={327-(327*((40-sec)/40))}
                style={{transition:'stroke-dashoffset 1s linear'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
              <span style={{fontSize:'2.2rem',fontWeight:900,color:'#fff',fontFamily:'Inter,sans-serif',lineHeight:1}}>{sec}</span>
              <span style={{fontSize:'0.65rem',color:'var(--text3)',letterSpacing:.5}}>ثانية</span>
            </div>
          </div>
          <div style={{fontSize:'0.85rem',color:'var(--text2)',marginBottom:4}}>جارٍ تنفيذ المهمة <span style={{color:'var(--gold2)',fontWeight:700}}>#{(activeIdx||0)+1}</span></div>
          <div style={{fontSize:'0.72rem',color:'var(--text3)',marginBottom:20}}>لا تغادر الصفحة قبل اكتمال المهمة</div>
          <button onClick={cancelTask}
            style={{padding:'11px 24px',borderRadius:10,background:'var(--red-dim)',border:'1px solid rgba(239,68,68,.3)',color:'var(--red)',fontSize:'0.82rem',fontWeight:700,cursor:'pointer',fontFamily:'Cairo,sans-serif',display:'inline-flex',alignItems:'center',gap:6}}>
            <Icon name="close" size={13} color="var(--red)"/>
            إلغاء المهمة
          </button>
        </div>
      )}

      {/* Task List */}
      {!running&&(
        <div style={{padding:'8px 20px 24px'}}>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {Array.from({length:pkg.tasks},(_,i)=>{
              const done=i<ts.done;
              const cur=i===ts.done&&!ts.blocked;
              return(
                <div key={i} style={{
                  display:'flex',alignItems:'center',gap:12,padding:'14px 16px',
                  background:done?'rgba(34,197,94,0.04)':cur?'rgba(201,168,76,0.06)':'var(--bg2)',
                  border:`1px solid ${done?'rgba(34,197,94,0.15)':cur?'rgba(201,168,76,0.25)':'var(--border)'}`,
                  borderRadius:14,transition:'all .2s',
                }}>
                  <div style={{width:36,height:36,borderRadius:10,
                    background:done?'var(--green-dim)':cur?'var(--gold-dim)':'var(--bg3)',
                    border:`1px solid ${done?'rgba(34,197,94,.25)':cur?'rgba(201,168,76,.35)':'var(--border2)'}`,
                    display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    {done
                      ?<Icon name="check" size={15} color="var(--green)"/>
                      :cur
                      ?<Icon name="task" size={14} color="var(--gold)"/>
                      :<span style={{fontSize:'0.72rem',color:'var(--text3)',fontWeight:700}}>{i+1}</span>
                    }
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'0.83rem',fontWeight:600,color:done?'var(--green)':cur?'var(--gold2)':'var(--text3)'}}>
                      {done?'مكتملة':cur?'جاهزة للبدء':`مهمة ${i+1}`}
                    </div>
                    <div style={{fontSize:'0.68rem',color:'var(--text3)',marginTop:1}}>+${perTask}</div>
                  </div>
                  {cur&&(
                    <button onClick={startTask} className="btn-gold"
                      style={{padding:'9px 18px',fontSize:'0.8rem',borderRadius:10,display:'flex',alignItems:'center',gap:6}}>
                      ابدأ
                    </button>
                  )}
                  {done&&<div style={{fontSize:'0.72rem',color:'var(--green)',fontWeight:700}}>+${perTask}</div>}
                </div>
              );
            })}
          </div>

          {/* Warning */}
          <div style={{marginTop:16,padding:'14px',borderRadius:14,background:'rgba(239,68,68,0.05)',border:'1px solid rgba(239,68,68,0.15)',display:'flex',gap:10}}>
            <Icon name="info" size={16} color="var(--red)"/>
            <p style={{fontSize:'0.75rem',color:'var(--text3)',lineHeight:1.6}}>إلغاء أي مهمة أثناء تشغيلها يؤدي إلى خسارة ربحها وحجب جميع مهامك حتى اليوم التالي.</p>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   UPGRADES PAGE
══════════════════════════════════════ */
function UpgradesPage({user,setUser,showToast}){
  const [confirm,setConfirm]=useState(null);

  const buy=pkg=>{
    if(pkg.id==='starter'){showToast('هذه الباقة فعّالة بالفعل','info');return}
    if(user.balance<pkg.price){showToast('رصيدك غير كافٍ','error');return}
    const u={...user,balance:+(user.balance-pkg.price).toFixed(2),packageId:pkg.id,
      activity:[...(user.activity||[]),{label:`ترقية → ${pkg.name}`,amount:-pkg.price,date:today()}]};
    setUser(u);S.set('blk_u',u);
    showToast(`تمت الترقية إلى ${pkg.name} 🚀`,'success');
    setConfirm(null);
  };

  return(
    <div className="page-scroll anim-up">
      <div style={{padding:'20px 20px 8px',borderBottom:'1px solid var(--border)'}}>
        <div className="t-xs" style={{letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>خطط الاستثمار</div>

      </div>

      <div style={{padding:'16px 20px 32px',display:'flex',flexDirection:'column',gap:12}}>
        {PACKAGES.map(pkg=>{
          const isCur=pkg.id===user.packageId;
          return(
            <div key={pkg.id} style={{
              background:'var(--bg2)',border:`1px solid ${isCur?pkg.colorA+'60':'var(--border)'}`,

              transition:'border-color .2s',
            }}>

              <div style={{height:3,background:`linear-gradient(90deg,${pkg.colorA},${pkg.colorB})`}}/>

              <div style={{padding:'16px 16px 14px'}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                      <span style={{fontSize:'1.1rem',fontWeight:800,color:pkg.accent,fontFamily:'Inter,sans-serif',letterSpacing:'-0.3px'}}>{pkg.name}</span>
                      {isCur&&<span className="badge" style={{background:`${pkg.colorA}20`,color:pkg.accent,border:`1px solid ${pkg.colorA}40`}}>ACTIVE</span>}
                    </div>
                    <div style={{fontSize:'1.6rem',fontWeight:900,color:'#FAFAFA',fontFamily:'Inter,sans-serif',letterSpacing:'-0.5px'}}>
                      {pkg.price===0?'Free':`$${pkg.price.toLocaleString()}`}
                    </div>
                    {pkg.price>0&&<div style={{fontSize:'0.7rem',color:'var(--text3)',marginTop:1}}>{(pkg.price*250).toLocaleString('ar-DZ')} دج</div>}
                  </div>
                  <div style={{textAlign:'left'}}>
                    <div style={{fontSize:'0.65rem',color:'var(--text3)',letterSpacing:.5,textTransform:'uppercase',marginBottom:4}}>{pkg.days} يوم</div>
                    <div style={{width:42,height:42,borderRadius:12,background:`${pkg.colorA}15`,border:`1px solid ${pkg.colorA}30`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <Icon name="chart" size={18} color={pkg.colorA}/>
                    </div>
                  </div>
                </div>

                {/* Features */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
                  {[
                    {l:'المهام اليومية', v:pkg.tasks},
                    {l:'الربح اليومي',  v:`$${pkg.daily}`},
                  ].map((f,i)=>(
                    <div key={i} style={{background:'var(--bg3)',borderRadius:10,padding:'10px 12px',border:'1px solid var(--border2)'}}>
                      <div style={{fontSize:'0.65rem',color:'var(--text3)',marginBottom:3,letterSpacing:.3}}>{f.l}</div>
                      <div style={{fontSize:'0.95rem',fontWeight:800,color:pkg.accent,fontFamily:'Inter,sans-serif'}}>{f.v}</div>
                    </div>
                  ))}
                </div>

                {!isCur&&(
                  <button onClick={()=>setConfirm(pkg)}
                    style={{width:'100%',padding:'13px',borderRadius:12,
                      background:user.balance>=pkg.price?`linear-gradient(135deg,${pkg.colorB},${pkg.colorA})`:'var(--bg3)',
                      border:user.balance>=pkg.price?'none':`1px solid var(--border)`,
                      color:user.balance>=pkg.price?'#000':'var(--text3)',
                      fontSize:'0.85rem',fontWeight:700,cursor:'pointer',fontFamily:'Cairo,sans-serif',
                      display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>

            <div style={{fontSize:'0.9rem',fontWeight:700,color:'var(--text)',marginTop:4}}>${user.balance.toFixed(2)} ← ${(user.balance-confirm.price).toFixed(2)}</div>

            <button className="btn-outline" onClick={()=>setConfirm(null)} style={{padding:14,fontFamily:'Cairo,sans-serif',fontSize:'0.88rem'}}>إلغاء</button>

              style={{padding:14,borderRadius:12,background:`linear-gradient(135deg,${confirm.colorB},${confirm.colorA})`,border:'none',color:'#000',fontWeight:800,cursor:'pointer',fontFamily:'Cairo,sans-serif',fontSize:'0.88rem'}}>
              تأكيد
            </button>
          </div>
        </Sheet>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   ROOT APP
══════════════════════════════════════ */
const DEFAULT_USER={
  name:'أحمد الجزائري',
  email:'user@blackrock-dz.com',
  avatar:'https://api.dicebear.com/7.x/avataaars/svg?seed=blk2025&backgroundColor=1a1a1a',
  balance:0, totalEarned:0, packageId:'starter',
  joinDate:new Date().toISOString(), activity:[],
};

function App(){
  const [tab,setTab]=useState('home');
  const [toast,setToast]=useState(null);
  const [user,setUser]=useState(()=>S.get('blk_u',DEFAULT_USER));

  const showToast=(msg,type='info')=>setToast({msg,type,k:Date.now()});

  const TABS=[
    {id:'home',    icon:'home',    label:'الرئيسية'},
    {id:'tasks',   icon:'task',    label:'المهام'},
    {id:'upgrades',icon:'upgrade', label:'الترقيات'},
    {id:'profile', icon:'profile', label:'حسابي'},
  ];

  const P={user,setUser,showToast};

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',maxWidth:430,margin:'0 auto',position:'relative',background:'var(--bg)'}}>

      {toast&&<Toast key={toast.k} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}

      {/* Top Bar */}
      <div className="topbar" style={{padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,#1a1a1a,#2a2a2a)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{fontFamily:'Inter,sans-serif',fontWeight:900,fontSize:'0.85rem',background:'linear-gradient(135deg,#C9A84C,#F0D080)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>BLK</span>
          </div>
          <div>
            <div style={{fontSize:'0.88rem',fontWeight:800,color:'#FAFAFA',fontFamily:'Inter,sans-serif',lineHeight:1}}>BlackRock</div>
            <div style={{fontSize:'0.58rem',color:'var(--text3)',letterSpacing:.5}}>Investment Platform</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:999,background:'var(--bg3)',border:'1px solid var(--border)'}}>
            <span className="anim-pulse" style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',flexShrink:0,display:'block'}}/>
            <span style={{fontSize:'0.78rem',fontWeight:800,color:'#FAFAFA',fontFamily:'Inter,sans-serif'}}>${user.balance.toFixed(2)}</span>
          </div>
        </div>
      </div>

      {/* Page */}
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {tab==='home'     &&<HomePage     {...P}/>}
        {tab==='tasks'    &&<TasksPage    {...P}/>}
        {tab==='upgrades' &&<UpgradesPage {...P}/>}
        {tab==='profile'  &&<ProfilePage  {...P}/>}
      </div>

      {/* Bottom Nav */}
      <div className="bottom-nav">
        <div style={{display:'flex',alignItems:'center',padding:'6px 0'}}>
          {TABS.map(t=>{
            const a=tab===t.id;
            return(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'8px 4px',background:'transparent',border:'none',cursor:'pointer',position:'relative'}}>
                {a&&<div style={{position:'absolute',top:-6,left:'50%',transform:'translateX(-50%)',width:24,height:2,borderRadius:999,background:'var(--gold)'}}/>}
                <div style={{width:40,height:40,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',background:a?'var(--gold-dim)':'transparent',transition:'background .2s'}}>
                  <Icon name={t.icon} size={20} color={a?'var(--gold2)':'var(--text3)'}/>
                </div>
                <span style={{fontSize:'0.62rem',fontWeight:a?700:400,color:a?'var(--gold2)':'var(--text3)',letterSpacing:.2,transition:'color .2s'}}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
