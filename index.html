*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter','Cairo',sans-serif;background:#000;color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:#E31837;border-radius:10px}

/* ── BLACKROCK BRAND COLORS ── */
:root{
  --br-red:#E31837;
  --br-red-dark:#B01229;
  --br-red-light:#FF2D4A;
  --br-black:#000000;
  --br-dark:#0A0A0A;
  --br-card:#111111;
  --br-card2:#161616;
  --br-border:#1E1E1E;
  --br-border2:#2A2A2A;
  --br-text:#FFFFFF;
  --br-muted:#999999;
  --br-faint:#444444;
  --br-green:#00C851;
  --br-gold:#FFB800;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideRight{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(227,24,55,0.4)}50%{box-shadow:0 0 20px 4px rgba(227,24,55,0.2)}}
@keyframes shimmer{0%{background-position:-1000px 0}100%{background-position:1000px 0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes countUp{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
@keyframes borderFlow{0%,100%{border-color:#E31837}50%{border-color:#FF2D4A}}
@keyframes writeIn{from{width:0}to{width:100%}}
@keyframes blinkCursor{0%,100%{opacity:1}50%{opacity:0}}
@keyframes glow{0%,100%{text-shadow:0 0 10px rgba(227,24,55,0.5)}50%{text-shadow:0 0 20px rgba(227,24,55,0.8),0 0 40px rgba(227,24,55,0.3)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes progressBar{from{width:0}to{width:var(--w)}}
@keyframes ripple{0%{transform:scale(0);opacity:1}100%{transform:scale(4);opacity:0}}
@keyframes carouselScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes greenPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,200,81,0.4)}50%{box-shadow:0 0 15px 3px rgba(0,200,81,0.2)}}

.fadeUp{animation:fadeUp 0.5s ease forwards}
.fadeIn{animation:fadeIn 0.4s ease forwards}
.slideUp{animation:slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards}
.pulse-red{animation:pulseRed 2s infinite}
.glow-text{animation:glow 3s infinite}
.float-anim{animation:float 3s ease-in-out infinite}

.br-card{background:var(--br-card);border:1px solid var(--br-border);border-radius:12px}
.br-card2{background:var(--br-card2);border:1px solid var(--br-border2);border-radius:12px}
.br-glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);border-radius:16px}

.btn-primary{
  background:var(--br-red);color:#fff;font-weight:700;border-radius:8px;
  padding:14px 24px;border:none;cursor:pointer;font-family:'Inter','Cairo',sans-serif;
  font-size:14px;transition:all 0.2s ease;position:relative;overflow:hidden;width:100%;
}
.btn-primary:hover{background:var(--br-red-light);transform:translateY(-1px)}
.btn-primary:active{transform:scale(0.98)}
.btn-secondary{
  background:transparent;color:#fff;font-weight:600;border-radius:8px;
  padding:13px 24px;border:1px solid var(--br-border2);cursor:pointer;

}
.btn-secondary:hover{border-color:#555;background:#111}
.btn-red-outline{
  background:transparent;color:var(--br-red);font-weight:600;border-radius:8px;
  padding:13px 24px;border:1px solid var(--br-red);cursor:pointer;
  font-family:'Inter','Cairo',sans-serif;font-size:14px;transition:all 0.2s ease;width:100%;
}
.btn-red-outline:hover{background:rgba(227,24,55,0.08)}

.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:0.5px}
.tag-red{background:rgba(227,24,55,0.15);color:var(--br-red);border:1px solid rgba(227,24,55,0.3)}
.tag-green{background:rgba(0,200,81,0.12);color:var(--br-green);border:1px solid rgba(0,200,81,0.3)}
.tag-gold{background:rgba(255,184,0,0.12);color:var(--br-gold);border:1px solid rgba(255,184,0,0.3)}
.tag-blue{background:rgba(59,130,246,0.12);color:#60A5FA;border:1px solid rgba(59,130,246,0.3)}
.tag-purple{background:rgba(139,92,246,0.12);color:#A78BFA;border:1px solid rgba(139,92,246,0.3)}

input,textarea{
  background:#0d0d0d!important;border:1px solid var(--br-border2)!important;
  color:#fff!important;border-radius:8px!important;padding:12px 16px!important;
  width:100%;outline:none;font-family:'Inter','Cairo',sans-serif;font-size:14px;
  transition:border-color 0.2s ease;
}
input:focus,textarea:focus{border-color:var(--br-red)!important;box-shadow:0 0 0 3px rgba(227,24,55,0.1)!important}
input::placeholder{color:#444!important}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(8px);
  z-index:1000;display:flex;align-items:flex-end;justify-content:center;
}
.modal-sheet{
  background:#0A0A0A;border:1px solid var(--br-border2);
  border-radius:20px 20px 0 0;padding:0;width:100%;max-width:480px;
  max-height:92vh;overflow-y:auto;animation:slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-handle{width:36px;height:3px;background:#2a2a2a;border-radius:2px;margin:16px auto 0}

.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 18px;border-radius:10px;cursor:pointer;transition:all 0.2s ease;border:none;background:none;
}
.nav-item-active{background:rgba(227,24,55,0.1)}

.stat-box{background:#0d0d0d;border:1px solid var(--br-border);border-radius:10px;padding:16px;text-align:center}

.carousel-wrap{overflow:hidden;border-radius:12px}
.carousel-inner{display:flex;gap:12px;width:max-content;animation:carouselScroll 40s linear infinite}
.carousel-inner:hover{animation-play-state:paused}

.package-card{border-radius:14px;overflow:hidden;position:relative;transition:all 0.3s ease}
.package-card:active{transform:scale(0.98)}

.progress-ring{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:#1a1a1a;stroke-width:6}
.ring-fg{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s ease}

.task-item{
  background:#0d0d0d;border:1px solid var(--br-border);border-radius:12px;
  padding:16px;display:flex;align-items:center;gap:14px;transition:all 0.3s ease;cursor:pointer;
}
.task-item:active{transform:scale(0.98)}
.task-item-active{border-color:var(--br-red)!important;background:#110000!important;box-shadow:0 0 20px rgba(227,24,55,0.1)!important}
.task-item-done{border-color:rgba(0,200,81,0.3)!important;background:#001108!important}

.security-doc{
  background:linear-gradient(180deg,#0d0900 0%,#080600 100%);
  border:1px solid rgba(255,184,0,0.3);border-radius:16px;overflow:hidden;
}
.doc-header{
  background:linear-gradient(135deg,#1a1200,#0d0900);
  border-bottom:1px solid rgba(255,184,0,0.2);padding:24px;text-align:center;
}
.watermark{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  opacity:0.03;font-size:80px;font-weight:900;color:#FFB800;pointer-events:none;
  letter-spacing:-4px;
}
.official-seal{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,#FFB800,#FF8C00);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;margin:0 auto 12px;
  box-shadow:0 0 30px rgba(255,184,0,0.4);
}
.signature-line{
  border-bottom:2px solid rgba(255,184,0,0.6);
  padding-bottom:8px;margin-top:20px;position:relative;
}
.signature-text{
  font-family:'Inter',cursive;font-style:italic;
  color:#FFB800;font-size:22px;font-weight:700;
  text-shadow:0 0 10px rgba(255,184,0,0.5);
}
.contract-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid rgba(255,184,0,0.1);
}
.contract-row:last-child{border-bottom:none}

.company-hero{
  background:linear-gradient(160deg,#0a0000 0%,#000 50%,#000a1a 100%);
  border:1px solid rgba(227,24,55,0.2);border-radius:16px;overflow:hidden;position:relative;
}

.ref-card{
  background:linear-gradient(135deg,#110000,#0d0d0d);
  border:1px solid rgba(227,24,55,0.2);border-radius:14px;padding:20px;position:relative;overflow:hidden;
}
.ref-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--br-red),transparent);
}

.leaderboard-row{
  background:#0d0d0d;border:1px solid var(--br-border);border-radius:10px;
  padding:14px 16px;display:flex;align-items:center;gap:12px;
  transition:all 0.2s;
}
.leaderboard-row:hover{border-color:#2a2a2a;background:#111}

.contest-card{
  background:linear-gradient(135deg,#0d0800,#080008);
  border:1px solid rgba(255,184,0,0.25);border-radius:16px;overflow:hidden;position:relative;
}
.contest-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(255,184,0,0.05) 0%,transparent 70%);
  pointer-events:none;
}

.ticker-wrap{overflow:hidden;background:#0a0a0a;border-top:1px solid var(--br-border);border-bottom:1px solid var(--br-border);padding:10px 0}
.ticker-inner{display:flex;gap:40px;width:max-content;animation:ticker 20s linear infinite}

.br-divider{height:1px;background:linear-gradient(90deg,transparent,var(--br-border2),transparent);margin:20px 0}
.br-divider-red{height:1px;background:linear-gradient(90deg,transparent,rgba(227,24,55,0.3),transparent);margin:20px 0}

.notification-toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:9999;background:#111;border:1px solid #2a2a2a;
  border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:10px;
  animation:slideUp 0.3s ease;box-shadow:0 10px 40px rgba(0,0,0,0.8);
  min-width:260px;max-width:360px;
}
.copy-btn{
  background:#1a1a1a;border:1px solid #2a2a2a;color:#999;border-radius:6px;
  padding:6px 12px;cursor:pointer;font-size:12px;font-family:'Inter','Cairo',sans-serif;
  transition:all 0.2s;white-space:nowrap;
}
.copy-btn:hover{background:#222;color:#fff;border-color:#444}

.section-title{
  font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--br-muted);margin-bottom:16px;
}

.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);
  border-top:1px solid var(--br-border);
  display:flex;justify-content:space-around;
  padding:8px 0 22px;z-index:100;width:100%;max-width:480px;
}
</style>
</head>

const TasksPage=({user,setUser,showToast})=>{
  const [current,setCurrent]=useState(null);
  const [timer,setTimer]=useState(40);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState([]);
  const [blocked,setBlocked]=useState(false);
  const [earned,setEarned]=useState(0);
  const ref=useRef(null);
  const pkg=PACKAGES.find(p=>p.id===user.packageId)||PACKAGES[0];
  const perTask=pkg.daily/pkg.tasks;
  const progress=((40-timer)/40)*100;
  const R=52,C=2*Math.PI*R;
  
  const start=(i)=>{
    if(blocked)return showToast("مهامك موقوفة حتى الغد 🔒","error");
    if(done.includes(i))return;
    if(running)return;
    setCurrent(i);setTimer(40);setRunning(true);
  };
  
  useEffect(()=>{
    if(running&&timer>0){ref.current=setTimeout(()=>setTimer(t=>t-1),1000);}
    else if(running&&timer===0){
      setDone(d=>[...d,current]);
      setEarned(e=>e+perTask);
      setUser(u=>({...u,balance:u.balance+perTask,totalEarned:u.totalEarned+perTask,completedTasks:u.completedTasks+1,tasksLeft:Math.max(0,u.tasksLeft-1)}));
      showToast(`✅ +${fmt(perTask)}$ تم إضافته للرصيد`,"success");
      setRunning(false);setCurrent(null);
    }
    return()=>clearTimeout(ref.current);
  },[running,timer]);
  
  const cancel=()=>{
    clearTimeout(ref.current);
    setRunning(false);setCurrent(null);setTimer(40);setBlocked(true);
    showToast("❌ خسرت ربح هذه المهمة! مهامك موقوفة حتى الغد","error");
  };
  
  return(
    <div className="fadeIn" style={{paddingBottom:90,minHeight:"100vh",background:"#000"}}>
      
      {/* Header */}
      <div style={{
        background:"linear-gradient(180deg,#0d0000 0%,#000 100%)",
        padding:"52px 20px 20px",borderBottom:"1px solid var(--br-border)"
      }}>
        <div style={{fontSize:11,letterSpacing:2,color:"#E31837",fontFamily:"'Inter',sans-serif",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Daily Tasks</div>
        <h1 style={{color:"#fff",fontSize:24,fontWeight:900,fontFamily:"'Inter',sans-serif",marginBottom:4}}>⚡ المهام اليومية</h1>
        <p style={{color:"#555",fontSize:13,fontFamily:"'Cairo','Inter',sans-serif"}}>أكمل {pkg.tasks} مهمة لكسب {fmt(pkg.daily)}$ يومياً</p>
      </div>
      
      <div style={{padding:"20px 20px 0"}}>
        
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
          {[
            {val:done.length,label:"منجزة",color:"#00C851"},
            {val:blocked?0:pkg.tasks-done.length,label:"متبقية",color:"#FFB800"},
            {val:`${fmt(earned)}$`,label:"اليوم",color:"#E31837"},
          ].map((s,i)=>(
            <div key={i} className="stat-box">
              <div style={{color:s.color,fontSize:20,fontWeight:900,fontFamily:"'Inter',sans-serif"}}>{s.val}</div>
              <div style={{color:"#555",fontSize:10,fontFamily:"'Cairo','Inter',sans-serif",marginTop:4}}>{s.label}</div>
            </div>
          ))}
        </div>
        
        {/* Blocked */}
        {blocked&&(
          <div style={{
            background:"#110000",border:"1px solid rgba(227,24,55,0.3)",borderRadius:12,
            padding:20,marginBottom:20,textAlign:"center"
          }}>
            <div style={{fontSize:36,marginBottom:10}}>🚫</div>

          </div>
        )}
        
        {/* Active Timer */}
        {running&&current!==null&&(
          <div style={{
            background:"#110000",border:"1px solid rgba(227,24,55,0.4)",borderRadius:16,
            padding:24,marginBottom:20,textAlign:"center",
            boxShadow:"0 0 30px rgba(227,24,55,0.1)"
          }}>
            <div style={{color:"#555",fontSize:11,fontFamily:"'Inter',sans-serif",letterSpacing:2,textTransform:"uppercase",marginBottom:16}}>Task {current+1} Running</div>

              <svg width="130" height="130" className="progress-ring">
                <circle cx="65" cy="65" r={R} className="ring-bg"/>
                <circle cx="65" cy="65" r={R} className="ring-fg"
                  stroke={timer>20?"#E31837":timer>10?"#FFB800":"#00C851"}
                  strokeDasharray={C}
                  strokeDashoffset={C-(progress/100)*C}
                />
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <span style={{color:"#fff",fontSize:36,fontWeight:900,fontFamily:"'Inter',sans-serif",lineHeight:1}}>{timer}</span>

              </div>
            </div>
            
            <div style={{
              background:"rgba(227,24,55,0.08)",border:"1px solid rgba(227,24,55,0.2)",
              borderRadius:10,padding:"10px 20px",marginBottom:16,display:"inline-block"
            }}>
              <span style={{color:"#E31837",fontSize:16,fontWeight:900,fontFamily:"'Inter',sans-serif"}}>+{fmt(perTask)}$</span>
            </div>
            
            <div style={{
              background:"#1a0000",border:"1px solid rgba(227,24,55,0.2)",
              borderRadius:8,padding:"10px 14px",marginBottom:16,textAlign:"right"
            }}>
              <p style={{color:"#E31837",fontSize:12,fontFamily:"'Cairo','Inter',sans-serif"}}>⚠️ الإلغاء سيوقف جميع مهامك اليومية!</p>

            <button onClick={cancel} style={{
              background:"transparent",border:"1px solid rgba(227,24,55,0.3)",
              color:"rgba(227,24,55,0.7)",borderRadius:8,padding:"10px 24px",
              cursor:"pointer",fontFamily:"'Inter','Cairo',sans-serif",fontSize:13
            }}>✕ إلغاء (تحذير)</button>
          </div>
        )}
        
        {/* Task List */}
        <div className="section-title">TASKS — {pkg.name}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {Array.from({length:pkg.tasks},(_,i)=>{
            const isDone=done.includes(i);
            const isActive=current===i&&running;
            const isLocked=blocked||(running&&!isDone&&!isActive);
            return(
              <div key={i}
                onClick={()=>!isDone&&!isActive&&!isLocked&&start(i)}
                className={`task-item ${isDone?"task-item-done":isActive?"task-item-active":""}`}
                style={{opacity:isLocked&&!isActive?0.4:1,cursor:isDone||isLocked?"not-allowed":"pointer"}}
              >
                <div style={{
                  width:38,height:38,borderRadius:8,
                  background:isDone?"rgba(0,200,81,0.12)":isActive?"rgba(227,24,55,0.12)":"#1a1a1a",
                  border:`1px solid ${isDone?"rgba(0,200,81,0.4)":isActive?"rgba(227,24,55,0.5)":"#2a2a2a"}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:isDone?18:14,fontWeight:900,color:isDone?"#00C851":isActive?"#E31837":"#555",
                  fontFamily:"'Inter',sans-serif",flexShrink:0
                }}>
                  {isDone?"✓":isActive?"⏳":i+1}
                </div>
                <div style={{flex:1}}>
                  <div style={{color:isDone?"#00C851":isActive?"#E31837":"#ddd",fontWeight:700,fontSize:14,fontFamily:"'Cairo','Inter',sans-serif"}}>
                    {isDone?"اكتملت":isActive?"جارية...":blocked?"موقوفة":`مهمة ${i+1}`}
                  </div>
                  <div style={{color:"#444",fontSize:11,fontFamily:"'Inter',sans-serif",marginTop:2}}>+{fmt(perTask)} USD · 40s</div>
                </div>
                <div>
                  {isDone?<span style={{color:"#00C851",fontSize:12,fontWeight:700,fontFamily:"'Inter',sans-serif"}}>+{fmt(perTask)}$</span>
                  :isActive?<span style={{color:"#E31837",fontSize:18,fontWeight:900,fontFamily:"'Inter',sans-serif"}}>{timer}</span>
                  :<span style={{color:"#2a2a2a",fontSize:18}}>›</span>}
                </div>
              </div>
            );
          })}
        </div>
        
        {/* Package Bar */}
        <div style={{
          background:"#0d0d0d",border:"1px solid var(--br-border)",borderRadius:12,
          padding:16,marginBottom:8
        }}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{color:"#888",fontSize:12,fontFamily:"'Cairo','Inter',sans-serif"}}>تقدم اليوم</span>
            <span style={{color:pkg.color,fontSize:12,fontWeight:700,fontFamily:"'Inter',sans-serif"}}>{done.length}/{pkg.tasks}</span>
          </div>
          <div style={{background:"#1a1a1a",borderRadius:4,height:4,overflow:"hidden"}}>
            <div style={{
              height:"100%",background:`linear-gradient(90deg,${pkg.color},${pkg.color}aa)`,
              borderRadius:4,transition:"width 0.5s ease",
              width:`${(done.length/pkg.tasks)*100}%`
            }}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:12}}>
            <span style={{color:"#444",fontSize:11,fontFamily:"'Cairo','Inter',sans-serif"}}>المكتسب: {fmt(earned)}$</span>
            <span style={{color:"#444",fontSize:11,fontFamily:"'Cairo','Inter',sans-serif"}}>الهدف: {fmt(pkg.daily)}$</span>
          </div>
        </div>
      </div>
    </div>
  );
};

        <div style={{textAlign:"center",paddingBottom:8}}>
          <div style={{color:"#E31837",fontSize:13,fontWeight:700,fontFamily:"'Inter',sans-serif",marginBottom:2}}>BLACKROCK EARN</div>
          <div style={{color:"#333",fontSize:11,fontFamily:"'Inter',sans-serif"}}>v2.0.0 · NYSE: BLK · EIN: 32-0174431</div>
        </div>
      </div>
      
      {modal==="security"&&<SecurityModal onClose={()=>setModal(null)}/>}
      {modal==="company"&&<CompanyModal onClose={()=>setModal(null)}/>}
      {modal==="referral"&&<ReferralModal user={user} onClose={()=>setModal(null)} showToast={showToast}/>}
      {modal==="contest"&&<ContestModal user={user} onClose={()=>setModal(null)}/>}
      {modal==="edit"&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div style={{padding:"20px 20px 30px"}}>
              <h3 style={{color:"#fff",fontSize:18,fontWeight:900,fontFamily:"'Inter',sans-serif",marginBottom:20}}>✏️ تعديل الملف</h3>
              <div style={{marginBottom:14}}>
                <label style={{color:"#888",fontSize:11,fontFamily:"'Inter',sans-serif",fontWeight:700,display:"block",marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>الاسم</label>
                <input value={editName} onChange={e=>setEditName(e.target.value)} placeholder="الاسم الكامل"/>
              </div>
              <div style={{marginBottom:20}}>
                <label style={{color:"#888",fontSize:11,fontFamily:"'Inter',sans-serif",fontWeight:700,display:"block",marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>البريد الإلكتروني</label>
                <input value={editEmail} onChange={e=>setEditEmail(e.target.value)} placeholder="email@example.com"/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <button className="btn-secondary" onClick={()=>setModal(null)}>إلغاء</button>
                <button className="btn-primary" onClick={save}>حفظ</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ═══════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════ */
const BottomNav=({page,setPage})=>{
  const tabs=[
    {id:"home",icon:"🏠",label:"Home"},
    {id:"tasks",icon:"⚡",label:"Tasks"},
    {id:"upgrades",icon:"🚀",label:"Upgrade"},
    {id:"profile",icon:"👤",label:"Profile"},
  ];
  return(
    <div className="bottom-nav">
      {tabs.map(t=>(
        <button key={t.id} className="nav-item" onClick={()=>setPage(t.id)}
          style={{background:page===t.id?"rgba(227,24,55,0.1)":"transparent"}}>
          <div style={{
            position:"relative",
            width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center"
          }}>
            {page===t.id&&(
              <div style={{
                position:"absolute",top:-8,left:"50%",transform:"translateX(-50%)",
                width:20,height:2,background:"#E31837",borderRadius:1
              }}/>
            )}
            <span style={{fontSize:20,transition:"transform 0.2s",transform:page===t.id?"scale(1.15)":"scale(1)"}}>{t.icon}</span>
          </div>
          <span style={{
            fontSize:9,fontFamily:"'Inter',sans-serif",fontWeight:700,
            color:page===t.id?"#E31837":"#444",letterSpacing:0.5,textTransform:"uppercase"
          }}>{t.label}</span>
        </button>
      ))}
    </div>
  );
};

/* ═══════════════════════════════════════
   SPLASH
═══════════════════════════════════════ */
const Splash=({onDone})=>{
  const [p,setP]=useState(0);
  useEffect(()=>{
    let v=0;
    const t=setInterval(()=>{v+=1.5;setP(v);if(v>=100){clearInterval(t);setTimeout(onDone,400);}},30);
    return()=>clearInterval(t);
  },[]);
  return(
    <div style={{
      position:"fixed",inset:0,background:"#000",
      display:"flex",flexDirection:"column",alignItems:"center",
      justifyContent:"center",zIndex:9999
    }}>
      <div style={{marginBottom:40,position:"relative"}}>
        <div style={{
          width:90,height:90,background:"#E31837",borderRadius:20,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:42,fontWeight:900,color:"#fff",fontFamily:"'Inter',sans-serif",
          boxShadow:"0 0 60px rgba(227,24,55,0.5),0 0 120px rgba(227,24,55,0.2)"
        }}>B</div>
      </div>
      <div style={{color:"#E31837",fontSize:28,fontWeight:900,fontFamily:"'Inter',sans-serif",letterSpacing:3,marginBottom:6}}>BLACKROCK</div>
      <div style={{color:"#333",fontSize:12,fontFamily:"'Inter',sans-serif",letterSpacing:4,marginBottom:50,textTransform:"uppercase"}}>Earn Platform</div>
      <div style={{width:200,height:2,background:"#111",borderRadius:1,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${p}%`,background:"#E31837",borderRadius:1,transition:"width 0.05s linear"}}/>
      </div>
      <div style={{color:"#333",fontSize:11,fontFamily:"'Inter',sans-serif",marginTop:12}}>{Math.floor(p)}%</div>
    </div>
  );
};

/* ═══════════════════════════════════════
   APP
═══════════════════════════════════════ */
const App=()=>{
  const [splash,setSplash]=useState(true);
  const [page,setPage]=useState("home");
  const [toast,setToast]=useState(null);
  const [user,setUser]=useState({
    name:"المستخدم الكريم",
    email:"user@blackrock-earn.com",
    balance:2.85,
    totalEarned:2.85,
    activeDays:1,
    completedTasks:5,
    packageId:0,
    tasksLeft:5,
    referrals:0,
    refCode:genRef(),
    city:"الجزائر"
  });
  
  const showToast=useCallback((msg,type="info")=>{
    setToast({msg,type,id:Date.now()});
  },[]);
  
  const render=()=>{
    switch(page){
      case"home":return<HomePage user={user} setUser={setUser} setPage={setPage} showToast={showToast}/>;
      case"tasks":return<TasksPage user={user} setUser={setUser} showToast={showToast}/>;
      case"upgrades":return<UpgradesPage user={user} setUser={setUser} showToast={showToast}/>;
      case"profile":return<ProfilePage user={user} setUser={setUser} showToast={showToast}/>;
      default:return null;
    }
  };
  
  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#000",position:"relative",overflow:"hidden"}}>
      {splash&&<Splash onDone={()=>setSplash(false)}/>}
      {toast&&<Toast key={toast.id} msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      {render()}
      <BottomNav page={page} setPage={setPage}/>
    </div>
  );
};

ReactDOM.render(<React.createElement(App),document.getElementById("root"));
</script>
</body>
  </html>
