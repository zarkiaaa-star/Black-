<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlackRock — Earn & Tasks</title>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 2px; }

    /* Gold gradient text */
    .gold-text {
      background: linear-gradient(135deg, #D4AF37, #FFD700, #B8860B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .emerald-glow { box-shadow: 0 0 20px rgba(16,185,129,0.4); }
    .gold-glow    { box-shadow: 0 0 20px rgba(212,175,55,0.4);  }
    .red-glow     { box-shadow: 0 0 20px rgba(239,68,68,0.4);   }

    /* Glass card */
    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(212,175,55,0.2);
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0);    }
    }
    @keyframes pulse-gold {
      0%,100% { box-shadow: 0 0 10px rgba(212,175,55,0.3); }
      50%      { box-shadow: 0 0 30px rgba(212,175,55,0.8); }
    }
    @keyframes slide {
      0%   { transform: translateX(0%);    }
      100% { transform: translateX(-50%);  }
    }
    @keyframes spin-ring {
      from { transform: rotate(0deg);   }
      to   { transform: rotate(360deg); }
    }
    @keyframes countDown {
      from { stroke-dashoffset: 0;   }
      to   { stroke-dashoffset: 283; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-6px); }
    }

    .animate-fade-up { animation: fadeInUp 0.5s ease forwards; }
    .pulse-gold-anim { animation: pulse-gold 2s infinite; }
    .float-anim      { animation: float 3s ease-in-out infinite; }

    .shimmer-btn {
      background: linear-gradient(90deg,#D4AF37 0%,#FFD700 25%,#D4AF37 50%,#B8860B 75%,#D4AF37 100%);
      background-size: 200% auto;
      animation: shimmer 2s linear infinite;
    }

    /* Carousel */
    .carousel-track {
      display: flex;
      width: max-content;
      animation: slide 28s linear infinite;
    }
    .carousel-track:hover { animation-play-state: paused; }

    /* Timer SVG ring */
    .timer-ring {
      transform: rotate(-90deg);
    }
    .timer-circle {
      stroke-dasharray: 283;
      transition: stroke-dashoffset 1s linear;
    }

    /* Bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(212,175,55,0.3);
      z-index: 100;
    }

    /* Package cards */
    .pkg-card {
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .pkg-card:hover {
      transform: translateY(-4px) scale(1.02);
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }

    /* Progress bar */
    @keyframes progressAnim {
      from { width: 100%; }
      to   { width: 0%;   }
    }
    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #D4AF37);
      border-radius: 9999px;
      transition: width 1s linear;
    }

    /* Notification toast */
    @keyframes toastIn {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0);     }
    }
    .toast {
      animation: toastIn 0.3s ease;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─────────────────────────────────────────
   DATA
───────────────────────────────────────── */
const PACKAGES = [
  { id:'starter',   name:'Starter',   price:0,      tasks:5,   dailyProfit:0.17,  validity:3,  color:'#6b7280', gradient:'linear-gradient(135deg,#374151,#1f2937)', accent:'#9ca3af', badge:'مجاني' },
  { id:'nexus',     name:'NEXUS',     price:28,     tasks:5,   dailyProfit:0.86,  validity:30, color:'#3b82f6', gradient:'linear-gradient(135deg,#1d4ed8,#1e3a8a)', accent:'#60a5fa', badge:'مبتدئ' },
  { id:'orbit',     name:'ORBIT',     price:106.4,  tasks:10,  dailyProfit:3.44,  validity:30, color:'#8b5cf6', gradient:'linear-gradient(135deg,#7c3aed,#4c1d95)', accent:'#a78bfa', badge:'شائع' },
  { id:'apex',      name:'APEX',      price:380,    tasks:25,  dailyProfit:13.1,  validity:30, color:'#D4AF37', gradient:'linear-gradient(135deg,#92400e,#78350f)', accent:'#fbbf24', badge:'مميز ⭐' },
  { id:'stellar',   name:'STELLAR',   price:1200,   tasks:50,  dailyProfit:44.4,  validity:30, color:'#10b981', gradient:'linear-gradient(135deg,#065f46,#064e3b)', accent:'#34d399', badge:'احترافي' },
  { id:'supernova', name:'SUPERNOVA', price:3120,   tasks:80,  dailyProfit:124.8, validity:30, color:'#ef4444', gradient:'linear-gradient(135deg,#991b1b,#7f1d1d)', accent:'#f87171', badge:'متقدم 🔥' },
  { id:'galaxy',    name:'GALAXY',    price:7800,   tasks:130, dailyProfit:339,   validity:30, color:'#f97316', gradient:'linear-gradient(135deg,#9a3412,#7c2d12)', accent:'#fb923c', badge:'VIP 👑' },
];

const CAROUSEL_IMAGES = [
  { url:'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=800&q=80', title:'أسواق المال العالمية' },
  { url:'https://images.unsplash.com/photo-1559526324-4b87b5e36e44?w=800&q=80', title:'استثمارات BlackRock' },
  { url:'https://images.unsplash.com/photo-1590283603385-17ffb3a7f29f?w=800&q=80', title:'تداول الأصول الرقمية' },
  { url:'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800&q=80', title:'نمو الأرباح السنوية' },
  { url:'https://images.unsplash.com/photo-1642790106117-e829e14a795f?w=800&q=80', title:'إدارة المحافظ الاستثمارية' },
  { url:'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=800&q=80', title:'أسواق الطاقة والموارد' },
];

/* ─────────────────────────────────────────
   HELPERS / HOOKS
───────────────────────────────────────── */
function getStorage(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
  catch { return def; }
}
function setStorage(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

/* ─────────────────────────────────────────
   TOAST
───────────────────────────────────────── */
function Toast({ message, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  const colors = { success:'border-emerald-400 text-emerald-300', error:'border-red-400 text-red-300', info:'border-yellow-400 text-yellow-300' };
  return (
    <div className={`toast fixed top-4 left-1/2 z-[300] -translate-x-1/2 glass rounded-xl px-5 py-3 text-sm font-bold border ${colors[type]||colors.info} flex items-center gap-2 shadow-2xl`}>
      <span>{type==='success'?'✅':type==='error'?'❌':'ℹ️'}</span>
      <span>{message}</span>
    </div>
  );
}

/* ─────────────────────────────────────────
   MODAL WRAPPER
───────────────────────────────────────── */
function Modal({ children, onClose }) {
  return (
    <div className="modal-overlay" onClick={(e)=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="glass rounded-2xl w-full max-w-md max-h-[85vh] overflow-y-auto p-5 relative animate-fade-up"
           style={{border:'1px solid rgba(212,175,55,0.4)'}}>
        <button onClick={onClose}
          className="absolute top-3 left-3 w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-all text-lg">
          ✕
        </button>
        {children}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   CAROUSEL
───────────────────────────────────────── */
function Carousel() {
  const images = [...CAROUSEL_IMAGES, ...CAROUSEL_IMAGES];
  return (
    <div className="overflow-hidden rounded-2xl" style={{height:'180px', border:'1px solid rgba(212,175,55,0.25)'}}>
      <div className="carousel-track h-full">
        {images.map((img, i) => (
          <div key={i} className="relative flex-shrink-0" style={{width:'280px', height:'180px', marginLeft:'8px'}}>
            <img src={img.url} alt={img.title}
              className="w-full h-full object-cover rounded-xl"
              onError={(e)=>{ e.target.src='https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=400&q=60'; }} />
            <div className="absolute inset-0 rounded-xl"
              style={{background:'linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%)'}}>
            </div>
            <p className="absolute bottom-2 right-2 text-xs text-yellow-300 font-bold px-2 py-1 rounded-lg"
              style={{background:'rgba(0,0,0,0.5)'}}>{img.title}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   HOME PAGE
───────────────────────────────────────── */
function HomePage({ user, setUser, showToast }) {
  const [showDeposit, setShowDeposit]   = useState(false);
  const [showWithdraw, setShowWithdraw] = useState(false);
  const [amount, setAmount] = useState('');

  const pkg = PACKAGES.find(p => p.id === user.packageId) || PACKAGES[0];

  function handleDeposit() {
    const val = parseFloat(amount);
    if (!val || val <= 0) { showToast('أدخل مبلغاً صحيحاً', 'error'); return; }
    const newUser = { ...user, balance: +(user.balance + val).toFixed(2) };
    setUser(newUser); setStorage('blk_user', newUser);
    showToast(`تم إيداع $${val.toFixed(2)} بنجاح ✅`, 'success');
    setShowDeposit(false); setAmount('');
  }

  function handleWithdraw() {
    const val = parseFloat(amount);
    if (!val || val <= 0) { showToast('أدخل مبلغاً صحيحاً', 'error'); return; }
    if (val > user.balance) { showToast('الرصيد غير كافٍ', 'error'); return; }
    const newUser = { ...user, balance: +(user.balance - val).toFixed(2) };
    setUser(newUser); setStorage('blk_user', newUser);
    showToast(`تم طلب سحب $${val.toFixed(2)} بنجاح`, 'success');
    setShowWithdraw(false); setAmount('');
  }

  return (
    <div className="pb-24 px-4 pt-4 space-y-5 animate-fade-up">

      {/* Header */}
      <div className="flex items-center justify-between">
        <div>
          <p className="text-gray-400 text-sm">مرحباً بك،</p>
          <h1 className="text-xl font-bold gold-text">{user.name}</h1>
        </div>
        <div className="w-11 h-11 rounded-full overflow-hidden"
          style={{border:'2px solid #D4AF37'}}>
          <img src={user.avatar} alt="avatar" className="w-full h-full object-cover" />
        </div>
      </div>

      {/* Balance Card */}
      <div className="rounded-2xl p-5 relative overflow-hidden pulse-gold-anim"
        style={{background:'linear-gradient(135deg, #0a0a0a 0%, #1a1200 50%, #0a0a0a 100%)',
                border:'1px solid rgba(212,175,55,0.5)'}}>
        {/* Decorative circles */}
        <div className="absolute -top-8 -left-8 w-32 h-32 rounded-full opacity-10"
          style={{background:'radial-gradient(circle, #D4AF37, transparent)'}}></div>
        <div className="absolute -bottom-8 -right-8 w-24 h-24 rounded-full opacity-10"
          style={{background:'radial-gradient(circle, #10b981, transparent)'}}></div>

        <p className="text-gray-400 text-sm mb-1">رصيدك الحالي</p>
        <div className="flex items-baseline gap-2 mb-1">
          <span className="text-4xl font-black gold-text">${user.balance.toFixed(2)}</span>
        </div>
        <p className="text-gray-500 text-xs">{(user.balance * 250).toLocaleString('ar-DZ')} دج</p>

        <div className="mt-3 flex items-center gap-2">
          <span className="px-3 py-1 rounded-full text-xs font-bold"
            style={{background:pkg.gradient, color:pkg.accent, border:`1px solid ${pkg.accent}40`}}>
            {pkg.name}
          </span>
          <span className="text-gray-500 text-xs">ربح يومي: <span className="text-emerald-400">${pkg.dailyProfit}</span></span>
        </div>
      </div>

      {/* Action Buttons */}
      <div className="grid grid-cols-2 gap-3">
        <button onClick={()=>{ setShowDeposit(true); setAmount(''); }}
          className="rounded-xl p-4 flex flex-col items-center gap-2 transition-all active:scale-95"
          style={{background:'linear-gradient(135deg,#065f46,#064e3b)', border:'1px solid #10b98150'}}>
          <span className="text-2xl">💳</span>
          <span className="text-emerald-400 font-bold text-sm">شحن الرصيد</span>
          <span className="text-gray-500 text-xs">إيداع</span>
        </button>
        <button onClick={()=>{ setShowWithdraw(true); setAmount(''); }}
          className="rounded-xl p-4 flex flex-col items-center gap-2 transition-all active:scale-95"
          style={{background:'linear-gradient(135deg,#1a0a00,#2d1600)', border:'1px solid #D4AF3750'}}>
          <span className="text-2xl">💰</span>
          <span className="font-bold text-sm gold-text">سحب الأرباح</span>
          <span className="text-gray-500 text-xs">تحويل</span>
        </button>
      </div>

      {/* Stats Row */}
      <div className="grid grid-cols-3 gap-2">
        {[
          { label:'المهام اليومية', value: pkg.tasks, icon:'⚡', color:'#D4AF37' },
          { label:'أيام الباقة',    value: pkg.validity, icon:'📅', color:'#10b981' },
          { label:'إجمالي الأرباح', value:`$${(user.totalEarned||0).toFixed(1)}`, icon:'📈', color:'#8b5cf6' },
        ].map((s,i) => (
          <div key={i} className="glass rounded-xl p-3 text-center">
            <div className="text-xl mb-1">{s.icon}</div>
            <div className="font-black text-base" style={{color:s.color}}>{s.value}</div>
            <div className="text-gray-500 text-xs mt-0.5">{s.label}</div>
          </div>
        ))}
      </div>

      {/* Carousel */}
      <div>
        <h2 className="text-sm font-bold text-gray-400 mb-2">📰 أخبار الاستثمار العالمي</h2>
        <Carousel />
      </div>

      {/* Recent activity */}
      <div className="glass rounded-2xl p-4">
        <h3 className="font-bold text-sm mb-3" style={{color:'#D4AF37'}}>آخر النشاطات</h3>
        {(user.activity||[]).length === 0
          ? <p className="text-gray-600 text-xs text-center py-2">لا توجد نشاطات بعد</p>
          : (user.activity||[]).slice(-5).reverse().map((a,i) => (
            <div key={i} className="flex justify-between items-center py-2 border-b border-white/5 last:border-0">
              <span className="text-xs text-gray-400">{a.label}</span>
              <span className={`text-xs font-bold ${a.amount > 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                {a.amount > 0 ? '+' : ''}${Math.abs(a.amount).toFixed(3)}
              </span>
            </div>
          ))
        }
      </div>

      {/* Deposit Modal */}
      {showDeposit && (
        <Modal onClose={()=>setShowDeposit(false)}>
          <h2 className="text-lg font-black gold-text text-center mb-4">💳 شحن الرصيد</h2>
          <p className="text-gray-400 text-xs text-center mb-4">سعر الصرف: 1$ = 250 دج</p>
          <div className="space-y-3">
            {[10,50,100,500].map(v => (
              <button key={v} onClick={()=>setAmount(String(v))}
                className={`w-full rounded-xl py-3 text-sm font-bold transition-all ${amount==v?'bg-yellow-600 text-white':'glass text-gray-300 hover:border-yellow-500'}`}>
                ${v} = {v*250} دج
              </button>
            ))}
            <input type="number" value={amount} onChange={e=>setAmount(e.target.value)}
              placeholder="مبلغ مخصص بالدولار..."
              className="w-full bg-white/5 border border-white/20 rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-yellow-500" />
            <button onClick={handleDeposit}
              className="shimmer-btn w-full rounded-xl py-3 text-black font-black text-sm">
              تأكيد الإيداع ✅
            </button>
          </div>
        </Modal>
      )}

      {/* Withdraw Modal */}
      {showWithdraw && (
        <Modal onClose={()=>setShowWithdraw(false)}>
          <h2 className="text-lg font-black gold-text text-center mb-4">💰 سحب الأرباح</h2>
          <div className="glass rounded-xl p-3 mb-4 text-center">
            <p className="text-gray-400 text-xs">الرصيد المتاح</p>
            <p className="text-2xl font-black gold-text">${user.balance.toFixed(2)}</p>
          </div>
          <div className="space-y-3">
            <input type="number" value={amount} onChange={e=>setAmount(e.target.value)}
              placeholder="المبلغ المراد سحبه ($)"
              className="w-full bg-white/5 border border-white/20 rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-yellow-500" />
            <div className="glass rounded-xl p-3 space-y-1">
              {[['🏦 ويسترن يونيون','Western Union'],['💳 بطاقة بنكية','Bank Card'],['📱 بريدي موب','Baridimob']].map(([k,v])=>(
                <button key={v} className="w-full text-right text-xs text-gray-300 py-2 px-3 hover:bg-white/5 rounded-lg transition-all">{k}</button>
              ))}
            </div>
            <button onClick={handleWithdraw}
              className="w-full rounded-xl py-3 text-white font-black text-sm transition-all"
              style={{background:'linear-gradient(135deg,#065f46,#047857)'}}>
              تأكيد السحب 💸
            </button>
          </div>
        </Modal>
      )}

    </div>
  );
}

/* ─────────────────────────────────────────
   TASKS PAGE
───────────────────────────────────────── */
function TasksPage({ user, setUser, showToast }) {
  const pkg = PACKAGES.find(p => p.id === user.packageId) || PACKAGES[0];
  const profitPerTask = +(pkg.dailyProfit / pkg.tasks).toFixed(4);

  // Task state from localStorage
  const initTaskState = () => {
    const saved = getStorage('blk_tasks', {});
    if (saved.date !== todayStr()) {
      return { date: todayStr(), completed: 0, blocked: false, lost: false };
    }
    return saved;
  };

  const [taskState, setTaskState_] = useState(initTaskState);
  const [activeTask, setActiveTask] = useState(null); // { index, timeLeft }
  const [countdown, setCountdown] = useState(40);
  const [running, setRunning]   = useState(false);
  const intervalRef = useRef(null);
  const cancelledRef = useRef(false);

  function saveTaskState(ts) {
    setTaskState_(ts);
    setStorage('blk_tasks', ts);
  }

  function startTask() {
    if (taskState.blocked) { showToast('مهامك محجوبة حتى الغد ⛔', 'error'); return; }
    if (taskState.completed >= pkg.tasks) { showToast('أكملت جميع مهامك اليوم 🎉', 'info'); return; }
    cancelledRef.current = false;
    setCountdown(40);
    setRunning(true);
    setActiveTask(taskState.completed + 1);

    let t = 40;
    intervalRef.current = setInterval(() => {
      t--;
      setCountdown(t);
      if (t <= 0) {
        clearInterval(intervalRef.current);
        if (!cancelledRef.current) completeTask();
      }
    }, 1000);
  }

  function completeTask() {
    setRunning(false);
    setActiveTask(null);
    const newCompleted = taskState.completed + 1;
    const newTs = { ...taskState, completed: newCompleted };
    saveTaskState(newTs);
    const newBalance = +(user.balance + profitPerTask).toFixed(4);
    const newEarned  = +((user.totalEarned||0) + profitPerTask).toFixed(4);
    const newActivity = [...(user.activity||[]), { label:`مهمة #${newCompleted} — ${pkg.name}`, amount: profitPerTask }];
    const newUser = { ...user, balance: newBalance, totalEarned: newEarned, activity: newActivity };
    setUser(newUser); setStorage('blk_user', newUser);
    showToast(`✅ اكتملت المهمة! ربحت $${profitPerTask}`, 'success');
  }

  function cancelTask() {
    if (!running) return;
    cancelledRef.current = true;
    clearInterval(intervalRef.current);
    setRunning(false);
    setActiveTask(null);
    setCountdown(40);
    // Block all remaining tasks
    const newTs = { ...taskState, blocked: true, lost: true };
    saveTaskState(newTs);
    showToast('⛔ ألغيت المهمة! خسرت ربحها وتم حجب باقي مهامك حتى الغد.', 'error');
  }

  useEffect(() => () => clearInterval(intervalRef.current), []);

  const remaining = pkg.tasks - taskState.completed;
  const progress  = ((40 - countdown) / 40) * 283;

  return (
    <div className="pb-24 px-4 pt-4 space-y-5 animate-fade-up">

      <div className="text-center">
        <h1 className="text-xl font-black gold-text">⚡ المهام اليومية</h1>
        <p className="text-gray-500 text-xs mt-1">أكمل مهامك واربح أموالك</p>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-3 gap-2">
        {[
          { label:'المكتملة', value: taskState.completed, color:'#10b981', icon:'✅' },
          { label:'المتبقية', value: Math.max(0,remaining),  color:'#D4AF37',  icon:'⚡' },
          { label:'ربح/مهمة', value:`$${profitPerTask}`, color:'#8b5cf6', icon:'💎' },
        ].map((s,i) => (
          <div key={i} className="glass rounded-xl p-3 text-center">
            <div className="text-lg">{s.icon}</div>
            <div className="font-black text-sm mt-1" style={{color:s.color}}>{s.value}</div>
            <div className="text-gray-500 text-xs">{s.label}</div>
          </div>
        ))}
      </div>

      {/* Blocked Banner */}
      {taskState.blocked && (
        <div className="rounded-xl p-4 text-center red-glow"
          style={{background:'linear-gradient(135deg,#2d0000,#1a0000)', border:'1px solid #ef444450'}}>
          <div className="text-3xl mb-2">⛔</div>
          <p className="text-red-400 font-black">تم حجب مهامك اليوم</p>
          <p className="text-gray-500 text-xs mt-1">ألغيت مهمة قبل اكتمالها. ستُفتح مهامك غداً.</p>
        </div>
      )}

      {/* All done */}
      {!taskState.blocked && taskState.completed >= pkg.tasks && (
        <div className="rounded-xl p-5 text-center emerald-glow"
          style={{background:'linear-gradient(135deg,#052e16,#064e3b)', border:'1px solid #10b98150'}}>
          <div className="text-4xl mb-2 float-anim">🎉</div>
          <p className="text-emerald-400 font-black">أنجزت جميع مهامك اليوم!</p>
          <p className="text-gray-400 text-xs mt-1">ربحت ${ (pkg.dailyProfit).toFixed(2)} اليوم</p>
        </div>
      )}

      {/* Timer Circle */}
      {running && (
        <div className="flex flex-col items-center justify-center py-4 space-y-4">
          <div className="relative w-40 h-40">
            <svg className="w-full h-full timer-ring" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1a1a" strokeWidth="8"/>
              <circle cx="50" cy="50" r="45" fill="none"
                stroke="#10b981" strokeWidth="8" strokeLinecap="round"
                className="timer-circle"
                style={{strokeDasharray:283, strokeDashoffset: 283 - progress }}/>
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className="text-3xl font-black gold-text">{countdown}</span>
              <span className="text-gray-500 text-xs">ثانية</span>
            </div>
          </div>

          <div className="text-center">
            <p className="text-sm text-gray-300">جارٍ تنفيذ المهمة <span className="text-yellow-400 font-bold">#{activeTask}</span></p>
            <p className="text-xs text-gray-600 mt-1">لا تغادر الصفحة أو تلغي المهمة!</p>
          </div>

          <button onClick={cancelTask}
            className="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-bold text-red-400 transition-all active:scale-95"
            style={{background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.3)'}}>
            <span>✕</span> إلغاء (ستخسر الربح)
          </button>
        </div>
      )}

      {/* Task List */}
      {!running && (
        <div className="space-y-3">
          {Array.from({ length: pkg.tasks }, (_, i) => {
            const done    = i < taskState.completed;
            const current = i === taskState.completed && !taskState.blocked;
            const locked  = i > taskState.completed || taskState.blocked;
            return (
              <div key={i}
                className={`rounded-xl p-4 flex items-center gap-3 transition-all ${current ? 'pulse-gold-anim' : ''}`}
                style={{
                  background: done
                    ? 'linear-gradient(135deg,#052e16,#064e3b)'
                    : current
                    ? 'linear-gradient(135deg,#1a1200,#2d2000)'
                    : 'rgba(255,255,255,0.03)',
                  border: done
                    ? '1px solid #10b98140'
                    : current
                    ? '1px solid #D4AF3780'
                    : '1px solid rgba(255,255,255,0.06)',
                }}>
                <div className="w-10 h-10 rounded-full flex items-center justify-center font-black text-sm flex-shrink-0"
                  style={{
                    background: done ? '#052e16' : current ? '#1a1200' : '#111',
                    color: done ? '#10b981' : current ? '#D4AF37' : '#555',
                    border: `1px solid ${done ? '#10b98160' : current ? '#D4AF3760' : '#333'}`
                  }}>
                  {done ? '✓' : locked && !current ? '🔒' : i+1}
                </div>
                <div className="flex-1">
                  <p className={`text-sm font-bold ${done?'text-emerald-400':current?'text-yellow-400':'text-gray-600'}`}>
                    مهمة {i+1} {done ? '— مكتملة' : current ? '— جاهزة' : ''}
                  </p>
                  <p className="text-xs text-gray-600">ربح: ${profitPerTask}</p>
                </div>
                {current && (
                  <button onClick={startTask}
                    className="shimmer-btn px-4 py-2 rounded-xl text-black font-black text-xs">
                    ابدأ ▶
                  </button>
                )}
                {done && <span className="text-emerald-400 text-lg">✅</span>}
              </div>
            );
          })}
        </div>
      )}

      {/* Warning box */}
      <div className="glass rounded-xl p-4"
        style={{border:'1px solid rgba(239,68,68,0.3)', background:'rgba(239,68,68,0.05)'}}>
        <p className="text-red-400 font-bold text-xs text-center">⚠️ تحذير</p>
        <p className="text-gray-500 text-xs text-center mt-1">
          إلغاء أي مهمة قبل انتهاء الـ 40 ثانية يؤدي إلى خسارة ربحها وحجب جميع مهامك حتى اليوم التالي.
        </p>
      </div>
    </div>
  );
}

function UpgradesPage({ user, setUser, showToast }) {

  function buyPackage(pkg) {
    if (pkg.id === 'starter') { showToast('هذه الباقة مجانية وفعّالة بالفعل', 'info'); return; }
    if (user.balance < pkg.price) { showToast('رصيدك غير كافٍ لشراء هذه الباقة', 'error'); return; }
    const newBalance = +(user.balance - pkg.price).toFixed(2);
    const newUser = { ...user, balance: newBalance, packageId: pkg.id,
      activity:[...(user.activity||[]), { label:`ترقية إلى ${pkg.name}`, amount: -pkg.price }] };
    setUser(newUser); setStorage('blk_user', newUser);
    showToast(`🚀 تم الترقية إلى ${pkg.name} بنجاح!`, 'success');
  }

  const currentPkg = user.packageId;

  return (
    <div className="pb-24 px-4 pt-4 animate-fade-up">
      <div className="text-center mb-5">
        <h1 className="text-xl font-black gold-text">🚀 ترقية الباقة</h1>
        <p className="text-gray-500 text-xs mt-1">كلما ارتقيت، زادت أرباحك اليومية</p>
      </div>

      <div className="space-y-4">
        {PACKAGES.map((pkg, i) => {
          const isCurrent = pkg.id === currentPkg;
          const canAfford = user.balance >= pkg.price;
          return (
            <div key={pkg.id} className="pkg-card rounded-2xl p-5 relative overflow-hidden"
              style={{
                background: pkg.gradient,
                border: isCurrent ? `2px solid ${pkg.accent}` : `1px solid ${pkg.accent}30`,
                boxShadow: isCurrent ? `0 0 25px ${pkg.color}40` : 'none',
              }}>

              {/* Badge */}
              <div className="absolute top-3 left-3">
                <span className="text-xs font-bold px-2 py-1 rounded-full"
                  style={{background:`${pkg.color}30`, color:pkg.accent, border:`1px solid ${pkg.accent}50`}}>
                  {pkg.badge}
                </span>
              </div>
              {isCurrent && (
                <div className="absolute top-3 right-3">
                  <span className="text-xs font-bold px-2 py-1 rounded-full bg-white/20 text-white">✅ باقتك الحالية</span>
                </div>
              )}

              <div className="mt-4">
                <h2 className="text-2xl font-black" style={{color:pkg.accent}}>{pkg.name}</h2>
                <p className="text-3xl font-black text-white mt-1">
                  {pkg.price === 0 ? 'مجانية' : `$${pkg.price.toLocaleString()}`}
                </p>
                {pkg.price > 0 && <p className="text-xs" style={{color:pkg.accent+'aa'}}>{(pkg.price*250).toLocaleString('ar-DZ')} دج</p>}
              </div>

              <div className="grid grid-cols-3 gap-2 mt-4">
                {[
                  { label:'المهام اليومية', value: pkg.tasks,            icon:'⚡' },
                  { label:'الربح اليومي',   value:`$${pkg.dailyProfit}`, icon:'💵' },
                  { label:'مدة الصلاحية',  value:`${pkg.validity} يوم`, icon:'📅' },
                ].map((s,j) => (
                  <div key={j} className="rounded-xl p-2 text-center"
                    style={{background:'rgba(0,0,0,0.3)'}}>
                    <div className="text-base">{s.icon}</div>
                    <div className="font-black text-xs mt-0.5" style={{color:pkg.accent}}>{s.value}</div>
                    <div className="text-xs opacity-60 text-white">{s.label}</div>
                  </div>
                ))}
              </div>

              {!isCurrent && (
                <button onClick={()=>buyPackage(pkg)}
                  className="mt-4 w-full rounded-xl py-3 font-black text-sm transition-all active:scale-95"
                  style={{
                    background: canAfford ? `linear-gradient(135deg, ${pkg.color}, ${pkg.accent})` : 'rgba(255,255,255,0.1)',
                    color: canAfford ? '#000' : '#555',
                    border: canAfford ? 'none' : '1px solid #333',
                  }}>
                  {pkg.price === 0 ? '🎁 التسجيل مجاني' : canAfford ? `🚀 ترقية بـ $${pkg.price}` : `🔒 يحتاج $${pkg.price}`}
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

    totalEarned: 0,
    packageId: 'starter',
    joinDate: new Date().toISOString(),
    activity: [],
  };

  const [user, setUser] = useState(() => getStorage('blk_user', defaultUser));

  function showToast(message, type='info') {
    setToast({ message, type, key: Date.now() });
  }

  const tabs = [
    { id:'home',     icon:'🏠', label:'الرئيسية' },
    { id:'tasks',    icon:'⚡', label:'المهام'    },
    { id:'upgrades', icon:'🚀', label:'الترقيات' },
    { id:'profile',  icon:'👤', label:'حسابي'    },
  ];

  const pageProps = { user, setUser, showToast };

  return (
    <div className="min-h-screen" style={{background:'#000', maxWidth:'430px', margin:'0 auto', position:'relative'}}>

      {/* Toast */}
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onDone={()=>setToast(null)} />}

      {/* Top brand bar */}
      <div className="sticky top-0 z-50 px-4 py-3 flex items-center justify-between"
        style={{background:'rgba(0,0,0,0.95)', backdropFilter:'blur(20px)', borderBottom:'1px solid rgba(212,175,55,0.2)'}}>
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-black"
            style={{background:'linear-gradient(135deg,#D4AF37,#B8860B)', color:'#000'}}>B</div>
          <div>
            <span className="font-black text-sm gold-text">BlackRock</span>
            <span className="text-gray-600 text-xs block leading-none">NYSE: BLK</span>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <div className="flex items-center gap-1 px-3 py-1 rounded-full glass"
            style={{border:'1px solid rgba(16,185,129,0.3)'}}>
            <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse inline-block"></span>
            <span className="text-emerald-400 text-xs font-bold">$&nbsp;{user.balance.toFixed(2)}</span>
          </div>
        </div>
      </div>

      {/* Page Content */}
      <div className="overflow-y-auto" style={{minHeight:'calc(100vh - 120px)'}}>
        {tab === 'home'     && <HomePage     {...pageProps} />}
        {tab === 'tasks'    && <TasksPage    {...pageProps} />}
        {tab === 'upgrades' && <UpgradesPage {...pageProps} />}
        {tab === 'profile'  && <ProfilePage  {...pageProps} />}
      </div>

      {/* Bottom Navigation */}
      <div className="bottom-nav">
        <div className="flex items-center justify-around py-2 px-2">
          {tabs.map(t => {
            const active = tab === t.id;
            return (
              <button key={t.id} onClick={()=>setTab(t.id)}
                className="flex flex-col items-center gap-0.5 px-4 py-2 rounded-xl transition-all active:scale-90"
                style={{
                  background: active ? 'rgba(212,175,55,0.15)' : 'transparent',
                  minWidth: '60px',
                }}>
                <span className={`text-2xl transition-all ${active ? 'scale-110' : 'opacity-50'}`}
                  style={{filter: active ? 'drop-shadow(0 0 6px #D4AF37)' : 'none'}}>
                  {t.icon}
                </span>
                <span className={`text-xs font-bold transition-all ${active ? 'gold-text' : 'text-gray-600'}`}>
                  {t.label}
                </span>
                {active && (
                  <div className="w-1 h-1 rounded-full mt-0.5"
                    style={{background:'#D4AF37', boxShadow:'0 0 6px #D4AF37'}}></div>
                )}
              </button>
            );
          })}
        </div>
        {/* Safe area */}
        <div style={{height:'env(safe-area-inset-bottom, 0px)'}}></div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
