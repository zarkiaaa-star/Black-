const NOTIF_KEY="blk_notifs_v3";

function loadUser(){
  try{

  }catch(e){}
  return null;
}
function saveUser(u){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(u));}catch(e){}
}
function loadNotifs(){
  try{

}

/* ══════════════════════════════════════════════════
   NOTIFICATION BELL
══════════════════════════════════════════════════ */
function NotifBell({user,setUser,lang}){
  const tx=T[lang];
  const [open,setOpen]=useState(false);
  const [shake,setShake]=useState(false);
  const unread=(user.notifications||[]).filter(n=>!n.read).length;
  const ref=useRef(null);

  useEffect(()=>{
    if(unread>0){setShake(true);setTimeout(()=>setShake(false),600);}
  },[unread]);

  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  function markAll(){
    setUser(u=>{
      const notifs=(u.notifications||[]).map(n=>({...n,read:true}));
      const nu={...u,notifications:notifs};
      saveUser(nu);return nu;
    });
  }

  const notifs=user.notifications||[];

  return(
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={()=>setOpen(o=>!o)}
        className={shake?"bell-anim":""}
        style={{background:"#0d0d0d",border:"1px solid #2a2a2a",borderRadius:"50%",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",transition:"all .2s"}}>
        <span style={{fontSize:18}}>🔔</span>
        {unread>0&&(
          <div className="badge-pop" style={{position:"absolute",top:-4,right:-4,background:"#E31837",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:"#fff",fontFamily:"'Inter',sans-serif",border:"2px solid #000"}}>{unread}</div>
        )}
      </button>
      {open&&(
        <div className="notif-panel">
          <div style={{padding:"14px 16px",borderBottom:"1px solid #1a1a1a",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:"#fff",fontWeight:700,fontSize:14,fontFamily:"'Cairo','Inter',sans-serif"}}>🔔 {tx.notifications}</span>
            {unread>0&&<button onClick={markAll} style={{background:"none",border:"none",color:"#E31837",fontSize:11,cursor:"pointer",fontFamily:"'Cairo','Inter',sans-serif"}}>{tx.markRead}</button>}
          </div>
          <div style={{maxHeight:280,overflowY:"auto"}}>
            {notifs.length===0?(
              <div style={{padding:20,textAlign:"center",color:"#333",fontSize:13,fontFamily:"'Cairo','Inter',sans-serif"}}>{tx.noNotifs}</div>
            ):notifs.slice().reverse().map((n,i)=>(
              <div key={i} style={{padding:"12px 16px",borderBottom:"1px solid #111",background:n.read?"transparent":"rgba(227,24,55,.04)",display:"flex",gap:10,alignItems:"flex-start"}}>
                <span style={{fontSize:18,flexShrink:0}}>{n.icon}</span>
                <div style={{flex:1}}>
                  <div style={{color:n.read?"#666":"#fff",fontSize:12,fontWeight:n.read?400:700,fontFamily:"'Cairo','Inter',sans-serif",lineHeight:1.5}}>{n.msg}</div>
                  <div style={{color:"#333",fontSize:10,fontFamily:"'Inter',sans-serif",marginTop:3}}>{n.time}</div>
                </div>
                {!n.read&&<div style={{width:7,height:7,background:"#E31837",borderRadius:"50%",flexShrink:0,marginTop:4}}/>}
              </div>
            ))}

  );
}

/* ══════════════════════════════════════════════════
   SPIN WHEEL
══════════════════════════════════════════════════ */
function LuckySpinModal({onClose,onWin,spins,lang}){
  const tx=T[lang];
  const[spinning,setSpinning]=useState(false);
  const[rotation,setRotation]=useState(0);
  const[result,setResult]=useState(null);
  const[confetti,setConfetti]=useState([]);
  const segments=SPIN_PRIZES.length;
  const segAngle=360/segments;

  function doSpin(){
    if(spinning||spins<=0)return;
    setResult(null);
    const extra=1440+Math.floor(Math.random()*360);
    const newRot=rotation+extra;
    setRotation(newRot);
    setSpinning(true);
    setTimeout(()=>{
      setSpinning(false);
      const normalized=newRot%360;
      const idx=Math.floor(((360-normalized)%360)/segAngle)%segments;
      const prize=SPIN_PRIZES[idx];
      setResult(prize);
      if(prize.type==="money"&&prize.val>0){
        const pieces=Array.from({length:20},(_,i)=>({
          id:i,x:Math.random()*280-140,
          color:["#E31837","#FFB800","#00C851","#3B82F6","#fff"][Math.floor(Math.random()*5)],
          delay:Math.random()*.5,size:6+Math.random()*6,
        }));
        setConfetti(pieces);
        setTimeout(()=>setConfetti([]),2000);
        onWin(prize.val);
      }
    },4100);
  }

  const getPath=(idx)=>{
    const start=(idx*segAngle-90)*Math.PI/180;
    const end=((idx+1)*segAngle-90)*Math.PI/180;
    const r=130;
    const x1=140+r*Math.cos(start),y1=140+r*Math.sin(start);
    const x2=140+r*Math.cos(end),y2=140+r*Math.sin(end);
    return`M 140 140 L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`;
  };
  const getTP=(idx)=>{
    const mid=(idx*segAngle+segAngle/2-90)*Math.PI/180;
    return{x:140+90*Math.cos(mid),y:140+90*Math.sin(mid)};
  };

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div style={{padding:"20px 20px 32px",position:"relative",overflow:"hidden"}}>
          {confetti.map(c=>(
            <div key={c.id} style={{position:"absolute",top:"30%",left:`calc(50% + ${c.x}px)`,width:c.size,height:c.size,background:c.color,borderRadius:2,animation:`confetti 1.5s ${c.delay}s ease forwards`,pointerEvents:"none"}}/>
          ))}
          <div style={{textAlign:"center",marginBottom:18}}>
            <div style={{fontSize:38,marginBottom:8,animation:"float 2s ease-in-out infinite"}}>🎰</div>
            <h3 style={{color:"#FFB800",fontSize:20,fontWeight:900,fontFamily:"'Inter',sans-serif",marginBottom:4}}>{tx.luckySpinTitle}</h3>
            <div className="tag t-gold" style={{fontSize:11}}>{tx.spinsLeft}: {spins}</div>
          </div>
          <div style={{position:"relative",width:280,margin:"0 auto 20px",height:300}}>
            <div style={{position:"absolute",top:-18,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"12px solid transparent",borderRight:"12px solid transparent",borderTop:"22px solid #FFB800",zIndex:10,filter:"drop-shadow(0 2px 4px rgba(0,0,0,.5))"}}/>
            <div style={{width:280,height:280,borderRadius:"50%",border:"4px solid #1a1a1a",position:"relative",overflow:"hidden",transform:`rotate(${rotation}deg)`,transition:spinning?"transform 4s cubic-bezier(.17,.67,.12,.99)":"none"}}>
              <svg width="280" height="280" viewBox="0 0 280 280">
                {SPIN_PRIZES.map((p,i)=>(
                  <g key={i}>
                    <path d={getPath(i)} fill={p.color} stroke="#000" strokeWidth="1.5"/>
                    <text x={getTP(i).x} y={getTP(i).y} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize="11" fontWeight="800" fontFamily="'Inter',sans-serif" transform={`rotate(${i*segAngle+segAngle/2},${getTP(i).x},${getTP(i).y})`}>{p.label}</text>
                  </g>
                ))}
              </svg>
            </div>
            <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:44,height:44,background:"#111",borderRadius:"50%",border:"3px solid #2a2a2a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,zIndex:5}}>⭐</div>
          </div>
          {result&&(
            <div style={{background:result.val>0?"linear-gradient(135deg,#001a08,#000d04)":"#111",border:`1px solid ${result.val>0?"rgba(0,200,81,.4)":"#2a2a2a"}`,borderRadius:12,padding:"16px 20px",marginBottom:16,textAlign:"center"}}>
              {result.val>0?(
                <>
                  <div style={{fontSize:32,marginBottom:6}}>🎉</div>
                  <div style={{color:"#00C851",fontSize:22,fontWeight:900,fontFamily:"'Inter',sans-serif"}}>+{f(result.val)}$</div>
                  <div style={{color:"#888",fontSize:12,fontFamily:"'Cairo','Inter',sans-serif",marginTop:4}}>تمت إضافتها لرصيدك</div>
                </>
              ):(
                <>
                  <div style={{fontSize:32,marginBottom:6}}>😔</div>
                  <div style={{color:"#555",fontSize:16,fontWeight:700,fontFamily:"'Cairo','Inter',sans-serif"}}>حظاً أوفر في المرة القادمة!</div>
                </>
              )}
            </div>
          )}
          <button onClick={doSpin} disabled={spinning||spins<=0} className="btn-gold shine-btn"
            style={{opacity:spinning||spins<=0?.5:1,fontSize:15,marginBottom:10}}>
            {spinning?"⏳ جارٍ الدوران...":spins>0?`🎰 ${tx.spinNow}`:"لا توجد دورات متبقية"}
          </button>
          <button className="btn-gray" onClick={onClose}>{tx.close}</button>
        </div>
      </div>
    </div>
  );
}

function WithdrawModal({user,setUser,onClose,showToast,lang}){
  const tx=T[lang];
  const[amt,setAmt]=useState('');
  function go(){
    if(!amt||Number(amt)<=0)return showToast(tx.enterAmount,"error");
    if(Number(amt)>user.balance)return showToast(tx.insufficientBalance,"error");
    if(Number(amt)<5)return showToast(tx.minWithdraw,"warning");
    const nu={...user,balance:+(user.balance-Number(amt)).toFixed(4)};

    showToast(tx.withdrawSuccess,"success");

  return(
    <div className="modal-bg" onClick={onClose}>

function AchievementsModal({user,setUser,onClose,showToast,lang}){
  const tx=T[lang];

  function getVal(type){
    if(type==="completedTasks")return user.completedTasks||0;
    if(type==="totalEarned")return user.totalEarned||0;
    if(type==="referrals")return user.referrals||0;
    if(type==="packageId")return user.packageId||0;
    if(type==="activeDays")return user.activeDays||0;
    if(type==="spinWins")return user.spinWins||0;
    return 0;
  }

  function claimReward(a){
    const already=(user.unlockedAchievements||[]).includes(a.id);
    if(already)return;
    const nu={
      ...user,
      balance:+(user.balance+a.reward).toFixed(4),
      totalEarned:+(user.totalEarned+a.reward).toFixed(4),
      unlockedAchievements:[...(user.unlockedAchievements||[]),a.id],
      notifications:[...(user.notifications||[]),{
        icon:"🏅",
        msg:`🏅 ${lang==="ar"?a.title.ar:a.title.en} — حصلت على ${f(a.reward)}$!`,
        time:new Date().toLocaleTimeString("ar-DZ"),read:false
      }],
    };
    setUser(nu);saveUser(nu);
    if(a.reward>0)showToast(`🏅 إنجاز! +${f(a.reward)}$ ربح`,"success");
    else showToast(`🏅 إنجاز مفتوح: ${lang==="ar"?a.title.ar:a.title.en}`,"info");
  }

  const unlocked=user.unlockedAchievements||[];
  const cats=[
    {label:lang==="ar"?"📋 المهام":"📋 Tasks",items:ACHIEVEMENTS_DEF.filter(a=>a.type==="completedTasks")},
    {label:lang==="ar"?"💰 الأرباح":"💰 Earnings",items:ACHIEVEMENTS_DEF.filter(a=>a.type==="totalEarned")},
    {label:lang==="ar"?"👥 الإحالات":"👥 Referrals",items:ACHIEVEMENTS_DEF.filter(a=>a.type==="referrals")},
    {label:lang==="ar"?"🚀 الترقيات":"🚀 Upgrades",items:ACHIEVEMENTS_DEF.filter(a=>a.type==="packageId")},
    {label:lang==="ar"?"📅 النشاط":"📅 Activity",items:ACHIEVEMENTS_DEF.filter(a=>a.type==="activeDays")},
    {label:lang==="ar"?"🎰 المتفرقات":"🎰 Misc",items:ACHIEVEMENTS_DEF.filter(a=>a.type==="spinWins")},
  ];

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div style={{padding:"20px 20px 32px"}}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:42,marginBottom:8}}>🏅</div>
            <h3 style={{color:"#fff",fontSize:20,fontWeight:900,fontFamily:"'Inter',sans-serif",marginBottom:4}}>{tx.achievementsTitle}</h3>
            <p style={{color:"#555",fontSize:13,fontFamily:"'Cairo','Inter',sans-serif"}}>{tx.achievementsDesc}</p>
            <div style={{display:"flex",justifyContent:"center",gap:12,marginTop:12}}>
              <div className="tag t-gold">{unlocked.length}/{ACHIEVEMENTS_DEF.length} مفتوح</div>
              <div className="tag t-green">+{f(ACHIEVEMENTS_DEF.filter(a=>unlocked.includes(a.id)).reduce((s,a)=>s+a.reward,0))}$ مكتسب</div>
            </div>
          </div>

          {cats.map((cat,ci)=>(
            <div key={ci} style={{marginBottom:18}}>
              <div className="lbl" style={{marginBottom:10}}>{cat.label}</div>
              {cat.items.map((a,ai)=>{
                const val=getVal(a.type);
                const pct=Math.min((val/a.target)*100,100);
                const isUnlocked=unlocked.includes(a.id);
                const canClaim=val>=a.target&&!isUnlocked;
                return(
                  <div key={ai} className={`achievement-card ${!isUnlocked&&!canClaim?"achievement-locked":""}`}
                    style={{border:`1px solid ${isUnlocked?a.color+"44":canClaim?a.color+"66":"#1a1a1a"}`,
                      background:isUnlocked?`${a.color}08`:canClaim?`${a.color}12`:"#0d0d0d"}}>
                    <div style={{width:46,height:46,borderRadius:12,background:`${a.color}20`,border:`1px solid ${a.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
                      {isUnlocked?a.icon:canClaim?a.icon:"🔒"}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{color:isUnlocked?a.color:canClaim?"#fff":"#555",fontWeight:700,fontSize:13,fontFamily:"'Cairo','Inter',sans-serif"}}>
                        {lang==="ar"?a.title.ar:a.title.en}
                        {isUnlocked&&<span style={{color:"#00C851",fontSize:11,marginRight:6}}> ✅</span>}
                      </div>
                      <div style={{color:"#333",fontSize:11,fontFamily:"'Cairo','Inter',sans-serif",marginTop:2}}>
                        {lang==="ar"?a.desc.ar:a.desc.en}
                      </div>
                      {!isUnlocked&&(
                        <div style={{marginTop:6}}>
                          <div style={{background:"#1a1a1a",borderRadius:3,height:4,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${pct}%`,background:a.color,borderRadius:3,transition:"width .5s ease"}}/>
                          </div>
                          <div style={{color:"#333",fontSize:10,marginTop:3,fontFamily:"'Inter',sans-serif"}}>{val}/{a.target}</div>
                        </div>
                      )}
                      {a.reward>0&&(
                        <div style={{color:isUnlocked?"#333":a.color,fontSize:11,fontWeight:700,marginTop:4,fontFamily:"'Inter',sans-serif"}}>
                          🏆 {tx.reward}: +{f(a.reward)}$
                        </div>
                      )}
                    </div>
                    {canClaim&&(
                      <button onClick={()=>claimReward(a)}
                        style={{background:a.color,color:"#000",border:"none",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:11,fontFamily:"'Inter','Cairo',sans-serif",flexShrink:0}}>
                        استلم 🎁
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
          <button className="btn-gray" onClick={onClose}>{tx.close}</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   CHECK ACHIEVEMENTS (auto)
══════════════════════════════════════════════════ */
function checkAndUnlockAchievements(user,setUser,showToast,lang){
  const unlocked=user.unlockedAchievements||[];
  let changed=false;
  let nu={...user};
  ACHIEVEMENTS_DEF.forEach(a=>{
    if(unlocked.includes(a.id))return;
    let val=0;
    if(a.type==="completedTasks")val=nu.completedTasks||0;
    else if(a.type==="totalEarned")val=nu.totalEarned||0;
    else if(a.type==="referrals")val=nu.referrals||0;
    else if(a.type==="packageId")val=nu.packageId||0;
    else if(a.type==="activeDays")val=nu.activeDays||0;
    else if(a.type==="spinWins")val=nu.spinWins||0;
    if(val>=a.target){
      nu={
        ...nu,
        balance:+(nu.balance+a.reward).toFixed(4),
        totalEarned:+(nu.totalEarned+a.reward).toFixed(4),
        unlockedAchievements:[...(nu.unlockedAchievements||[]),a.id],
        notifications:[...(nu.notifications||[]),{
          icon:"🏅",
          msg:`إنجاز جديد: ${lang==="ar"?a.title.ar:a.title.en}${a.reward>0?" (+"+f(a.reward)+"$)":""}`,
          time:new Date().toLocaleTimeString("ar-DZ"),read:false
        }],
      };
      changed=true;
      if(a.reward>0)showToast(`🏅 إنجاز! ${lang==="ar"?a.title.ar:a.title.en} +${f(a.reward)}$`,"success");
    }
  });
  if(changed){setUser(nu);saveUser(nu);}
}

/* ══════════════════════════════════════════════════
   TASKS PAGE
══════════════════════════════════════════════════ */
function TasksPage({user,setUser,showToast,lang}){
  const tx=T[lang];
  const pkg=PKG[user.packageId]||PKG[0];
  const perTask=+(pkg.daily/pkg.tasks).toFixed(4);
  const[taskStates,setTaskStates]=useState(()=>Array(pkg.tasks).fill("idle"));
  const[current,setCurrent]=useState(null);
  const[timer,setTimer]=useState(40);
  const[earned,setEarned]=useState(0);
  const timerRef=useRef(null);
  const R=52,C=2*Math.PI*R;
  const pct=((40-timer)/40)*100;
  const doneCount=taskStates.filter(s=>s==="done").length;
  const cancelledCount=taskStates.filter(s=>s==="cancelled").length;

  function addNotif(msg,icon="⚡"){
    setUser(u=>{
      const nu={...u,notifications:[...(u.notifications||[]),{icon,msg,time:new Date().toLocaleTimeString("ar-DZ"),read:false}]};
      saveUser(nu);return nu;
    });
  }

  function startTask(i){
    if(taskStates[i]!=="idle")return;
    if(current!==null)return showToast("انتظر انتهاء المهمة الجارية ⏳","warning");
    const ns=[...taskStates];ns[i]="running";
    setTaskStates(ns);setCurrent(i);setTimer(40);
  }

  useEffect(()=>{
    if(current===null)return;
    if(taskStates[current]!=="running")return;
    if(timer>0){timerRef.current=setTimeout(()=>setTimer(t=>t-1),1000);}
    else{
      const ns=[...taskStates];ns[current]="done";
      setTaskStates(ns);
      setEarned(e=>+(e+perTask).toFixed(4));
      setUser(u=>{
        const nu={
          ...u,
          balance:+(u.balance+perTask).toFixed(4),
          totalEarned:+(u.totalEarned+perTask).toFixed(4),
          completedTasks:u.completedTasks+1,
          tasksLeft:Math.max(0,u.tasksLeft-1),
        };
        saveUser(nu);return nu;
      });
      addNotif(`✅ مهمة مكتملة +${f(perTask)}$`,"⚡");
      showToast(`✅ ${tx.taskDoneMsg} +${f(perTask)}$`,"success");
      setCurrent(null);
    }
    return()=>clearTimeout(timerRef.current);
  },[current,timer,taskStates]);

  useEffect(()=>{
    if(user.completedTasks>0){
      checkAndUnlockAchievements(user,setUser,showToast,lang);
    }
  },[user.completedTasks]);

  function cancelTask(){
    clearTimeout(timerRef.current);
    const ns=[...taskStates];ns[current]="cancelled";
    setTaskStates(ns);setCurrent(null);setTimer(40);
    showToast(tx.taskCancelledMsg,"warning");
  }

  const getClass=(s)=>s==="done"?"task-row task-done":s==="running"?"task-row task-active":s==="cancelled"?"task-row task-cancelled":"task-row";
  const getIcon=(s,i)=>s==="done"?"✅":s==="running"?"⏳":s==="cancelled"?"❌":i+1;
  const getCol=(s)=>s==="done"?"#00C851":s==="running"?"#E31837":s==="cancelled"?"#FF6400":"#444";
  const getLabel=(s,i)=>s==="done"?tx.taskCompleted:s==="running"?tx.taskRunning:s==="cancelled"?tx.cancelledToday+(lang==="ar"?" (غداً)":"(Tomorrow)"):(lang==="ar"?"مهمة ":"Task ")+(i+1);

  return(
    <div className="page" style={{paddingBottom:95,minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(180deg,#080000,#000)",padding:"52px 20px 20px",borderBottom:"1px solid var(--border)"}}>
        <div style={{fontSize:10,letterSpacing:2,color:"#E31837",fontFamily:"'Inter',sans-serif",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>Daily Tasks ⚡</div>
        <h1 style={{color:"#fff",fontSize:22,fontWeight:900,fontFamily:"'Inter',sans-serif",marginBottom:4}}>⚡ {tx.dailyTasksTitle}</h1>
        <p style={{color:"#444",fontSize:12,fontFamily:"'Cairo','Inter',sans-serif"}}>
          {lang==="ar"?`أكمل ${pkg.tasks} مهمة — ربح كل مهمة:`:`Complete ${pkg.tasks} tasks — per task:`}
          <span style={{color:"#00C851",fontWeight:700}}> ${f(perTask)}</span>
          {lang==="ar"?" — يومي:":" — daily:"}
          <span style={{color:"#FFB800",fontWeight:700}}> ${f(pkg.daily)}</span>
        </p>
      </div>
      <div style={{padding:"18px 20px 0"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:18}}>
          {[
            {val:doneCount,label:"منجزة ✅",col:"#00C851"},
            {val:taskStates.filter(s=>s==="idle").length,label:"متاحة ⚡",col:"#FFB800"},
            {val:cancelledCount,label:"ملغاة ❌",col:"#FF6400"},
            {val:f(earned)+"$",label:"اليوم 💰",col:"#E31837"},
          ].map((s,i)=>(
            <div key={i} className="stat-box" style={{padding:"10px 6px"}}>
              <div style={{color:s.col,fontSize:15,fontWeight:900,fontFamily:"'Inter',sans-serif"}}>{s.val}</div>
              <div style={{color:"#333",fontSize:9,fontFamily:"'Cairo','Inter',sans-serif",marginTop:3}}>{s.label}</div>
            </div>
          ))}
        </div>
        {cancelledCount>0&&(
          <div style={{background:"#110500",border:"1px solid rgba(255,100,0,.3)",borderRadius:12,padding:"12px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>⚠️</span>
            <div>
              <div style={{color:"#FF6400",fontSize:12,fontWeight:700,fontFamily:"'Cairo','Inter',sans-serif"}}>مهام ملغاة: {cancelledCount}</div>
              <div style={{color:"#555",fontSize:11,fontFamily:"'Cairo','Inter',sans-serif"}}>ستُفتح هذه المهام في اليوم التالي. المهام الأخرى متاحة الآن.</div>
            </div>
          </div>
        )}
        {current!==null&&taskStates[current]==="running"&&(
          <div style={{background:"#110000",border:"1px solid rgba(227,24,55,.5)",borderRadius:18,padding:22,marginBottom:18,textAlign:"center",boxShadow:"0 0 30px rgba(227,24,55,.07)"}}>
            <div style={{color:"#333",fontSize:10,fontFamily:"'Inter',sans-serif",letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>
              {lang==="ar"?"مهمة ":"Task "}{current+1} {lang==="ar"?"جارية":"Running"} • +${f(perTask)}
            </div>
            <div style={{position:"relative",display:"inline-block",marginBottom:16}}>
              <svg width="120" height="120" className="progress-ring-svg">
                <circle cx="60" cy="60" r={R} fill="none" stroke="#1a1a1a" strokeWidth="7"/>
                <circle cx="60" cy="60" r={R} fill="none" stroke={timer>20?"#E31837":timer>10?"#FFB800":"#00C851"} strokeWidth="7" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C-(pct/100)*C} style={{transition:"stroke-dashoffset 1s ease,stroke .3s ease"}}/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <span style={{color:"#fff",fontSize:32,fontWeight:900,fontFamily:"'Inter',sans-serif",lineHeight:1}}>{timer}</span>
                <span style={{color:"#333",fontSize:10,fontFamily:"'Inter',sans-serif"}}>sec</span>
              </div>
            </div>
            <div style={{background:"rgba(227,24,55,.08)",border:"1px solid rgba(227,24,55,.2)",borderRadius:8,padding:"9px 18px",marginBottom:12,display:"inline-block"}}>
              <span style={{color:"#E31837",fontSize:16,fontWeight:900,fontFamily:"'Inter',sans-serif"}}>+{f(perTask)} $</span>
            </div>
            <div style={{background:"#0d0500",border:"1px solid rgba(255,100,0,.2)",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
              <p style={{color:"#FF6400",fontSize:11,fontFamily:"'Cairo','Inter',sans-serif"}}>⚠️ {tx.cancelWarning}</p>
            </div>
            <button onClick={cancelTask} style={{background:"transparent",border:"1px solid rgba(227,24,55,.25)",color:"rgba(227,24,55,.7)",borderRadius:8,padding:"9px 22px",cursor:"pointer",fontFamily:"'Cairo','Inter',sans-serif",fontSize:13}}>
              ✕ {tx.cancelTask}
            </button>
          </div>
        )}
        <div className="lbl">TASKS — {pkg.name} • {f(perTask)}$/task</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
          {taskStates.map((state,i)=>{
            const clickable=state==="idle"&&current===null;
            return(
              <div key={i} onClick={()=>clickable&&startTask(i)}
                className={getClass(state)}
                style={{cursor:clickable?"pointer":"not-allowed"}}>

          <div key={i} onClick={()=>menuAction(m.key)}
            style={{background:"#0d0d0d",border:"1px solid var(--border)",borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",marginBottom:8,borderRight:`2px solid ${m.col}`,transition:"all .2s"}}>
            <div style={{width:40,height:40,background:m.col+"18",border:`1px solid ${m.col}22`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{m.icon}</div>
            <div style={{flex:1}}>
              <div style={{color:"#fff",fontSize:13,fontWeight:700,fontFamily:"'Cairo','Inter',sans-serif"}}>{m.title}</div>
              <div style={{color:"#333",fontSize:11,fontFamily:"'Cairo','Inter',sans-serif",marginTop:2}}>{m.sub}</div>
            </div>
            <span style={{color:"#1a1a1a",fontSize:18}}>›</span>
          </div>
        ))}

        <div style={{textAlign:"center",padding:"18px 0 8px"}}>
          <div style={{color:"#E31837",fontSize:11,fontWeight:700,fontFamily:"'Inter',sans-serif",marginBottom:2}}>BLACKROCK EARN</div>
          <div style={{color:"#1a1a1a",fontSize:10,fontFamily:"'Inter',sans-serif"}}>v3.0.0 · NYSE: BLK · EIN: 32-0174431</div>
        </div>
      </div>

      {modal==="sec"&&<SecurityModal onClose={()=>setModal(null)} lang={lang}/>}
      {modal==="com"&&<CompanyModal onClose={()=>setModal(null)} lang={lang}/>}
      {modal==="ach"&&<AchievementsModal user={user} setUser={setUser} onClose={()=>setModal(null)} showToast={showToast} lang={lang}/>}
      {modal==="ref"&&<ReferralModal user={user} setUser={setUser} onClose={()=>setModal(null)} showToast={showToast} lang={lang} setSpinModal={setSpinModal}/>}
      {modal==="con"&&<ContestModal user={user} onClose={()=>setModal(null)} lang={lang}/>}
      {modal==="set"&&<SettingsModal onClose={()=>setModal(null)} lang={lang} setLang={setLang} user={user}/>}
      {modal==="edit"&&(
        <div className="modal-bg" onClick={()=>setModal(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div style={{padding:"20px 20px 32px"}}>
              <div style={{textAlign:"center",marginBottom:20}}>
                <div style={{fontSize:44,marginBottom:8}}>✏️</div>
                <h3 style={{color:"#fff",fontSize:18,fontWeight:900,fontFamily:"'Inter',sans-serif"}}>{tx.editProfile}</h3>
              </div>
              {[
                {label:"👤 "+tx.name,val:editName,set:setEditName,ph:lang==="ar"?"اسمك الكامل":"Your full name",type:"text"},
                {label:"📧 "+tx.email,val:editEmail,set:setEditEmail,ph:"email@example.com",type:"email"},
                {label:"📱 "+tx.phone,val:editPhone,set:setEditPhone,ph:lang==="ar"?"0555 123 456":"0555 123 456",type:"tel"},
                {label:"📍 "+tx.city,val:editCity,set:setEditCity,ph:lang==="ar"?"مدينتك":"Your city",type:"text"},
              ].map((f,i)=>(
                <div key={i} style={{marginBottom:14}}>
                  <label style={{color:"#444",fontSize:11,fontFamily:"'Inter',sans-serif",fontWeight:700,display:"block",marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>{f.label}</label>
                  <input type={f.type} placeholder={f.ph} value={f.val} onChange={e=>f.set(e.target.value)}/>
                </div>
              ))}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:6}}>
                <button className="btn-gray" onClick={()=>setModal(null)}>{tx.cancel}</button>
                <button className="btn-red" onClick={saveProfile}>{tx.save}</button>
              </div>
            </div>
          </div>
        </div>
      )}
      {spinModal&&<LuckySpinModal onClose={()=>setSpinModal(false)} onWin={onSpinWin} spins={user.spins||0} lang={lang}/>}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════════════════ */
function BottomNav({page,setPage,lang,unreadNotifs}){
  const tx=T[lang];
  const tabs=[
    {id:"home",icon:"🏠",label:tx.home},
    {id:"tasks",icon:"⚡",label:tx.tasks},
    {id:"upgrades",icon:"🚀",label:tx.upgrades},
    {id:"profile",icon:"👤",label:tx.profile,badge:unreadNotifs},
  ];
  return(
    <div className="bottom-bar">
      {tabs.map(t=>(
        <button key={t.id} className="nav-btn" onClick={()=>setPage(t.id)}
          style={{background:page===t.id?"rgba(227,24,55,.1)":"transparent",position:"relative"}}>
          {t.badge>0&&(
            <div style={{position:"absolute",top:2,right:8,background:"#E31837",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:900,color:"#fff",fontFamily:"'Inter',sans-serif",border:"1px solid #000"}}>{t.badge>9?"9+":t.badge}</div>
          )}
          <div style={{position:"relative"}}>
            {page===t.id&&<div style={{position:"absolute",top:-10,left:"50%",transform:"translateX(-50%)",width:22,height:2,background:"#E31837",borderRadius:1}}/>}
            <span style={{fontSize:22,transition:"transform .2s",transform:page===t.id?"scale(1.15)":"scale(1)",display:"block"}}>{t.icon}</span>
          </div>
          <span style={{fontSize:9,fontFamily:"'Inter','Cairo',sans-serif",fontWeight:700,color:page===t.id?"#E31837":"#333",letterSpacing:.4,textTransform:"uppercase"}}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   SPLASH
══════════════════════════════════════════════════ */
function Splash({onDone}){
  const[prog,setProg]=useState(0);
  useEffect(()=>{
    let v=0;
    const t=setInterval(()=>{v+=1.4;setProg(v);if(v>=100){clearInterval(t);setTimeout(onDone,400);}},28);
    return()=>clearInterval(t);
  },[]);
  return(
    <div style={{position:"fixed",inset:0,background:"#000",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:9999}}>
      <div style={{width:88,height:88,background:"linear-gradient(135deg,#E31837,#8B0000)",borderRadius:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:38,fontWeight:900,color:"#fff",fontFamily:"'Inter',sans-serif",boxShadow:"0 0 60px rgba(227,24,55,.6),0 0 100px rgba(227,24,55,.2)",marginBottom:32,animation:"glow 2s ease-in-out infinite"}}>B</div>
      <div style={{color:"#E31837",fontSize:26,fontWeight:900,fontFamily:"'Inter',sans-serif",letterSpacing:3,marginBottom:6}}>BLACKROCK</div>
      <div style={{color:"#1a1a1a",fontSize:11,fontFamily:"'Inter',sans-serif",letterSpacing:4,textTransform:"uppercase",marginBottom:48}}>EARN PLATFORM</div>
      <div style={{width:180,height:2,background:"#0d0d0d",borderRadius:1,overflow:"hidden"}}>
        <div style={{height:"100%",width:prog+"%",background:"linear-gradient(90deg,#E31837,#FFB800)",borderRadius:1,transition:"width .05s linear"}}/>
      </div>
      <div style={{color:"#1a1a1a",fontSize:11,fontFamily:"'Inter',sans-serif",marginTop:10}}>{Math.floor(prog)}%</div>
      <div style={{color:"#0d0d0d",fontSize:10,fontFamily:"'Inter',sans-serif",marginTop:6,letterSpacing:1}}>NYSE: BLK</div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════ */
function App(){
  const[splash,setSplash]=useState(true);
  const[page,setPage]=useState("home");
  const[toast,setToast]=useState(null);
  const[lang,setLang]=useState("ar");

  const saved=useMemo(()=>loadUser(),[]);
  const[user,setUser]=useState(()=>{
    if(saved)return saved;
    const u={...DEFAULT_USER,joinDate:nowDate(),joinTimestamp:Date.now()};
    saveUser(u);return u;
  });

  // Auto-save on every user change
  useEffect(()=>{
    if(!splash)saveUser(user);
  },[user]);

  // Update active days
  useEffect(()=>{
    if(!splash){
      const lastDay=user.lastActiveDay||"";
      const today=todayStr();
      if(lastDay!==today){
        setUser(u=>{
          const nu={...u,activeDays:u.activeDays+1,lastActiveDay:today};
          saveUser(nu);return nu;
        });
      }
    }
  },[splash]);

  const showToast=useCallback((msg,type)=>{setToast({msg,type:type||"info",id:Date.now()});},[]);
  const unreadNotifs=(user.notifications||[]).filter(n=>!n.read).length;

  function renderPage(){
    if(page==="home")return<HomePage user={user} setUser={setUser} setPage={setPage} showToast={showToast} lang={lang}/>;
    if(page==="tasks")return<TasksPage user={user} setUser={setUser} showToast={showToast} lang={lang}/>;
    if(page==="upgrades")return<UpgradesPage user={user} setUser={setUser} showToast={showToast} lang={lang}/>;
    if(page==="profile")return<ProfilePage user={user} setUser={setUser} showToast={showToast} lang={lang} setLang={setLang}/>;
    return null;
  }

  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#000",position:"relative",overflow:"hidden"}}>
      {splash&&<Splash onDone={()=>setSplash(false)}/>}
      {toast&&<Toast key={toast.id} msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      {!splash&&renderPage()}
      {!splash&&<BottomNav page={page} setPage={setPage} lang={lang} unreadNotifs={unreadNotifs}/>}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
  </html>
