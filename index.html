<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BlackRock Earn</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 10px #D4AF3755; }
      50% { box-shadow: 0 0 30px #D4AF37cc, 0 0 60px #D4AF3744; }
    }
    @keyframes slide-in {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes carousel-move {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes count-up {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes spin-ring {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes glow-green {
      0%, 100% { box-shadow: 0 0 5px #10B98155; }
      50% { box-shadow: 0 0 20px #10B981aa; }
    }
    @keyframes ticker-scroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    .shimmer {
      background: linear-gradient(90deg, #1a1a1a 25%, #2a2a1a 50%, #1a1a1a 75%);
      background-size: 1000px 100%;
      animation: shimmer 2s infinite;
    }
    .gold-pulse { animation: pulse-gold 2s infinite; }
    .slide-in { animation: slide-in 0.5s ease forwards; }
    .gold-text { background: linear-gradient(135deg, #D4AF37, #FFD700, #B8960C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .gold-border { border: 1px solid #D4AF3766; }
    .emerald-glow { animation: glow-green 2s infinite; }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:active { transform: scale(0.97); }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(212,175,55,0.15); }
    .bottom-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    .page-enter { animation: fadeIn 0.4s ease forwards; }
    .modal-enter { animation: slideUp 0.4s ease forwards; }

    .carousel-track {
      display: flex;
      animation: carousel-move 30s linear infinite;
    }
    .carousel-track:hover { animation-play-state: paused; }

    .task-ring {
      width: 120px; height: 120px;
      border-radius: 50%;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .ring-bg {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 4px solid #1a1a1a;
    }
    .ring-progress {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top-color: #D4AF37;
      border-right-color: #D4AF37;
      transition: all 0.5s ease;
    }
    .upgrade-card {
      background: linear-gradient(135deg, #0d0d0d 0%, #1a1a0d 100%);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
    }
    .upgrade-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #D4AF37, transparent);
    }

    input[type="text"], input[type="number"], input[type="email"] {
      background: #111 !important;
      border: 1px solid #D4AF3744 !important;
      color: #fff !important;
      border-radius: 12px !important;
      padding: 12px 16px !important;
      width: 100%;
      outline: none;
      font-family: 'Cairo', sans-serif;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: #D4AF37 !important;
      box-shadow: 0 0 15px #D4AF3733;
    }

    .btn-gold {
      background: linear-gradient(135deg, #D4AF37, #FFD700, #B8960C);
      color: #000;
      font-weight: 800;
      border-radius: 14px;
      padding: 14px 24px;
      width: 100%;
      border: none;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-gold:active { transform: scale(0.97); }
    .btn-gold::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    .btn-gold:hover::after { left: 100%; }

    .btn-emerald {
      background: linear-gradient(135deg, #059669, #10B981);
      color: #fff;
      font-weight: 700;
      border-radius: 14px;
      padding: 14px 24px;
      width: 100%;
      border: none;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    .btn-emerald:active { transform: scale(0.97); }

    .btn-outline {
      background: transparent;
      color: #D4AF37;
      font-weight: 700;
      border-radius: 14px;
      padding: 12px 24px;
      width: 100%;
      border: 1px solid #D4AF37;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      transition: all 0.3s ease;
    }
    .btn-outline:active { background: #D4AF3711; }

    .stat-card {
      background: linear-gradient(135deg, #0d0d0d, #111108);
      border: 1px solid #D4AF3733;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .package-badge {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 700;
    }

    .notification-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: linear-gradient(135deg, #1a1a0d, #0d0d0d);
      border: 1px solid #D4AF37;
      border-radius: 14px;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideUp 0.3s ease;
      box-shadow: 0 10px 40px #D4AF3733;
      min-width: 280px;
      text-align: center;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-sheet {
      background: #0d0d0d;
      border: 1px solid #D4AF3744;
      border-radius: 24px 24px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.4s ease;
    }
    .modal-handle {
      width: 40px; height: 4px;
      background: #333;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .tier-0 { background: linear-gradient(135deg, #1a1a1a, #0d0d0d); border: 1px solid #444; }
    .tier-1 { background: linear-gradient(135deg, #0d1a0d, #071407); border: 1px solid #10B98155; }
    .tier-2 { background: linear-gradient(135deg, #1a0d0d, #140707); border: 1px solid #3B82F655; }
    .tier-3 { background: linear-gradient(135deg, #1a1a0d, #14140d); border: 1px solid #D4AF3755; }
    .tier-4 { background: linear-gradient(135deg, #1a0d1a, #14071a); border: 1px solid #8B5CF655; }
    .tier-5 { background: linear-gradient(135deg, #1a0808, #140404); border: 1px solid #EF444455; }
    .tier-6 { background: linear-gradient(135deg, #080d1a, #040a14); border: 1px solid #06B6D455; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ==================== DATA ====================
const PACKAGES = [
  { id: 0, name: "Starter", icon: "⭐", price: 0, tasks: 5, dailyEarning: 0.17, validity: 3, tier: "tier-0", color: "#aaa", priceAlg: "مجاني", desc: "ابدأ رحلتك", popular: false },
  { id: 1, name: "NEXUS", icon: "🔷", price: 28, tasks: 5, dailyEarning: 0.86, validity: 30, tier: "tier-1", color: "#10B981", priceAlg: "7,000 دج", desc: "للمبتدئين", popular: false },
  { id: 2, name: "ORBIT", icon: "🌀", price: 106.4, tasks: 10, dailyEarning: 3.44, validity: 30, tier: "tier-2", color: "#3B82F6", priceAlg: "26,600 دج", desc: "الأكثر مرونة", popular: false },
  { id: 3, name: "APEX", icon: "🏆", price: 380, tasks: 25, dailyEarning: 13.1, validity: 30, tier: "tier-3", color: "#D4AF37", priceAlg: "95,000 دج", desc: "للمحترفين", popular: true },
  { id: 4, name: "STELLAR", icon: "🌟", price: 1200, tasks: 50, dailyEarning: 44.4, validity: 30, tier: "tier-4", color: "#8B5CF6", priceAlg: "300,000 دج", desc: "أرباح عالية", popular: false },
  { id: 5, name: "SUPERNOVA", icon: "💥", price: 3120, tasks: 80, dailyEarning: 124.8, validity: 30, tier: "tier-5", color: "#EF4444", priceAlg: "780,000 دج", desc: "للمستثمرين", popular: false },
  { id: 6, name: "GALAXY", icon: "🌌", price: 7800, tasks: 130, dailyEarning: 339, validity: 30, tier: "tier-6", color: "#06B6D4", priceAlg: "1,950,000 دج", desc: "القمة المطلقة", popular: false },
];

const NEWS_CARDS = [
  { title: "BlackRock تعلن نمو أصولها فوق 10.2 تريليون دولار", category: "أخبار الأسواق", icon: "📈", color: "#D4AF37" },
  { title: "توقعات إيجابية للأسواق الناشئة في 2025", category: "تحليلات", icon: "🌍", color: "#10B981" },
  { title: "صناديق iShares تسجل تدفقات قياسية جديدة", category: "استثمارات", icon: "💼", color: "#3B82F6" },
  { title: "BlackRock تتوسع في أسواق الشرق الأوسط وإفريقيا", category: "توسع عالمي", icon: "🚀", color: "#8B5CF6" },
  { title: "منصة Aladdin تعزز إدارة المخاطر المؤسسية", category: "تقنية", icon: "🔐", color: "#EF4444" },
  { title: "شراكة استراتيجية مع البنك الدولي للتنمية", category: "شراكات", icon: "🤝", color: "#06B6D4" },
];

const formatNum = (n, dec = 2) => Number(n).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });

// ==================== TOAST ====================
const Toast = ({ msg, type, onClose }) => {
  useEffect(() => {
    const t = setTimeout(onClose, 3000);
    return () => clearTimeout(t);
  }, []);
  const colors = { success: "#10B981", error: "#EF4444", warning: "#D4AF37", info: "#3B82F6" };
  const icons = { success: "✅", error: "❌", warning: "⚠️", info: "ℹ️" };
  return (
    <div className="notification-toast" style={{ borderColor: colors[type] || "#D4AF37" }}>
      <span style={{ fontSize: 20 }}>{icons[type] || "💬"}</span>
      <span style={{ color: "#fff", fontSize: 14, fontWeight: 600 }}>{msg}</span>
    </div>
  );
};

// ==================== CAROUSEL ====================
const NewsCarousel = () => {
  const doubled = [...NEWS_CARDS, ...NEWS_CARDS];
  return (
    <div style={{ overflow: 'hidden', borderRadius: 16, marginBottom: 20 }}>
      <div className="carousel-track" style={{ gap: 12, width: 'max-content' }}>
        {doubled.map((item, i) => (
          <div key={i} style={{
            minWidth: 260, background: `linear-gradient(135deg, #0d0d0d, #111108)`,
            border: `1px solid ${item.color}44`, borderRadius: 16, padding: '14px 16px',
            borderTop: `2px solid ${item.color}`
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 22 }}>{item.icon}</span>
              <span style={{ fontSize: 10, color: item.color, fontWeight: 700, background: `${item.color}22`, padding: '2px 8px', borderRadius: 20 }}>{item.category}</span>
            </div>
            <p style={{ color: '#ddd', fontSize: 13, lineHeight: 1.6, fontWeight: 600 }}>{item.title}</p>
          </div>
        ))}
      </div>
    </div>
  );
};

// ==================== HOME PAGE ====================
const HomePage = ({ user, setUser, setPage, showToast }) => {
  const [showDeposit, setShowDeposit] = useState(false);
  const [showWithdraw, setShowWithdraw] = useState(false);
  const [amount, setAmount] = useState('');
  const pkg = PACKAGES.find(p => p.id === user.packageId) || PACKAGES[0];

  const handleWithdraw = () => {
    if (!amount || Number(amount) <= 0) return showToast("أدخل مبلغاً صحيحاً", "error");
    if (Number(amount) > user.balance) return showToast("رصيدك غير كافٍ", "error");
    if (Number(amount) < 5) return showToast("الحد الأدنى للسحب 5$", "warning");
    setUser(u => ({ ...u, balance: u.balance - Number(amount) }));
    showToast(`تم طلب سحب ${amount}$ بنجاح`, "success");
    setShowWithdraw(false);
    setAmount('');
  };

  return (
    <div className="page-enter" style={{ padding: '0 0 100px 0' }}>
      {/* Header */}
      <div style={{ padding: '20px 20px 0', background: 'linear-gradient(180deg, #0a0a00 0%, #000 100%)', paddingTop: 50 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <div>
            <p style={{ color: '#888', fontSize: 12, marginBottom: 4 }}>مرحباً 👋</p>
            <h2 style={{ color: '#fff', fontSize: 18, fontWeight: 800 }}>{user.name}</h2>
          </div>
          <div style={{ textAlign: 'left' }}>
            <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'linear-gradient(135deg, #D4AF37, #FFD700)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>
              {user.avatar}
            </div>
          </div>
        </div>

        {/* Balance Card */}
        <div className="gold-pulse" style={{
          background: 'linear-gradient(135deg, #1a1500, #0d0d00, #1a1500)',
          border: '1px solid #D4AF37',
          borderRadius: 24, padding: '28px 24px', marginBottom: 20, textAlign: 'center', position: 'relative', overflow: 'hidden'
        }}>
          <div style={{ position: 'absolute', top: -20, right: -20, width: 120, height: 120, background: '#D4AF3711', borderRadius: '50%' }} />
          <div style={{ position: 'absolute', bottom: -30, left: -30, width: 160, height: 160, background: '#D4AF3708', borderRadius: '50%' }} />
          <p style={{ color: '#D4AF3799', fontSize: 13, marginBottom: 8, fontWeight: 600 }}>💰 رصيدك الإجمالي</p>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'center', gap: 4 }}>
            <span style={{ color: '#D4AF37', fontSize: 44, fontWeight: 900, lineHeight: 1 }}>{formatNum(user.balance)}</span>
            <span style={{ color: '#D4AF37', fontSize: 22, fontWeight: 700 }}>$</span>
          </div>
          <p style={{ color: '#888', fontSize: 12, marginTop: 6 }}>≈ {formatNum(user.balance * 250, 0)} دج</p>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 20, marginTop: 16 }}>
            <div style={{ textAlign: 'center' }}>
              <p style={{ color: '#888', fontSize: 11 }}>الربح اليومي</p>
              <p style={{ color: '#10B981', fontWeight: 800, fontSize: 15 }}>{formatNum(pkg.dailyEarning)}$</p>
            </div>
            <div style={{ width: 1, background: '#D4AF3733' }} />
            <div style={{ textAlign: 'center' }}>
              <p style={{ color: '#888', fontSize: 11 }}>باقتك الحالية</p>
              <p style={{ color: pkg.color, fontWeight: 800, fontSize: 15 }}>{pkg.icon} {pkg.name}</p>
            </div>
            <div style={{ width: 1, background: '#D4AF3733' }} />
            <div style={{ textAlign: 'center' }}>
              <p style={{ color: '#888', fontSize: 11 }}>المهام اليومية</p>
              <p style={{ color: '#D4AF37', fontWeight: 800, fontSize: 15 }}>{user.tasksLeft}/{pkg.tasks}</p>
            </div>
          </div>
        </div>

        {/* Action Buttons */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
          <button className="btn-gold" onClick={() => setShowDeposit(true)} style={{ borderRadius: 16, padding: '16px 12px', fontSize: 15 }}>
            <div>💳</div>
            <div>شحن الرصيد</div>
          </button>
          <button className="btn-emerald" onClick={() => setShowWithdraw(true)} style={{ borderRadius: 16, padding: '16px 12px', fontSize: 15 }}>
            <div>💸</div>
            <div>سحب الأرباح</div>
          </button>
        </div>

        {/* Quick Stats */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 20 }}>
          {[
            { label: "إجمالي المكتسب", value: `${formatNum(user.totalEarned)}$`, icon: "📊" },
            { label: "أيام النشاط", value: user.activeDays, icon: "📅" },
            { label: "المهام المنجزة", value: user.completedTasks, icon: "✅" },
          ].map((s, i) => (
            <div key={i} className="stat-card">
              <div style={{ fontSize: 22, marginBottom: 6 }}>{s.icon}</div>
              <div style={{ color: '#D4AF37', fontWeight: 800, fontSize: 16 }}>{s.value}</div>
              <div style={{ color: '#666', fontSize: 10, marginTop: 2 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Carousel */}
      <div style={{ padding: '0 20px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <span style={{ color: '#D4AF37', fontWeight: 700, fontSize: 15 }}>📰 أخبار الأسواق العالمية</span>
          <span style={{ color: '#555', fontSize: 11 }}>مباشر</span>
        </div>
        <NewsCarousel />
      </div>

      {/* Start Tasks CTA */}
      <div style={{ padding: '0 20px' }}>
        <button
          className="btn-outline card-hover"
          onClick={() => setPage('tasks')}
          style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, padding: '16px' }}
        >
          <span>⚡ ابدأ مهامك اليومية</span>
          <span style={{ background: '#D4AF3722', padding: '2px 10px', borderRadius: 20, fontSize: 13 }}>{user.tasksLeft} مهمة</span>
        </button>
      </div>

      {/* Deposit Modal */}
      {showDeposit && (
        <div className="modal-overlay" onClick={() => setShowDeposit(false)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div style={{ textAlign: 'center', marginBottom: 20 }}>
              <div style={{ fontSize: 48, marginBottom: 10 }}>💳</div>
              <h3 style={{ color: '#D4AF37', fontSize: 20, fontWeight: 800 }}>شحن الرصيد / الإيداع</h3>
              <p style={{ color: '#666', fontSize: 13, marginTop: 6 }}>تواصل مع وكلائنا المعتمدين</p>
            </div>

            <div style={{ background: '#111', border: '1px solid #10B98155', borderRadius: 16, padding: 20, marginBottom: 16 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
                <div style={{ width: 50, height: 50, background: '#1a4a2a', borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 26 }}>📲</div>
                <div>
                  <p style={{ color: '#10B981', fontWeight: 700, fontSize: 15 }}>Signal Messenger</p>
                  <p style={{ color: '#888', fontSize: 12 }}>التواصل الآمن والمشفر</p>
                </div>
              </div>
              <p style={{ color: '#aaa', fontSize: 13, marginBottom: 14, lineHeight: 1.8 }}>
                للإيداع وشحن رصيدك، تواصل مع وكلائنا المعتمدين عبر تطبيق Signal
              </p>
              <a
                href="https://signal.me/#eu/__kL4ayCt64xdRiSQWwYpMxOo5_u-Br5Y87rLvt7vQ9c0zoJJ3BEHIfxtpSC5JSE"
                target="_blank"
                rel="noopener noreferrer"
                style={{ display: 'block', textDecoration: 'none' }}
              >
                <button className="btn-emerald" style={{ fontSize: 15, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
                  <span>📲</span> التواصل عبر Signal
                </button>
              </a>
            </div>

            <div style={{ background: '#0d1a0d', border: '1px solid #D4AF3733', borderRadius: 12, padding: 14, marginBottom: 16 }}>
              <p style={{ color: '#D4AF37', fontSize: 12, fontWeight: 600, marginBottom: 6 }}>💡 معلومات مهمة</p>
              <p style={{ color: '#888', fontSize: 12, lineHeight: 1.8 }}>
                • سعر الصرف: 1$ = 250 دج<br />
                • الحد الأدنى للإيداع: 7,000 دج (28$)<br />
                • يتم تأكيد الإيداع خلال ساعة واحدة<br />
                • جميع التحويلات مؤمّنة بالكامل
              </p>
            </div>

            <button className="btn-outline" onClick={() => setShowDeposit(false)}>إغلاق</button>
          </div>
        </div>
      )}

// ==================== TASKS PAGE ====================
const TasksPage = ({ user, setUser, showToast }) => {
  const [currentTask, setCurrentTask] = useState(null);
  const [timer, setTimer] = useState(40);
  const [isRunning, setIsRunning] = useState(false);
  const [tasksDone, setTasksDone] = useState([]);
  const [blocked, setBlocked] = useState(false);
  const [completedToday, setCompletedToday] = useState(0);
  const intervalRef = useRef(null);
  const pkg = PACKAGES.find(p => p.id === user.packageId) || PACKAGES[0];
  const earningPerTask = pkg.dailyEarning / pkg.tasks;

  const startTask = (taskIndex) => {
    if (blocked) return showToast("مهامك موقوفة حتى الغد", "error");
    if (tasksDone.includes(taskIndex)) return;
    setCurrentTask(taskIndex);
    setTimer(40);
    setIsRunning(true);
  };

  useEffect(() => {
    if (isRunning && timer > 0) {
      intervalRef.current = setTimeout(() => setTimer(t => t - 1), 1000);
    } else if (isRunning && timer === 0) {
      // Task completed!
      setTasksDone(prev => [...prev, currentTask]);
      setCompletedToday(c => c + 1);
      setUser(u => ({
        ...u,
        balance: u.balance + earningPerTask,
        totalEarned: u.totalEarned + earningPerTask,
        completedTasks: u.completedTasks + 1,
        tasksLeft: Math.max(0, u.tasksLeft - 1),
      }));
      showToast(`🎉 مبروك! ربحت ${formatNum(earningPerTask)}$`, "success");
      setIsRunning(false);
      setCurrentTask(null);
    }
    return () => clearTimeout(intervalRef.current);
  }, [isRunning, timer]);

  const cancelTask = () => {
    clearTimeout(intervalRef.current);
    setIsRunning(false);
    setCurrentTask(null);
    setTimer(40);
    setBlocked(true);
    showToast("❌ خسرت ربح هذه المهمة! مهامك موقوفة حتى الغد.", "error");
  };

  const progress = ((40 - timer) / 40) * 100;
  const circumference = 2 * Math.PI * 52;
  const strokeDashoffset = circumference - (progress / 100) * circumference;
  const availableTasks = pkg.tasks - tasksDone.length;

  return (
    <div className="page-enter" style={{ padding: '50px 20px 100px', minHeight: '100vh', background: 'linear-gradient(180deg, #050500 0%, #000 100%)' }}>
      {/* Header */}
      <div style={{ textAlign: 'center', marginBottom: 30 }}>
        <h1 style={{ color: '#D4AF37', fontSize: 24, fontWeight: 900, marginBottom: 8 }}>⚡ مهامك اليومية</h1>
        <p style={{ color: '#666', fontSize: 13 }}>أكمل المهام لكسب أرباحك اليومية</p>
      </div>

      {/* Stats */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 24 }}>
        <div className="stat-card">
          <div style={{ color: '#10B981', fontSize: 22, fontWeight: 800 }}>{completedToday}</div>
          <div style={{ color: '#666', fontSize: 11 }}>منجزة</div>
        </div>
        <div className="stat-card">
          <div style={{ color: '#D4AF37', fontSize: 22, fontWeight: 800 }}>{blocked ? 0 : availableTasks}</div>
          <div style={{ color: '#666', fontSize: 11 }}>متبقية</div>
        </div>
        <div className="stat-card">
          <div style={{ color: '#8B5CF6', fontSize: 16, fontWeight: 800 }}>{formatNum(completedToday * earningPerTask)}$</div>
          <div style={{ color: '#666', fontSize: 11 }}>الربح اليوم</div>
        </div>
      </div>

      {/* Blocked Warning */}
      {blocked && (
        <div style={{ background: '#1a0505', border: '1px solid #EF4444', borderRadius: 16, padding: 20, marginBottom: 24, textAlign: 'center' }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>🚫</div>
          <p style={{ color: '#EF4444', fontWeight: 700, fontSize: 16 }}>مهامك موقوفة لهذا اليوم</p>
          <p style={{ color: '#888', fontSize: 13, marginTop: 6 }}>ستُفتح تلقائياً في اليوم التالي</p>
        </div>
      )}

      {/* Active Task Timer */}
      {isRunning && currentTask !== null && (
        <div style={{
          background: 'linear-gradient(135deg, #1a1500, #0d0d00)',
          border: '2px solid #D4AF37',
          borderRadius: 24, padding: 30, marginBottom: 24, textAlign: 'center',
          animation: 'pulse-gold 2s infinite'
        }}>
          <p style={{ color: '#D4AF3799', fontSize: 13, marginBottom: 16 }}>المهمة {currentTask + 1} جارية...</p>

          {/* SVG Ring Timer */}
          <div style={{ position: 'relative', display: 'inline-block', marginBottom: 20 }}>
            <svg width="120" height="120" style={{ transform: 'rotate(-90deg)' }}>
              <circle cx="60" cy="60" r="52" fill="none" stroke="#1a1a1a" strokeWidth="8" />
              <circle
                cx="60" cy="60" r="52" fill="none"
                stroke={timer > 20 ? "#D4AF37" : timer > 10 ? "#FF8C00" : "#EF4444"}
                strokeWidth="8"
                strokeLinecap="round"
                strokeDasharray={circumference}
                strokeDashoffset={strokeDashoffset}
                style={{ transition: 'stroke-dashoffset 1s ease, stroke 0.3s ease' }}
              />
            </svg>
            <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
              <span style={{ color: timer > 10 ? '#D4AF37' : '#EF4444', fontSize: 32, fontWeight: 900 }}>{timer}</span>
              <span style={{ color: '#666', fontSize: 11 }}>ثانية</span>
            </div>
          </div>

          <div style={{ background: '#D4AF3711', borderRadius: 12, padding: '10px 16px', marginBottom: 16 }}>
            <p style={{ color: '#D4AF37', fontSize: 14, fontWeight: 700 }}>
              الربح المتوقع: {formatNum(earningPerTask)}$
            </p>
          </div>

          <div style={{ background: '#1a0505', border: '1px solid #EF444455', borderRadius: 12, padding: 12, marginBottom: 16 }}>
            <p style={{ color: '#EF4444', fontSize: 12, fontWeight: 600 }}>⚠️ تحذير: الإلغاء سيوقف جميع مهامك اليومية!</p>
          </div>

          <button
            onClick={cancelTask}
            style={{
              background: 'transparent', border: '1px solid #EF4444', color: '#EF4444',
              borderRadius: 12, padding: '10px 30px', cursor: 'pointer',
              fontFamily: 'Cairo', fontSize: 14, fontWeight: 700
            }}
          >
            ✕ إلغاء المهمة (تحذير)
          </button>
        </div>
      )}

      {/* Task List */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {Array.from({ length: pkg.tasks }, (_, i) => {
          const isDone = tasksDone.includes(i);
          const isActive = currentTask === i && isRunning;
          const isLocked = blocked || (currentTask !== null && !isDone && !isActive);
          return (
            <div
              key={i}
              className="card-hover"
              onClick={() => !isDone && !isActive && !isLocked && startTask(i)}
              style={{
                background: isDone ? 'linear-gradient(135deg, #0d1a0d, #071407)' :
                  isActive ? 'linear-gradient(135deg, #1a1500, #0d0d00)' : '#111',
                border: isDone ? '1px solid #10B98155' :
                  isActive ? '1px solid #D4AF37' : '1px solid #222',
                borderRadius: 16, padding: '16px 20px',
                display: 'flex', alignItems: 'center', gap: 14,
                cursor: isDone || isLocked ? 'not-allowed' : 'pointer',
                opacity: isLocked && !isActive ? 0.5 : 1,
                transition: 'all 0.3s ease'
              }}
            >
              <div style={{
                width: 44, height: 44, borderRadius: '50%',
                background: isDone ? '#0d1a0d' : isActive ? '#1a1500' : '#1a1a1a',
                border: `2px solid ${isDone ? '#10B981' : isActive ? '#D4AF37' : '#333'}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18,
                flexShrink: 0
              }}>
                {isDone ? '✅' : isActive ? '⏳' : `${i + 1}`}
              </div>
              <div style={{ flex: 1 }}>
                <p style={{ color: isDone ? '#10B981' : isActive ? '#D4AF37' : '#ddd', fontWeight: 700, fontSize: 14 }}>
                  {isDone ? 'اكتملت المهمة' : isActive ? 'جارية...' : `مهمة رقم ${i + 1}`}
                </p>
                <p style={{ color: '#666', fontSize: 12, marginTop: 2 }}>الربح: {formatNum(earningPerTask)}$</p>
              </div>
              <div style={{ textAlign: 'center' }}>
                {isDone ? (
                  <span style={{ color: '#10B981', fontSize: 12, fontWeight: 700 }}>+{formatNum(earningPerTask)}$</span>
                ) : isActive ? (
                  <span style={{ color: '#D4AF37', fontSize: 18, fontWeight: 900 }}>{timer}s</span>
                ) : (
                  <span style={{ color: '#555', fontSize: 20 }}>{blocked ? '🔒' : '▶'}</span>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Package Info */}
      <div style={{ background: '#111', border: '1px solid #D4AF3733', borderRadius: 16, padding: 16, marginTop: 24 }}>
        <p style={{ color: '#D4AF37', fontWeight: 700, fontSize: 13, marginBottom: 8 }}>📋 تفاصيل الباقة الحالية</p>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          {[
            ["الباقة", `${pkg.icon} ${pkg.name}`],
            ["عدد المهام", pkg.tasks],
            ["الربح اليومي", `${formatNum(pkg.dailyEarning)}$`],
            ["ربح كل مهمة", `${formatNum(earningPerTask)}$`],
          ].map(([k, v], i) => (
            <div key={i} style={{ background: '#0d0d0d', borderRadius: 10, padding: '10px 12px' }}>
              <p style={{ color: '#666', fontSize: 11 }}>{k}</p>
              <p style={{ color: '#fff', fontWeight: 700, fontSize: 13 }}>{v}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

            border: '2px solid #000', animation: 'glow-green 2s infinite'
          }} />
        </div>

        <h2 style={{ color: '#fff', fontSize: 22, fontWeight: 900, marginBottom: 4 }}>{user.name}</h2>
        <p style={{ color: '#888', fontSize: 13, marginBottom: 12 }}>{user.email}</p>

        <div style={{ display: 'flex', gap: 8, justifyContent: 'center', alignItems: 'center', marginBottom: 16 }}>
          <span style={{
            background: `${pkg.color}22`, border: `1px solid ${pkg.color}66`,
            color: pkg.color, fontSize: 12, fontWeight: 700, padding: '4px 14px', borderRadius: 20
          }}>
            {pkg.icon} {pkg.name}
          </span>
          <span style={{
            background: '#10B98122', border: '1px solid #10B98166',
            color: '#10B981', fontSize: 12, fontWeight: 700, padding: '4px 14px', borderRadius: 20
          }}>
            🟢 نشط
          </span>
        </div>

        {/* Balance Display */}
        <div className="glass" style={{ borderRadius: 16, padding: '16px 24px', display: 'inline-block', minWidth: 200 }}>
          <p style={{ color: '#888', fontSize: 12, marginBottom: 4 }}>رصيدك الحالي</p>
          <p style={{ color: '#D4AF37', fontSize: 28, fontWeight: 900 }}>{formatNum(user.balance)}$</p>
          <p style={{ color: '#555', fontSize: 11 }}>≈ {formatNum(user.balance * 250, 0)} دج</p>
        </div>
      </div>

      {/* Stats Row */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 24 }}>
        {[
          { label: "إجمالي المكتسب", value: `${formatNum(user.totalEarned)}$`, icon: "💰", color: "#D4AF37" },
          { label: "أيام النشاط", value: user.activeDays, icon: "📅", color: "#10B981" },
          { label: "المهام المنجزة", value: user.completedTasks, icon: "✅", color: "#3B82F6" },
        ].map((s, i) => (
          <div key={i} className="stat-card">
            <div style={{ fontSize: 20, marginBottom: 6 }}>{s.icon}</div>
            <div style={{ color: s.color, fontWeight: 800, fontSize: 16 }}>{s.value}</div>
            <div style={{ color: '#555', fontSize: 10 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Menu Items */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {MENU_ITEMS.map((item, i) => (
          <div
            key={i}
            className="card-hover"
            onClick={item.action}
            style={{
              background: '#111', border: '1px solid #1a1a1a', borderRadius: 16,
              padding: '16px 20px', display: 'flex', alignItems: 'center', gap: 14,
              cursor: 'pointer', borderRight: `3px solid ${item.color}66`
            }}
          >
            <div style={{
              width: 44, height: 44, borderRadius: 12,
              background: `${item.color}22`, display: 'flex', alignItems: 'center',
              justifyContent: 'center', fontSize: 20, flexShrink: 0
            }}>
              {item.icon}
            </div>
            <div style={{ flex: 1 }}>
              <p style={{ color: '#fff', fontWeight: 700, fontSize: 15 }}>{item.label}</p>
              <p style={{ color: '#666', fontSize: 12, marginTop: 2 }}>{item.sub}</p>
            </div>
            <span style={{ color: '#444', fontSize: 20 }}>‹</span>
          </div>
        ))}
      </div>

      {/* Security Modal */}
      {showSecurity && (
        <div className="modal-overlay" onClick={() => setShowSecurity(false)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div style={{ textAlign: 'center', marginBottom: 24 }}>
              <div style={{ fontSize: 50, marginBottom: 10 }}>🔐</div>
              <h3 style={{ color: '#D4AF37', fontSize: 20, fontWeight: 900 }}>الأمان والعقد</h3>
            </div>

            {[
              { icon: "📊", label: "التوثيق البورصي", value: "NYSE: BLK", color: "#3B82F6" },
              { icon: "🏛️", label: "الرقم الضريبي الفيدرالي", value: "EIN: 32-0174431", color: "#D4AF37" },
              { icon: "🔒", label: "بروتوكول التشفير", value: "AES-256 + SSL/TLS 3.0", color: "#10B981" },
              { icon: "📋", label: "العقد الجزائري", value: "يناير 2025 — ديسمبر 2027 ✅", color: "#8B5CF6" },
              { icon: "💰", label: "حماية الأموال", value: "محمية بنسبة 100% ✅", color: "#10B981" },
              { icon: "🛡️", label: "المراقبة الأمنية", value: "24/7 مستمر", color: "#EF4444" },
            ].map((item, i) => (
              <div key={i} style={{ background: '#111', border: `1px solid ${item.color}33`, borderRadius: 14, padding: '14px 16px', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 14 }}>
                <div style={{ width: 40, height: 40, background: `${item.color}22`, borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, flexShrink: 0 }}>{item.icon}</div>
                <div>
                  <p style={{ color: '#888', fontSize: 11 }}>{item.label}</p>
                  <p style={{ color: item.color, fontWeight: 700, fontSize: 13 }}>{item.value}</p>
                </div>
              </div>
            ))}

            <div style={{ background: '#0d1a0d', border: '1px solid #D4AF3744', borderRadius: 14, padding: 16, margin: '16px 0' }}>
              <p style={{ color: '#D4AF37', fontSize: 12, fontWeight: 700, marginBottom: 8 }}>📄 النص الرسمي للعقد</p>
              <p style={{ color: '#aaa', fontSize: 12, lineHeight: 1.9 }}>
                "تقر شركة BlackRock, Inc بأنها أبرمت عقداً رسمياً مع الجانب الجزائري في يناير 2025 مدته 3 سنوات ينتهي في ديسمبر 2027"
              </p>
            </div>

            <button className="btn-gold" onClick={() => setShowSecurity(false)}>إغلاق</button>
          </div>
        </div>
      )}

      {/* Company Modal */}
      {showCompany && (
        <div className="modal-overlay" onClick={() => setShowCompany(false)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div style={{ textAlign: 'center', marginBottom: 24 }}>
              <div style={{ fontSize: 50, marginBottom: 10 }}>🏢</div>
              <h3 style={{ color: '#D4AF37', fontSize: 20, fontWeight: 900 }}>BlackRock, Inc.</h3>
              <p style={{ color: '#888', fontSize: 13 }}>نيويورك، الولايات المتحدة الأمريكية</p>
            </div>

            {[
              { icon: "📈", label: "رمز البورصة", value: "NYSE: BLK", color: "#3B82F6" },
              { icon: "🏗️", label: "سنة التأسيس", value: "1988 — نيويورك", color: "#D4AF37" },
              { icon: "💼", label: "الأصول المدارة", value: "أكثر من 10.2 تريليون $", color: "#10B981" },
              { icon: "🌍", label: "التواجد العالمي", value: "38 دولة حول العالم", color: "#8B5CF6" },
              { icon: "👥", label: "عدد الموظفين", value: "أكثر من 19,000 موظف", color: "#F59E0B" },
              { icon: "🔒", label: "معيار الأمان", value: "تشفير AES-256 العسكري", color: "#EF4444" },
              { icon: "🕐", label: "المراقبة", value: "24/7 مستمر", color: "#06B6D4" },
            ].map((item, i) => (
              <div key={i} style={{ background: '#111', border: `1px solid ${item.color}33`, borderRadius: 14, padding: '14px 16px', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 14 }}>
                <div style={{ width: 40, height: 40, background: `${item.color}22`, borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, flexShrink: 0 }}>{item.icon}</div>
                <div>
                  <p style={{ color: '#888', fontSize: 11 }}>{item.label}</p>
                  <p style={{ color: item.color, fontWeight: 700, fontSize: 13 }}>{item.value}</p>
                </div>
              </div>
            ))}

            <p style={{ color: '#666', fontSize: 12, lineHeight: 1.8, margin: '12px 0', textAlign: 'center' }}>
              BlackRock هي أكبر شركة لإدارة الأصول في العالم، تأسست عام 1988 وتخدم عملاء في أكثر من 100 دولة
            </p>

            <a href="https://www.blackrock.com" target="_blank" rel="noopener noreferrer" style={{ display: 'block', textDecoration: 'none', marginBottom: 12 }}>
              <button className="btn-outline" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
                <span>🌐</span> زيارة الموقع الرسمي
              </button>
            </a>
            <button className="btn-gold" onClick={() => setShowCompany(false)}>إغلاق</button>
          </div>
        </div>
      )}

      {/* Edit Profile Modal */}
      {showEditProfile && (
        <div className="modal-overlay" onClick={() => setShowEditProfile(false)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div style={{ textAlign: 'center', marginBottom: 20 }}>
              <div style={{ fontSize: 48, marginBottom: 10 }}>✏️</div>
              <h3 style={{ color: '#D4AF37', fontSize: 20, fontWeight: 900 }}>تعديل الملف الشخصي</h3>
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={{ color: '#D4AF37', fontSize: 13, fontWeight: 600, display: 'block', marginBottom: 8 }}>الاسم الكامل</label>
              <input type="text" value={editName} onChange={e => setEditName(e.target.value)} placeholder="أدخل اسمك" />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ color: '#D4AF37', fontSize: 13, fontWeight: 600, display: 'block', marginBottom: 8 }}>البريد الإلكتروني</label>
              <input type="email" value={editEmail} onChange={e => setEditEmail(e.target.value)} placeholder="أدخل بريدك الإلكتروني" />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <button className="btn-outline" onClick={() => setShowEditProfile(false)}>إلغاء</button>
              <button className="btn-gold" onClick={saveProfile}>حفظ التغييرات</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ==================== BOTTOM NAV ====================
const BottomNav = ({ page, setPage }) => {
  const tabs = [
    { id: 'home', icon: '🏠', label: 'الرئيسية' },
    { id: 'tasks', icon: '⚡', label: 'المهام' },
    { id: 'upgrades', icon: '🚀', label: 'الترقيات' },
    { id: 'profile', icon: '👤', label: 'حسابي' },
  ];
  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0,
      background: 'rgba(5,5,0,0.97)',
      backdropFilter: 'blur(20px)',
      borderTop: '1px solid #D4AF3733',
      display: 'flex', justifyContent: 'space-around',
      padding: '10px 0 20px',
      zIndex: 100,
      maxWidth: '100%',
    }}>
      {tabs.map(tab => (
        <button
          key={tab.id}
          onClick={() => setPage(tab.id)}
          style={{
            background: 'none', border: 'none', cursor: 'pointer',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
            padding: '6px 16px', borderRadius: 12,
            transition: 'all 0.2s ease',
            position: 'relative'
          }}
        >
          {page === tab.id && (
            <div style={{
              position: 'absolute', top: -10, left: '50%', transform: 'translateX(-50%)',
              width: 32, height: 2, background: 'linear-gradient(90deg, transparent, #D4AF37, transparent)',
              borderRadius: 2
            }} />
          )}
          <span style={{ fontSize: 24, transition: 'transform 0.2s', transform: page === tab.id ? 'scale(1.2)' : 'scale(1)' }}>
            {tab.icon}
          </span>
          <span style={{
            fontSize: 10, fontWeight: page === tab.id ? 700 : 400,
            color: page === tab.id ? '#D4AF37' : '#555',
            fontFamily: 'Cairo',
          }}>
            {tab.label}
          </span>
        </button>
      ))}
    </div>
  );
};

// ==================== SPLASH SCREEN ====================
const SplashScreen = ({ onDone }) => {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    let p = 0;
    const interval = setInterval(() => {
      p += 2;
      setProgress(p);
      if (p >= 100) { clearInterval(interval); setTimeout(onDone, 300); }
    }, 40);
    return () => clearInterval(interval);
  }, []);
  return (
    <div style={{ position: 'fixed', inset: 0, background: '#000', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', zIndex: 9999 }}>
      <div style={{ position: 'relative', marginBottom: 40 }}>
        <div style={{ width: 100, height: 100, background: 'linear-gradient(135deg, #D4AF37, #FFD700, #B8960C)', borderRadius: 24, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 50, boxShadow: '0 0 50px #D4AF3766' }}>
          🏛️
        </div>
      </div>
      <h1 style={{ color: '#D4AF37', fontSize: 32, fontWeight: 900, marginBottom: 6, letterSpacing: 2 }}>BlackRock</h1>
      <p style={{ color: '#888', fontSize: 14, marginBottom: 50, fontStyle: 'italic' }}>Earn & Invest Platform</p>
      <div style={{ width: 200, height: 4, background: '#1a1a1a', borderRadius: 2, overflow: 'hidden' }}>
        <div style={{ height: '100%', width: `${progress}%`, background: 'linear-gradient(90deg, #D4AF37, #FFD700)', borderRadius: 2, transition: 'width 0.1s ease' }} />
      </div>
      <p style={{ color: '#444', fontSize: 12, marginTop: 16 }}>{progress}%</p>
    </div>
  );
};

// ==================== MAIN APP ====================
const App = () => {
  const [showSplash, setShowSplash] = useState(true);
  const [page, setPage] = useState('home');
  const [toast, setToast] = useState(null);
  const [user, setUser] = useState({
    name: "المستخدم الكريم",
    email: "user@blackrock-earn.com",
    avatar: "👤",
    balance: 2.85,
    totalEarned: 2.85,
    activeDays: 1,
    completedTasks: 5,
    packageId: 0,
    tasksLeft: 5,
    joinDate: "2025-01-01",
  });

  const showToast = useCallback((msg, type = "info") => {
    setToast({ msg, type, id: Date.now() });
  }, []);

  const renderPage = () => {
    switch(page) {
      case 'home': return <HomePage user={user} setUser={setUser} setPage={setPage} showToast={showToast} />;
      case 'tasks': return <TasksPage user={user} setUser={setUser} showToast={showToast} />;
      case 'upgrades': return <UpgradesPage user={user} setUser={setUser} showToast={showToast} />;
      case 'profile': return <ProfilePage user={user} setUser={setUser} showToast={showToast} />;
      default: return null;
    }
  };

  return (
    <div style={{ maxWidth: 480, margin: '0 auto', minHeight: '100vh', background: '#000', position: 'relative' }}>
      {showSplash && <SplashScreen onDone={() => setShowSplash(false)} />}
      {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
      <div style={{ minHeight: '100vh' }}>{renderPage()}</div>
      <BottomNav page={page} setPage={setPage} />
    </div>
  );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
