<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>BlackRock Earn</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter','Cairo',sans-serif;background:#000;color:#fff;overflow-x:hidden}
:root{
  --red:#E31837;--red2:#B01229;--red3:#FF2D4A;
  --dark:#0A0A0A;--card:#111111;--card2:#161616;
  --border:#1E1E1E;--border2:#2A2A2A;
  --muted:#999;--faint:#444;
  --green:#00C851;--gold:#FFB800;--blue:#3B82F6;--purple:#8B5CF6;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:10px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes carousel{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes greenDot{0%,100%{box-shadow:0 0 0 0 rgba(0,200,81,.5)}50%{box-shadow:0 0 0 5px rgba(0,200,81,0)}}
@keyframes redGlow{0%,100%{box-shadow:0 0 10px rgba(227,24,55,.3)}50%{box-shadow:0 0 25px rgba(227,24,55,.6)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes loadBar{from{width:0}to{width:100%}}

.page{animation:fadeIn .35s ease forwards}
.card-enter{animation:fadeUp .4s ease forwards}

.btn-red{background:var(--red);color:#fff;font-weight:700;border-radius:8px;padding:14px;border:none;cursor:pointer;font-family:'Inter','Cairo',sans-serif;font-size:14px;transition:all .2s;width:100%}
.btn-red:active{transform:scale(.97)}
.btn-outline{background:transparent;color:var(--red);border:1px solid var(--red);border-radius:8px;padding:13px;cursor:pointer;font-family:'Inter','Cairo',sans-serif;font-size:14px;width:100%;transition:all .2s}
.btn-outline:active{background:rgba(227,24,55,.08)}
.btn-gray{background:#111;color:#ddd;border:1px solid var(--border2);border-radius:8px;padding:13px;cursor:pointer;font-family:'Inter','Cairo',sans-serif;font-size:14px;width:100%;transition:all .2s}
.btn-gray:active{background:#1a1a1a}
.btn-green{background:var(--green);color:#000;font-weight:700;border-radius:8px;padding:14px;border:none;cursor:pointer;font-family:'Inter','Cairo',sans-serif;font-size:14px;width:100%}

input,textarea{background:#0d0d0d!important;border:1px solid var(--border2)!important;color:#fff!important;border-radius:8px!important;padding:12px 16px!important;width:100%;outline:none;font-family:'Inter','Cairo',sans-serif;font-size:14px;transition:border-color .2s}
input:focus{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(227,24,55,.1)!important}
input::placeholder{color:#444!important}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#0a0a0a;border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp .38s cubic-bezier(.34,1.56,.64,1)}
.modal-handle{width:36px;height:3px;background:#2a2a2a;border-radius:2px;margin:14px auto 0}

.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 24px;z-index:100;width:100%;max-width:480px}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 18px;border-radius:10px;transition:all .2s}

.ticker-bar{overflow:hidden;background:#0a0a0a;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 0}
.ticker-track{display:flex;gap:36px;width:max-content;animation:ticker 22s linear infinite}

.news-wrap{overflow:hidden;border-radius:12px;margin-bottom:20px}
.news-track{display:flex;gap:12px;width:max-content;animation:carousel 38s linear infinite}
.news-track:hover{animation-play-state:paused}

.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.4px}
.t-red{background:rgba(227,24,55,.14);color:var(--red);border:1px solid rgba(227,24,55,.3)}
.t-green{background:rgba(0,200,81,.12);color:var(--green);border:1px solid rgba(0,200,81,.3)}
.t-gold{background:rgba(255,184,0,.12);color:var(--gold);border:1px solid rgba(255,184,0,.3)}
.t-blue{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}

.stat-box{background:#0d0d0d;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-family:'Inter',sans-serif}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:18px 0}
.divider-red{height:1px;background:linear-gradient(90deg,transparent,rgba(227,24,55,.25),transparent);margin:18px 0}

.task-row{background:#0d0d0d;border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;transition:all .3s;cursor:pointer}
.task-row:active{transform:scale(.98)}
.task-done{border-color:rgba(0,200,81,.35)!important;background:#001208!important}
.task-active{border-color:rgba(227,24,55,.5)!important;background:#110005!important;box-shadow:0 0 20px rgba(227,24,55,.08)!important}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;background:#111;border:1px solid #222;border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:10px;animation:slideUp .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.8);min-width:260px;max-width:360px}

.copy-btn{background:#1a1a1a;border:1px solid #2a2a2a;color:#999;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:'Inter','Cairo',sans-serif;transition:all .2s;white-space:nowrap;flex-shrink:0}
.copy-btn:hover{background:#222;color:#fff}

.pkg-card{border-radius:14px;overflow:hidden;position:relative;transition:transform .2s}
.pkg-card:active{transform:scale(.98)}

.progress-ring-svg{transform:rotate(-90deg)}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

/* ──────────────────────────────────────
   DATA
────────────────────────────────────── */

const genRef = () => "BLK-" + Math.random().toString(36).substr(2,8).toUpperCase();

/* ──────────────────────────────────────
   TOAST
────────────────────────────────────── */
function Toast({msg, type, onClose}) {
  React.useEffect(() => {
    const t = setTimeout(onClose, 3500);
    return () => clearTimeout(t);
  }, []);
  const cols = {success:"#00C851", error:"#E31837", warning:"#FFB800", info:"#3B82F6"};
  const icons = {success:"✓", error:"✕", warning:"!", info:"i"};
  return (
    <div className="toast" style={{borderLeft:`3px solid ${cols[type]||"#E31837"}`}}>
      <div style={{width:22,height:22,borderRadius:"50%",background:cols[type],display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,flexShrink:0,color:"#fff"}}>
        {icons[type]}
      </div>
      <span style={{color:"#eee",fontSize:13,fontWeight:500}}>{msg}</span>
    </div>
  );
}

/* ──────────────────────────────────────
   TICKER
────────────────────────────────────── */
function TickerBar() {
  const all = [...TICKERS, ...TICKERS];
  return (
    <div className="ticker-bar">
      <div className="ticker-track">
        {all.map((t,i) => (
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <span style={{color:"#fff",fontWeight:700,fontSize:12,fontFamily:"'Inter',sans-serif"}}>{t.s}</span>
            <span style={{color:"#aaa",fontSize:12,fontFamily:"'Inter',sans-serif"}}>{t.p}</span>
            <span style={{color:t.up?"#00C851":"#E31837",fontSize:11,fontWeight:600,fontFamily:"'Inter',sans-serif"}}>{t.c}</span>
            <span style={{color:"#222",fontSize:14}}>|</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ──────────────────────────────────────
   NEWS CAROUSEL
────────────────────────────────────── */
function NewsCarousel() {
  const all = [...NEWS, ...NEWS];
  return (
    <div className="news-wrap">
      <div className="news-track">
        {all.map((n,i) => (
          <div key={i} style={{
            minWidth:240,background:"#0d0d0d",border:`1px solid ${n.col}22`,

}

/* ──────────────────────────────────────
   COMPANY MODAL
────────────────────────────────────── */

────────────────────────────────────── */
function WithdrawModal({user, setUser, onClose, showToast}) {
  const [amt, setAmt] = React.useState('');
  function go() {
    if (!amt || Number(amt) <= 0) return showToast("أدخل مبلغاً صحيحاً", "error");
    if (Number(amt) > user.balance) return showToast("رصيد غير كافٍ", "error");
    if (Number(amt) < 5) return showToast("الحد الأدنى للسحب 5$", "warning");
    setUser(u => ({...u, balance: u.balance - Number(amt)}));
    showToast("تم طلب السحب بنجاح 🎉", "success");
    onClose();
  }
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div className="modal-handle"/>
        <div style={{padding:"20px 20px 32px"}}>

            <div style={{fontSize:44,marginBottom:10}}>💸</div>
            <h3 style={{color:"#fff",fontSize:20,fontWeight:900,fontFamily:"'Inter',sans-serif",marginBottom:4}}>سحب الأرباح</h3>
            <p style={{color:"#666",fontSize:13}}>المتاح: <span style={{color:"#00C851",fontWeight:700}}>{f(user.balance)}$</span></p>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{color:"#888",fontSize:11,fontFamily:"'Inter',sans-serif",fontWeight:700,display:"block",marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>المبلغ ($)</label>
            <input type="number" placeholder="0.00" value={amt} onChange={e => setAmt(e.target.value)}/>
            {amt && <p style={{color:"#444",fontSize:12,marginTop:6,fontFamily:"'Inter',sans-serif"}}>≈ {f(Number(amt)*250,0)} DZD</p>}

                <span style={{color:"#666",fontSize:12,fontFamily:"'Cairo','Inter',sans-serif"}}>{r.k}</span>
                <span style={{color:"#ddd",fontSize:12,fontWeight:600,fontFamily:"'Inter',sans-serif"}}>{r.v}</span>
              </div>

/* ──────────────────────────────────────
   TASKS PAGE
────────────────────────────────────── */
function TasksPage({user, setUser, showToast}) {
  const [current, setCurrent] = React.useState(null);
  const [timer, setTimer] = React.useState(40);
  const [running, setRunning] = React.useState(false);
  const [done, setDone] = React.useState([]);
  const [blocked, setBlocked] = React.useState(false);
  const [earned, setEarned] = React.useState(0);
  const timerRef = React.useRef(null);
  const pkg = PKG.find(p => p.id === user.packageId) || PKG[0];
  const perTask = pkg.daily / pkg.tasks;
  const progress = ((40 - timer) / 40) * 100;
  const R = 52, C = 2 * Math.PI * R;

  function startTask(i) {
    if (blocked) return showToast("مهامك موقوفة حتى الغد 🔒", "error");
    if (done.includes(i)) return;
    if (running) return;
    setCurrent(i); setTimer(40); setRunning(true);
  }

  React.useEffect(() => {
    if (running && timer > 0) {
      timerRef.current = setTimeout(() => setTimer(t => t - 1), 1000);
    } else if (running && timer === 0) {
      setDone(d => [...d, current]);
      setEarned(e => e + perTask);
      setUser(u => ({
        ...u,
        balance: u.balance + perTask,
        totalEarned: u.totalEarned + perTask,
        completedTasks: u.completedTasks + 1,
        tasksLeft: Math.max(0, u.tasksLeft - 1),
      }));
      showToast("✅ +" + f(perTask) + "$ تم إضافته للرصيد", "success");
      setRunning(false); setCurrent(null);
    }
    return () => clearTimeout(timerRef.current);
  }, [running, timer]);

  function cancelTask() {
    clearTimeout(timerRef.current);
    setRunning(false); setCurrent(null); setTimer(40); setBlocked(true);
    showToast("❌ خسرت ربح هذه المهمة! مهامك موقوفة حتى الغد", "error");
  }

  return (
    <div className="page" style={{paddingBottom:90,minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(180deg,#0a0000,#000)",padding:"52px 20px 20px",borderBottom:"1px solid var(--border)"}}>
        <div style={{fontSize:10,letterSpacing:2,color:"#E31837",fontFamily:"'Inter',sans-serif",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Daily Tasks</div>
        <h1 style={{color:"#fff",fontSize:22,fontWeight:900,fontFamily:"'Inter',sans-serif",marginBottom:4}}>⚡ المهام اليومية</h1>
        <p style={{color:"#555",fontSize:13,fontFamily:"'Cairo','Inter',sans-serif"}}>أكمل {pkg.tasks} مهمة لكسب {f(pkg.daily)}$ يومياً</p>
      </div>

      <div style={{padding:"20px 20px 0"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
          {[
            {val:done.length,label:"منجزة",col:"#00C851"},
            {val:blocked?0:pkg.tasks-done.length,label:"متبقية",col:"#FFB800"},
            {val:f(earned)+"$",label:"اليوم",col:"#E31837"},
          ].map((s,i) => (
            <div key={i} className="stat-box">
              <div style={{color:s.col,fontSize:20,fontWeight:900,fontFamily:"'Inter',sans-serif"}}>{s.val}</div>
              <div style={{color:"#444",fontSize:10,fontFamily:"'Cairo','Inter',sans-serif",marginTop:4}}>{s.label}</div>
            </div>
          ))}
        </div>

        {blocked && (
          <div style={{background:"#110000",border:"1px solid rgba(227,24,55,.3)",borderRadius:12,padding:20,marginBottom:20,textAlign:"center"}}>
            <div style={{fontSize:34,marginBottom:10}}>🚫</div>
            <div style={{color:"#E31837",fontSize:15,fontWeight:700,fontFamily:"'Inter','Cairo',sans-serif",marginBottom:6}}>المهام موقوفة اليوم</div>
            <div style={{color:"#555",fontSize:12,fontFamily:"'Cairo','Inter',sans-serif"}}>ستُفتح تلقائياً في اليوم التالي</div>
          </div>
        )}

        {running && current !== null && (
          <div style={{
            background:"#110000",border:"1px solid rgba(227,24,55,.5)",borderRadius:16,
            padding:24,marginBottom:20,textAlign:"center",boxShadow:"0 0 30px rgba(227,24,55,.08)"
          }}>
            <div style={{color:"#444",fontSize:10,fontFamily:"'Inter',sans-serif",letterSpacing:2,textTransform:"uppercase",marginBottom:14}}>
              Task {current + 1} Running
            </div>
            {/* SVG Ring */}
            <div style={{position:"relative",display:"inline-block",marginBottom:18}}>
              <svg width="130" height="130" className="progress-ring-svg">
                <circle cx="65" cy="65" r={R} fill="none" stroke="#1a1a1a" strokeWidth="6"/>
                <circle cx="65" cy="65" r={R} fill="none"
                  stroke={timer > 20 ? "#E31837" : timer > 10 ? "#FFB800" : "#00C851"}
                  strokeWidth="6" strokeLinecap="round"
                  strokeDasharray={C}
                  strokeDashoffset={C - (progress / 100) * C}
                  style={{transition:"stroke-dashoffset 1s ease,stroke .3s ease"}}
                />
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <span style={{color:"#fff",fontSize:34,fontWeight:900,fontFamily:"'Inter',sans-serif",lineHeight:1}}>{timer}</span>
                <span style={{color:"#333",fontSize:11,fontFamily:"'Inter',sans-serif"}}>sec</span>
              </div>
            </div>
            <div style={{background:"rgba(227,24,55,.08)",border:"1px solid rgba(227,24,55,.2)",borderRadius:10,padding:"10px 20px",marginBottom:14,display:"inline-block"}}>
              <span style={{color:"#E31837",fontSize:16,fontWeight:900,fontFamily:"'Inter',sans-serif"}}>+{f(perTask)} $</span>
            </div>
            <div style={{background:"#1a0000",border:"1px solid rgba(227,24,55,.2)",borderRadius:8,padding:"10px 14px",marginBottom:14}}>
              <p style={{color:"#E31837",fontSize:12,fontFamily:"'Cairo','Inter',sans-serif"}}>⚠️ الإلغاء سيوقف جميع مهامك اليومية!</p>
            </div>
            <button onClick={cancelTask} style={{
              background:"transparent",border:"1px solid rgba(227,24,55,.3)",color:"rgba(227,24,55,.7)",
              borderRadius:8,padding:"10px 24px",cursor:"pointer",fontFamily:"'Inter','Cairo',sans-serif",fontSize:13
            }}>✕ إلغاء (تحذير)</button>
          </div>
        )}

        {/* Task List */}
        <div className="section-label">TASKS — {pkg.name}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {Array.from({length: pkg.tasks}, (_, i) => {
            const isDone = done.includes(i);
            const isActive = current === i && running;
            const isLocked = blocked || (running && !isDone && !isActive);
            return (
              <div key={i}
                onClick={() => !isDone && !isActive && !isLocked && startTask(i)}
                className={"task-row" + (isDone?" task-done":isActive?" task-active":"")}
                style={{opacity:isLocked&&!isActive?0.4:1, cursor:isDone||isLocked?"not-allowed":"pointer"}}
              >
                <div style={{
                  width:36,height:36,borderRadius:8,flexShrink:0,
                  background:isDone?"rgba(0,200,81,.1)":isActive?"rgba(227,24,55,.1)":"#1a1a1a",
                  border:`1px solid ${isDone?"rgba(0,200,81,.4)":isActive?"rgba(227,24,55,.5)":"#2a2a2a"}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:isDone?16:13,fontWeight:900,
                  color:isDone?"#00C851":isActive?"#E31837":"#444",
                  fontFamily:"'Inter',sans-serif"
                }}>
                  {isDone ? "✓" : isActive ? "⏳" : i + 1}
                </div>
                <div style={{flex:1}}>
                  <div style={{color:isDone?"#00C851":isActive?"#E31837":"#ccc",fontWeight:700,fontSize:14,fontFamily:"'Cairo','Inter',sans-serif"}}>
                    {isDone ? "اكتملت" : isActive ? "جارية..." : blocked ? "موقوفة" : "مهمة " + (i+1)}
                  </div>
                  <div style={{color:"#333",fontSize:11,fontFamily:"'Inter',sans-serif",marginTop:2}}>+{f(perTask)} USD · 40s</div>
                </div>
                <div>
                  {isDone
                    ? <span style={{color:"#00C851",fontSize:12,fontWeight:700,fontFamily:"'Inter',sans-serif"}}>+{f(perTask)}$</span>
                    : isActive
                      ? <span style={{color:"#E31837",fontSize:18,fontWeight:900,fontFamily:"'Inter',sans-serif"}}>{timer}</span>
                      : <span style={{color:"#2a2a2a",fontSize:18}}>›</span>
                  }
                </div>
              </div>
            );
          })}
        </div>

        {/* Progress Bar */}
        <div style={{background:"#0d0d0d",border:"1px solid var(--border)",borderRadius:12,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <span style={{color:"#666",fontSize:12,fontFamily:"'Cairo','Inter',sans-serif"}}>تقدم اليوم</span>
            <span style={{color:pkg.color,fontSize:12,fontWeight:700,fontFamily:"'Inter',sans-serif"}}>{done.length}/{pkg.tasks}</span>
          </div>
          <div style={{background:"#1a1a1a",borderRadius:4,height:4,overflow:"hidden"}}>
            <div style={{
              height:"100%",background:pkg.color,borderRadius:4,
              width:`${(done.length/pkg.tasks)*100}%`,transition:"width .5s ease"
            }}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:10}}>
            <span style={{color:"#333",fontSize:11,fontFamily:"'Cairo','Inter',sans-serif"}}>المكتسب: {f(earned)}$</span>
            <span style={{color:"#333",fontSize:11,fontFamily:"'Cairo','Inter',sans-serif"}}>الهدف: {f(pkg.daily)}$</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ──────────────────────────────────────
   BOTTOM NAV
────────────────────────────────────── */
function BottomNav({page, setPage}) {
  const tabs = [
    {id:"home", icon:"🏠", label:"Home"},
    {id:"tasks", icon:"⚡", label:"Tasks"},
    {id:"upgrades", icon:"🚀", label:"Upgrade"},
    {id:"profile", icon:"👤", label:"Profile"},
  ];
  return (
    <div className="bottom-bar">
      {tabs.map(t => (
        <button key={t.id} className="nav-btn" onClick={() => setPage(t.id)}
          style={{background: page === t.id ? "rgba(227,24,55,.1)" : "transparent"}}>
          <div style={{position:"relative",width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {page === t.id && (
              <div style={{
                position:"absolute",top:-8,left:"50%",transform:"translateX(-50%)",
                width:20,height:2,background:"#E31837",borderRadius:1
              }}/>
            )}
            <span style={{fontSize:20,transition:"transform .2s",transform:page===t.id?"scale(1.15)":"scale(1)"}}>{t.icon}</span>
          </div>
          <span style={{
            fontSize:9,fontFamily:"'Inter',sans-serif",fontWeight:700,
            color:page===t.id?"#E31837":"#444",letterSpacing:.5,textTransform:"uppercase"
          }}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ──────────────────────────────────────
   SPLASH
────────────────────────────────────── */
function Splash({onDone}) {
  const [prog, setProg] = React.useState(0);
  React.useEffect(() => {
    let v = 0;
    const t = setInterval(() => {
      v += 1.5;
      setProg(v);
      if (v >= 100) { clearInterval(t); setTimeout(onDone, 300); }
    }, 28);
    return () => clearInterval(t);
  }, []);
  return (
    <div style={{position:"fixed",inset:0,background:"#000",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:9999}}>
      <div style={{
        width:88,height:88,background:"#E31837",borderRadius:20,
        display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:38,fontWeight:900,color:"#fff",fontFamily:"'Inter',sans-serif",
        boxShadow:"0 0 60px rgba(227,24,55,.5),0 0 120px rgba(227,24,55,.2)",marginBottom:36
      }}>B</div>
      <div style={{color:"#E31837",fontSize:26,fontWeight:900,fontFamily:"'Inter',sans-serif",letterSpacing:3,marginBottom:6}}>BLACKROCK</div>
      <div style={{color:"#222",fontSize:11,fontFamily:"'Inter',sans-serif",letterSpacing:4,textTransform:"uppercase",marginBottom:46}}>EARN PLATFORM</div>
      <div style={{width:180,height:2,background:"#111",borderRadius:1,overflow:"hidden"}}>
        <div style={{height:"100%",width:prog+"%",background:"#E31837",borderRadius:1,transition:"width .05s linear"}}/>
      </div>
      <div style={{color:"#222",fontSize:11,fontFamily:"'Inter',sans-serif",marginTop:10}}>{Math.floor(prog)}%</div>
    </div>
  );
}

/* ──────────────────────────────────────
   APP ROOT
────────────────────────────────────── */
function App() {
  const [splash, setSplash] = React.useState(true);
  const [page, setPage] = React.useState("home");
  const [toast, setToast] = React.useState(null);
  const [user, setUser] = React.useState({
    name: "المستخدم الكريم",
    email: "user@blackrock-earn.com",
    balance: 2.85,
    totalEarned: 2.85,
    activeDays: 1,
    completedTasks: 5,
    packageId: 0,
    tasksLeft: 5,
    referrals: 0,
    refCode: genRef(),
    city: "الجزائر"
  });

  const showToast = React.useCallback((msg, type) => {
    setToast({msg, type: type||"info", id: Date.now()});
  }, []);

  function renderPage() {
    if (page === "home") return <HomePage user={user} setUser={setUser} setPage={setPage} showToast={showToast}/>;
    if (page === "tasks") return <TasksPage user={user} setUser={setUser} showToast={showToast}/>;
    if (page === "upgrades") return <UpgradesPage user={user} setUser={setUser} showToast={showToast}/>;
    if (page === "profile") return <ProfilePage user={user} setUser={setUser} showToast={showToast}/>;
    return null;
  }

  return (
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#000",position:"relative",overflow:"hidden"}}>
      {splash && <Splash onDone={() => setSplash(false)}/>}
      {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onClose={() => setToast(null)}/>}
      {renderPage()}
      {!splash && <BottomNav page={page} setPage={setPage}/>}
    </div>
  );
}
