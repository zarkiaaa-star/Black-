body{font-family:'Cairo','Inter',sans-serif;background:#030303;color:#fff;overflow-x:hidden}
:root{

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:10px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(70px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes carousel{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(227,24,55,.3)}50%{box-shadow:0 0 22px rgba(227,24,55,.7)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(220px) rotate(720deg);opacity:0}}
@keyframes shine{0%{left:-100%}100%{left:200%}}
@keyframes bellShake{0%,100%{transform:rotate(0)}20%{transform:rotate(-20deg)}40%{transform:rotate(20deg)}60%{transform:rotate(-12deg)}80%{transform:rotate(12deg)}}
@keyframes badgePop{0%{transform:scale(0)}80%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes progressFill{from{width:0%}to{width:var(--w)}}
@keyframes taskComplete{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.page{animation:fadeIn .35s ease forwards}
.slide-up{animation:slideUp .4s cubic-bezier(.34,1.56,.64,1) forwards}

/* ── BUTTONS ── */
.btn{border:none;cursor:pointer;font-family:'Cairo','Inter',sans-serif;font-weight:700;border-radius:12px;padding:14px 20px;font-size:14px;width:100%;transition:all .2s;letter-spacing:.3px}
.btn:active{transform:scale(.96)}
.btn-red{background:linear-gradient(135deg,#E31837,#a0101f);color:#fff}
.btn-green{background:linear-gradient(135deg,#00C851,#007a2f);color:#fff}
.btn-gold{background:linear-gradient(135deg,#FFB800,#cc8800);color:#000}
.btn-purple{background:linear-gradient(135deg,#8B5CF6,#5b21b6);color:#fff}
.btn-gray{background:#161616;color:#ccc;border:1px solid #2d2d2d}
.btn-outline-red{background:transparent;color:var(--red);border:1.5px solid var(--red)}
.btn-sm{padding:9px 16px;font-size:12px;border-radius:9px}

/* ── INPUTS ── */
.inp{background:#111!important;border:1.5px solid #2d2d2d!important;color:#fff!important;border-radius:12px!important;padding:14px 18px!important;width:100%;outline:none;font-family:'Cairo','Inter',sans-serif;font-size:14px;transition:all .2s}
.inp:focus{border-color:var(--red)!important;box-shadow:0 0 0 4px rgba(227,24,55,.1)!important}
.inp::placeholder{color:#444!important}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.93);backdrop-filter:blur(12px);z-index:900;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#0d0d0d;border:1px solid #252525;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:93vh;overflow-y:auto;animation:slideUp .4s cubic-bezier(.34,1.56,.64,1)}
.modal-handle{width:40px;height:4px;background:#252525;border-radius:2px;margin:14px auto 0}

/* ── BOTTOM NAV ── */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);background:rgba(5,5,5,.98);backdrop-filter:blur(24px);border-top:1px solid #1a1a1a;display:flex;justify-content:space-around;padding:10px 0 28px;z-index:100;width:100%;max-width:480px}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 16px;border-radius:12px;transition:all .2s;min-width:60px}

/* ── CARDS ── */
.card{background:#0f0f0f;border:1px solid #222;border-radius:16px;padding:18px}
.card-glow-red{box-shadow:0 0 0 1px rgba(227,24,55,.15),0 4px 20px rgba(227,24,55,.06)}
.card-glow-gold{box-shadow:0 0 0 1px rgba(255,184,0,.15),0 4px 20px rgba(255,184,0,.06)}
.card-glow-green{box-shadow:0 0 0 1px rgba(0,200,81,.15),0 4px 20px rgba(0,200,81,.06)}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.3px}
.t-red{background:rgba(227,24,55,.15);color:#ff4d6a;border:1px solid rgba(227,24,55,.3)}
.t-green{background:rgba(0,200,81,.13);color:#00e85c;border:1px solid rgba(0,200,81,.3)}
.t-gold{background:rgba(255,184,0,.13);color:#ffc933;border:1px solid rgba(255,184,0,.3)}
.t-blue{background:rgba(59,130,246,.13);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.t-purple{background:rgba(139,92,246,.13);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.t-cyan{background:rgba(6,182,212,.13);color:#22d3ee;border:1px solid rgba(6,182,212,.3)}
.t-orange{background:rgba(249,115,22,.13);color:#fb923c;border:1px solid rgba(249,115,22,.3)}

.ticker-bar{overflow:hidden;background:#0a0a0a;border-top:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;padding:10px 0}
.ticker-track{display:flex;gap:32px;width:max-content;animation:ticker 24s linear infinite}

/* ── NEWS CAROUSEL ── */
.news-wrap{overflow:hidden;border-radius:14px;margin-bottom:22px}
.news-track{display:flex;gap:12px;width:max-content;animation:carousel 40s linear infinite}
.news-track:hover{animation-play-state:paused}

/* ── TASK CARDS ── */
.task-card{border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;transition:all .3s;cursor:pointer;position:relative;overflow:hidden}
.task-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.task-idle{background:#0f0f0f;border:1px solid #1e1e1e}
.task-idle::before{background:linear-gradient(90deg,transparent,#2a2a2a,transparent)}
.task-idle:active{transform:scale(.98)}
.task-running{background:linear-gradient(135deg,#110008,#0d0005);border:1.5px solid rgba(227,24,55,.5);animation:glowPulse 2s infinite}
.task-running::before{background:linear-gradient(90deg,transparent,#E31837,transparent)}
.task-done{background:linear-gradient(135deg,#001510,#000d08);border:1.5px solid rgba(0,200,81,.4);animation:taskComplete .4s ease}
.task-done::before{background:linear-gradient(90deg,transparent,#00C851,transparent)}
.task-cancelled{background:linear-gradient(135deg,#100800,#0a0500);border:1px solid rgba(249,115,22,.25);opacity:.7}
.task-cancelled::before{background:linear-gradient(90deg,transparent,#F97316,transparent)}

/* ── ACHIEVEMENT CARD ── */
.ach-card{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:9px;transition:all .3s}
.ach-done{border-color:rgba(255,184,0,.3)!important;background:linear-gradient(135deg,#0d0800,#080500)!important}
.ach-ready{border-color:rgba(0,200,81,.4)!important;background:linear-gradient(135deg,#001510,#000d08)!important;animation:glowPulse 2s infinite}
.ach-locked{opacity:.38;filter:grayscale(.8)}

/* ── SHINE ── */
.shine{position:relative;overflow:hidden}
.shine::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:shine 3s infinite}

/* ── TOAST ── */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:9999;background:#141414;border:1px solid #252525;border-radius:14px;padding:13px 20px;display:flex;align-items:center;gap:12px;animation:slideUp .3s ease;box-shadow:0 10px 40px rgba(0,0,0,.9);min-width:280px;max-width:380px;pointer-events:none}

/* ── NOTIF PANEL ── */
.notif-panel{position:absolute;top:58px;right:0;width:310px;background:#0d0d0d;border:1px solid #252525;border-radius:18px;z-index:800;box-shadow:0 16px 50px rgba(0,0,0,.95);animation:slideInRight .3s ease}

/* ── PROGRESS RING ── */

/* ── STAT BOX ── */

/* ════════════════════════════════════════

function NotifBell({user,setUser}){
  const[open,setOpen]=useState(false);
  const[shake,setShake]=useState(false);
  const ref=useRef(null);
  const unread=(user.notifications||[]).filter(n=>!n.read).length;
  useEffect(()=>{if(unread>0){setShake(true);setTimeout(()=>setShake(false),600);}},[unread]);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  function markAll(){
    setUser(u=>{const nu={...u,notifications:(u.notifications||[]).map(n=>({...n,read:true}))};saveUser(nu);return nu;});
  }
  const notifs=user.notifications||[];
  return(
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={()=>setOpen(o=>!o)} className={shake?"bellShake":""}
        style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:"50%",width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",fontSize:18,animation:shake?"bellShake .6s ease":"none"}}>

        <div className="notif-panel">
          <div style={{padding:"14px 16px",borderBottom:"1px solid #1a1a1a",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:"#f0f0f0",fontWeight:700,fontSize:14}}>🔔 الإشعارات</span>

              ?<div style={{padding:22,textAlign:"center",color:"#444",fontSize:13}}>لا توجد إشعارات 📭</div>

                  <span style={{fontSize:18,flexShrink:0}}>{n.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{color:n.read?"#777":"#e8e8e8",fontSize:12.5,fontWeight:n.read?400:600,lineHeight:1.5}}>{n.msg}</div>

/* ════════════════════════════════════════
   AUTO-UNLOCK ACHIEVEMENTS
════════════════════════════════════════ */
function checkAchs(user,setUser,showToast,lang){
  const unlocked=user.unlockedAchievements||[];
  let nu={...user};let changed=false;
  ACHS.forEach(a=>{
    if(unlocked.includes(a.id))return;
    const v=a.type==="completedTasks"?nu.completedTasks:a.type==="totalEarned"?nu.totalEarned:a.type==="referrals"?nu.referrals:a.type==="packageId"?nu.packageId:a.type==="activeDays"?nu.activeDays:a.type==="spinWins"?nu.spinWins:0;
    if(v>=a.target){
      nu={...nu,
        balance:+(nu.balance+a.reward).toFixed(4),
        totalEarned:+(nu.totalEarned+a.reward).toFixed(4),
        unlockedAchievements:[...(nu.unlockedAchievements||[]),a.id],
        notifications:[...(nu.notifications||[]),{icon:"🏅",msg:`🏅 إنجاز جديد: ${lang==="ar"?a.title.ar:a.title.en}${a.reward>0?" (+"+f(a.reward)+"$)":""}`,time:nowTime(),read:false}],
      };
      changed=true;
      if(a.reward>0)showToast(`🏅 إنجاز: ${lang==="ar"?a.title.ar:a.title.en} +${f(a.reward)}$`,"success");
    }
  });
  if(changed){setUser(nu);saveUser(nu);}
}

/* ════════════════════════════════════════
   SPIN WHEEL MODAL
════════════════════════════════════════ */
function SpinModal({onClose,onWin,spins}){
  const[spinning,setSpinning]=useState(false);
  const[rot,setRot]=useState(0);
  const[result,setResult]=useState(null);
  const[confetti,setConfetti]=useState([]);
  const seg=SPIN_PRIZES.length,segA=360/seg;
  function doSpin(){
    if(spinning||spins<=0)return;
    setResult(null);
    const extra=1440+Math.floor(Math.random()*360);
    const nr=rot+extra;setRot(nr);setSpinning(true);
    setTimeout(()=>{
      setSpinning(false);
      const norm=nr%360;
      const idx=Math.floor(((360-norm)%360)/segA)%seg;
      const prize=SPIN_PRIZES[idx];setResult(prize);
      if(prize.val>0){
        setConfetti(Array.from({length:24},(_,i)=>({id:i,x:Math.random()*300-150,color:["#E31837","#FFB800","#00C851","#3B82F6","#8B5CF6","#fff"][Math.floor(Math.random()*6)],delay:Math.random()*.6,size:5+Math.random()*8})));
        setTimeout(()=>setConfetti([]),2200);onWin(prize.val);
      }
    },4100);
  }
  const gP=i=>{const s=(i*segA-90)*Math.PI/180,e=((i+1)*segA-90)*Math.PI/180,r=130,x1=140+r*Math.cos(s),y1=140+r*Math.sin(s),x2=140+r*Math.cos(e),y2=140+r*Math.sin(e);return`M 140 140 L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`;};
  const gT=i=>{const m=(i*segA+segA/2-90)*Math.PI/180;return{x:140+88*Math.cos(m),y:140+88*Math.sin(m)};};
  return(
    <Modal onClose={onClose}>
      <div style={{position:"relative",overflow:"hidden"}}>
        {confetti.map(c=><div key={c.id} style={{position:"absolute",top:"35%",left:`calc(50% + ${c.x}px)`,width:c.size,height:c.size,background:c.color,borderRadius:2,animation:`confetti 1.6s ${c.delay}s ease forwards`,pointerEvents:"none"}}/>)}
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{fontSize:40,marginBottom:8,animation:"float 2s ease-in-out infinite"}}>🎰</div>
          <h3 style={{color:"#ffc933",fontSize:22,fontWeight:900,marginBottom:5}}>عجلة الحظ 🎰</h3>
          <div className="tag t-gold" style={{fontSize:12}}>{spins} دورات متبقية</div>
        </div>
        <div style={{position:"relative",width:290,margin:"0 auto 22px",height:310}}>
          <div style={{position:"absolute",top:-20,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"13px solid transparent",borderRight:"13px solid transparent",borderTop:"24px solid #FFB800",zIndex:10,filter:"drop-shadow(0 3px 6px rgba(0,0,0,.6))"}}/>
          <div style={{width:290,height:290,borderRadius:"50%",border:"5px solid #1a1a1a",position:"relative",overflow:"hidden",transform:`rotate(${rot}deg)`,transition:spinning?"transform 4s cubic-bezier(.17,.67,.12,.99)":"none"}}>
            <svg width="290" height="290" viewBox="0 0 280 280">
              {SPIN_PRIZES.map((p,i)=>(
                <g key={i}>
                  <path d={gP(i)} fill={p.color} stroke="#000" strokeWidth="1.5"/>
                  <text x={gT(i).x} y={gT(i).y} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize="11" fontWeight="800" fontFamily="'Inter',sans-serif" transform={`rotate(${i*segA+segA/2},${gT(i).x},${gT(i).y})`}>{p.label}</text>
                </g>
              ))}
            </svg>
          </div>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:46,height:46,background:"#111",borderRadius:"50%",border:"3px solid #252525",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,zIndex:5}}>⭐</div>
        </div>
        {result&&(
          <div style={{background:result.val>0?"linear-gradient(135deg,#001a0d,#000f08)":"#111",border:`1px solid ${result.val>0?"rgba(0,200,81,.4)":"#252525"}`,borderRadius:14,padding:"18px 22px",marginBottom:16,textAlign:"center"}}>
            {result.val>0?(<><div style={{fontSize:36,marginBottom:6}}>🎉</div><div style={{color:"#00e85c",fontSize:24,fontWeight:900}}>+{f(result.val)}$</div><div style={{color:"#666",fontSize:12,marginTop:4}}>أُضيفت لرصيدك ✅</div></>)
            :(<><div style={{fontSize:36,marginBottom:6}}>😔</div><div style={{color:"#555",fontSize:16,fontWeight:700}}>حظاً أوفر في المرة القادمة!</div></>)}
          </div>
        )}
        <button onClick={doSpin} disabled={spinning||spins<=0} className="btn btn-gold shine" style={{opacity:spinning||spins<=0?.5:1,fontSize:15,marginBottom:10}}>
          {spinning?"⏳ جارٍ الدوران...":spins>0?`🎰 أدِر العجلة! (${spins})`:  "لا توجد دورات متبقية"}
        </button>
        <button className="btn btn-gray" onClick={onClose}>إغلاق</button>
      </div>
    </Modal>
  );
}

function AchModal({user,setUser,onClose,showToast,lang}){
  function getV(type){return type==="completedTasks"?user.completedTasks:type==="totalEarned"?user.totalEarned:type==="referrals"?user.referrals:type==="packageId"?user.packageId:type==="activeDays"?user.activeDays:type==="spinWins"?user.spinWins:0;}
  function claim(a){
    const nu={...user,balance:+(user.balance+a.reward).toFixed(4),totalEarned:+(user.totalEarned+a.reward).toFixed(4),unlockedAchievements:[...(user.unlockedAchievements||[]),a.id],notifications:[...(user.notifications||[]),{icon:"🏅",msg:`🏅 ${a.title.ar} — حصلت على ${f(a.reward)}$!`,time:nowTime(),read:false}]};
    setUser(nu);saveUser(nu);if(a.reward>0)showToast(`🏅 إنجاز! +${f(a.reward)}$`,"success");
  }
  const unlocked=user.unlockedAchievements||[];
  const cats=[
    {l:"📋 المهام",items:ACHS.filter(a=>a.type==="completedTasks")},
    {l:"💰 الأرباح",items:ACHS.filter(a=>a.type==="totalEarned")},
    {l:"👥 الإحالات",items:ACHS.filter(a=>a.type==="referrals")},
    {l:"🚀 الترقيات & النشاط",items:ACHS.filter(a=>a.type==="packageId"||a.type==="activeDays"||a.type==="spinWins")},
  ];
  const totalReward=ACHS.filter(a=>unlocked.includes(a.id)).reduce((s,a)=>s+a.reward,0);
  return(
    <Modal onClose={onClose}>
      <div style={{textAlign:"center",marginBottom:22}}>
        <div style={{fontSize:48,marginBottom:8}}>🏅</div>
        <h3 style={{color:"#f0f0f0",fontSize:21,fontWeight:900,marginBottom:6}}>إنجازاتي</h3>
        <p style={{color:"#666",fontSize:13,marginBottom:12}}>تابع تقدمك واستلم مكافآتك</p>
        <div style={{display:"flex",justifyContent:"center",gap:10}}>
          <div className="tag t-gold">{unlocked.length}/{ACHS.length} مفتوح</div>
          <div className="tag t-green">+{f(totalReward)}$ مكتسب</div>
        </div>
      </div>
      {cats.map((cat,ci)=>(
        <div key={ci} style={{marginBottom:20}}>
          <div className="lbl" style={{marginBottom:10}}>{cat.l}</div>
          {cat.items.map((a,ai)=>{
            const v=getV(a.type);const pct=Math.min((v/a.target)*100,100);const done=unlocked.includes(a.id);const ready=v>=a.target&&!done;
            return(
              <div key={ai} className={`ach-card ${done?"ach-done":ready?"ach-ready":"ach-locked"}`}>
                <div style={{width:48,height:48,borderRadius:13,background:`${a.col}18`,border:`1px solid ${a.col}35`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{done?a.icon:ready?a.icon:"🔒"}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:done?a.col:ready?"#f0f0f0":"#666",fontWeight:700,fontSize:13.5,marginBottom:2}}>
                    {a.title.ar}{done&&<span style={{color:"#00e85c",fontSize:11,marginRight:5}}> ✅</span>}
                  </div>
                  <div style={{color:"#555",fontSize:11.5,marginBottom:done?0:6}}>{a.desc.ar}</div>
                  {!done&&(
                    <div>
                      <div style={{background:"#1a1a1a",borderRadius:4,height:5,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pct}%`,background:a.col,borderRadius:4,transition:"width .5s"}}/>
                      </div>
                      <div style={{color:"#444",fontSize:10,marginTop:3,fontFamily:"'Inter',sans-serif"}}>{v}/{a.target}</div>
                    </div>
                  )}
                  {a.reward>0&&<div style={{color:done?"#444":a.col,fontSize:11,fontWeight:700,marginTop:3}}>🏆 مكافأة: +{f(a.reward)}$</div>}
                </div>
                {ready&&<button onClick={()=>claim(a)} className="btn btn-sm" style={{background:a.col,color:["#FFB800","#00C851"].includes(a.col)?"#000":"#fff",border:"none",flexShrink:0}}>استلم 🎁</button>}
              </div>
            );
          })}
        </div>
      ))}
      <button className="btn btn-gray" onClick={onClose}>إغلاق</button>
    </Modal>
  );
}

/* ════════════════════════════════════════
   TASKS PAGE — REAL PERSISTENT STATE
════════════════════════════════════════ */
function TasksPage({user,setUser,showToast}){
  const pkg=PKG[user.packageId]||PKG[0];
  const perTask=+(pkg.daily/pkg.tasks).toFixed(4);
  const today=todayStr();

  // Load or init task states for today
  const initTaskStates=useCallback(()=>{
    const saved=loadTasks();
    if(saved&&saved.date===today&&saved.packageId===user.packageId){return saved.states;}
    const fresh=Array.from({length:pkg.tasks},(_,i)=>({status:"idle",taskType:i%TASK_TYPES.length}));
    saveTasks({date:today,packageId:user.packageId,states:fresh});
    return fresh;
  },[today,pkg]);

  const[states,setStatesRaw]=useState(initTaskStates);
  const[current,setCurrent]=useState(null);
  const[timer,setTimer]=useState(40);
  const[earned,setEarned]=useState(()=>{
    const saved=loadTasks();
    if(saved&&saved.date===today&&saved.packageId===user.packageId){
      return saved.states.filter(s=>s.status==="done").length*perTask;
    }
    return 0;
  });
  const timerRef=useRef(null);
  const R=54,C=2*Math.PI*R;

  function setStates(ns){
    setStatesRaw(ns);
    saveTasks({date:today,packageId:user.packageId,states:ns});
  }

  // Visibility change — cancel running task
  useEffect(()=>{
    const onVis=()=>{
      if(document.hidden&&current!==null&&states[current]?.status==="running"){
        clearTimeout(timerRef.current);
        const ns=[...states];ns[current]={...ns[current],status:"cancelled"};
        setStates(ns);setCurrent(null);setTimer(40);
        showToast("⚠️ غادرت الصفحة — خسرت ربح هذه المهمة فقط","warning");
      }
    };
    document.addEventListener("visibilitychange",onVis);
    return()=>document.removeEventListener("visibilitychange",onVis);
  },[current,states]);

  useEffect(()=>{
    if(current===null||states[current]?.status!=="running")return;
    if(timer>0){timerRef.current=setTimeout(()=>setTimer(t=>t-1),1000);}
    else{
      const ns=[...states];ns[current]={...ns[current],status:"done"};
      setStates(ns);
      const newEarned=+(earned+perTask).toFixed(4);
      setEarned(newEarned);
      setUser(u=>{
        const nu={...u,balance:+(u.balance+perTask).toFixed(4),totalEarned:+(u.totalEarned+perTask).toFixed(4),completedTasks:u.completedTasks+1,
          notifications:[...(u.notifications||[]),{icon:"⚡",msg:`✅ مهمة مكتملة +${f(perTask)}$`,time:nowTime(),read:false}]};
        saveUser(nu);return nu;
      });
      showToast(`✅ مهمة مكتملة! +${f(perTask)}$`,"success");
      setCurrent(null);
    }
    return()=>clearTimeout(timerRef.current);
  },[current,timer,states]);

  useEffect(()=>{
    if(user.completedTasks>0)checkAchs(user,setUser,showToast,"ar");
  },[user.completedTasks]);

  function startTask(i){
    if(states[i].status!=="idle")return;
    if(current!==null)return showToast("⏳ أكمل المهمة الجارية أولاً","warning");
    const ns=[...states];ns[i]={...ns[i],status:"running"};
    setStates(ns);setCurrent(i);setTimer(40);
  }

  function cancelTask(){
    clearTimeout(timerRef.current);
    const ns=[...states];ns[current]={...ns[current],status:"cancelled"};
    setStates(ns);setCurrent(null);setTimer(40);
    showToast("❌ تم إلغاء المهمة — خسرت ربحها فقط","warning");
  }

  const done=states.filter(s=>s.status==="done").length;
  const idle=states.filter(s=>s.status==="idle").length;
  const cancelled=states.filter(s=>s.status==="cancelled").length;
  const pct=((40-timer)/40)*100;
  const dayPct=Math.round((done/pkg.tasks)*100);

  return(
    <div className="page" style={{paddingBottom:95,minHeight:"100vh"}}>
      {/* Header */}
      <div className="page-header">
        <div style={{marginBottom:6}}>
          <span style={{color:"#E31837",fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>Daily Tasks ⚡</span>
        </div>
        <h1 style={{color:"#f0f0f0",fontSize:24,fontWeight:900,marginBottom:6}}>⚡ المهام اليومية</h1>
        <p style={{color:"#666",fontSize:13}}>
          باقة <span style={{color:pkg.color,fontWeight:700}}>{pkg.emoji} {pkg.name}</span> — 
          كل مهمة: <span style={{color:"#00e85c",fontWeight:700}}>${f(perTask)}</span> — 
          يومي: <span style={{color:"#ffc933",fontWeight:700}}>${f(pkg.daily)}</span>
        </p>
      </div>

      <div style={{padding:"18px 18px 0"}}>
        {/* Stats Row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:18}}>
          {[
            {v:done,l:"منجزة ✅",c:"#00e85c",bg:"rgba(0,200,81,.08)"},
            {v:idle,l:"متاحة ⚡",c:"#ffc933",bg:"rgba(255,184,0,.08)"},
            {v:cancelled,l:"ملغاة ❌",c:"#fb923c",bg:"rgba(249,115,22,.08)"},
            {v:f(earned)+"$",l:"اليوم 💰",c:"#E31837",bg:"rgba(227,24,55,.08)"},
          ].map((s,i)=>(
            <div key={i} style={{background:s.bg,border:`1px solid ${s.c}25`,borderRadius:13,padding:"11px 7px",textAlign:"center"}}>
              <div style={{color:s.c,fontSize:15,fontWeight:900}}>{s.v}</div>
              <div style={{color:"#555",fontSize:9,marginTop:3}}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* Day Progress */}
        <div className="card card-glow-red" style={{marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{color:"#888",fontSize:13,fontWeight:600}}>📊 تقدم اليوم</span>
            <span style={{color:pkg.color,fontSize:14,fontWeight:900}}>{done}/{pkg.tasks} — {dayPct}%</span>
          </div>
          <div style={{background:"#1a1a1a",borderRadius:6,height:10,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${dayPct}%`,background:`linear-gradient(90deg,${pkg.color},${pkg.color}aa)`,borderRadius:6,transition:"width .5s ease"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:14}}>
            {[{k:"💰 مكتسب",v:f(earned)+"$",c:"#00e85c"},{k:"🎯 الهدف",v:f(pkg.daily)+"$",c:"#ffc933"},{k:"⚡ لكل مهمة",v:f(perTask)+"$",c:"#E31837"}].map((s,i)=>(
              <div key={i} style={{textAlign:"center",background:"#111",borderRadius:10,padding:"10px 6px"}}>
                <div style={{color:s.c,fontSize:13,fontWeight:700}}>{s.v}</div>
                <div style={{color:"#444",fontSize:10,marginTop:3}}>{s.k}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Warning if cancelled */}
        {cancelled>0&&(
          <div style={{background:"linear-gradient(135deg,#110600,#0a0300)",border:"1px solid rgba(249,115,22,.3)",borderRadius:14,padding:"14px 16px",marginBottom:18,display:"flex",alignItems:"flex-start",gap:12}}>
            <span style={{fontSize:22,flexShrink:0}}>⚠️</span>
            <div>
              <div style={{color:"#fb923c",fontSize:13,fontWeight:700,marginBottom:3}}>مهام ملغاة: {cancelled}</div>
              <div style={{color:"#666",fontSize:12,lineHeight:1.6}}>هذه المهام ستُفتح في اليوم التالي. المهام الأخرى لا تزال متاحة الآن.</div>
            </div>
          </div>
        )}

        {/* RUNNING TASK TIMER */}
        {current!==null&&states[current]?.status==="running"&&(
          <div style={{background:"linear-gradient(135deg,#110008,#0a0005)",border:"1.5px solid rgba(227,24,55,.5)",borderRadius:22,padding:24,marginBottom:20,textAlign:"center",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#E31837,transparent)"}}/>
            <div style={{position:"absolute",inset:0,background:"radial-gradient(circle at 50% 50%,rgba(227,24,55,.04),transparent)",pointerEvents:"none"}}/>

            <div style={{color:"#555",fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:14}}>
              {TASK_TYPES[states[current].taskType].icon} مهمة {current+1} جارية • +${f(perTask)}
            </div>

            {/* Circular Timer */}
            <div style={{position:"relative",display:"inline-block",marginBottom:18}}>
              <svg width="130" height="130" className="ring-svg">
                <circle cx="65" cy="65" r={R} fill="none" stroke="#1a1a1a" strokeWidth="8"/>
                <circle cx="65" cy="65" r={R} fill="none"
                  stroke={timer>25?"#E31837":timer>12?"#FFB800":"#00C851"}
                  strokeWidth="8" strokeLinecap="round"
                  strokeDasharray={C} strokeDashoffset={C-(pct/100)*C}
                  style={{transition:"stroke-dashoffset 1s ease,stroke .4s ease"}}/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <span style={{color:"#f0f0f0",fontSize:36,fontWeight:900,lineHeight:1}}>{timer}</span>
                <span style={{color:"#444",fontSize:11,marginTop:2}}>ثانية</span>
              </div>
            </div>

            {/* Earn Preview */}
            <div style={{background:"rgba(227,24,55,.08)",border:"1px solid rgba(227,24,55,.2)",borderRadius:12,padding:"11px 20px",marginBottom:14,display:"inline-block"}}>
              <span style={{color:"#ff4d6a",fontSize:18,fontWeight:900}}>+{f(perTask)} USD</span>
            </div>

            <div style={{background:"rgba(249,115,22,.06)",border:"1px solid rgba(249,115,22,.2)",borderRadius:12,padding:"11px 16px",marginBottom:16}}>
              <p style={{color:"#fb923c",fontSize:12,lineHeight:1.7}}>
                ⚠️ <strong>لا تغادر الصفحة</strong> — إلغاء هذه المهمة يُخسرك ربحها فقط، المهام الأخرى تظل متاحة
              </p>
            </div>

            <button onClick={cancelTask}
              style={{background:"transparent",border:"1px solid rgba(227,24,55,.25)",color:"rgba(227,24,55,.7)",borderRadius:10,padding:"10px 26px",cursor:"pointer",fontFamily:"'Cairo','Inter',sans-serif",fontSize:13,fontWeight:600}}>
              ✕ إلغاء المهمة
            </button>
          </div>
        )}

        {/* Rule Banner */}
        <div style={{background:"linear-gradient(135deg,#0d0800,#080006)",border:"1px solid rgba(255,184,0,.2)",borderRadius:14,padding:"13px 16px",marginBottom:18,display:"flex",alignItems:"flex-start",gap:11}}>
          <span style={{fontSize:20,flexShrink:0}}>📋</span>
          <div>
            <div style={{color:"#ffc933",fontSize:13,fontWeight:700,marginBottom:3}}>قاعدة المهام</div>
            <p style={{color:"#666",fontSize:12,lineHeight:1.7}}>أكمل كل مهمة خلال <strong style={{color:"#f0f0f0"}}>40 ثانية</strong> دون مغادرة الصفحة. إلغاء مهمة يُخسرك ربحها فقط — المهام الأخرى تبقى متاحة. تتجدد المهام كل يوم.</p>
          </div>
        </div>

        {/* TASK LIST */}
        <div className="lbl">
          {pkg.emoji} {pkg.name} — {pkg.tasks} مهمة يومية
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
          {states.map((st,i)=>{
            const tt=TASK_TYPES[st.taskType%TASK_TYPES.length];
            const isRunning=st.status==="running";
            const isDone=st.status==="done";
            const isCancelled=st.status==="cancelled";
            const isIdle=st.status==="idle";
            const canStart=isIdle&&current===null;

            return(
              <div key={i} onClick={()=>canStart&&startTask(i)}
                className={`task-card ${isIdle?"task-idle":isRunning?"task-running":isDone?"task-done":"task-cancelled"}`}
                style={{cursor:canStart?"pointer":isRunning?"default":"not-allowed"}}>

                {/* Left Icon */}
                <div style={{width:46,height:46,borderRadius:14,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,
                  background:isDone?`${tt.color}18`:isRunning?`rgba(227,24,55,.12)`:isCancelled?`rgba(249,115,22,.1)`:"#181818",
                  border:`1px solid ${isDone?tt.color+"40":isRunning?"rgba(227,24,55,.4)":isCancelled?"rgba(249,115,22,.3)":"#252525"}`}}>
                  {isDone?"✅":isRunning?"⏳":isCancelled?"❌":tt.icon}
                </div>

                {/* Content */}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:isDone?"#00e85c":isRunning?"#ff4d6a":isCancelled?"#fb923c":"#e0e0e0",fontWeight:700,fontSize:13.5,marginBottom:4,lineHeight:1.3}}>
                    {isDone?`✅ ${tt.title}`:isRunning?`⏳ ${tt.title}`:isCancelled?`❌ ${tt.title}`:tt.title}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    {isIdle&&<div className="tag" style={{background:`${tt.color}12`,color:tt.color,borderColor:`${tt.color}30`,fontSize:10}}>{tt.icon} +${f(perTask)} USD</div>}
                    {isIdle&&<div className="tag t-gold" style={{fontSize:10}}>⏱️ 40 ثانية</div>}
                    {isRunning&&<div className="tag t-red" style={{fontSize:10}}>⏳ {timer}s متبقية</div>}
                    {isRunning&&<div className="tag" style={{background:"rgba(227,24,55,.1)",color:"#ff4d6a",borderColor:"rgba(227,24,55,.25)",fontSize:10}}>+${f(perTask)}</div>}
                    {isDone&&<div className="tag t-green" style={{fontSize:10}}>✅ +${f(perTask)} USD</div>}
                    {isDone&&<div className="tag" style={{background:"rgba(0,200,81,.08)",color:"#555",borderColor:"rgba(0,200,81,.15)",fontSize:10}}>مكتملة</div>}
                    {isCancelled&&<div className="tag t-orange" style={{fontSize:10}}>❌ ملغاة</div>}
                    {isCancelled&&<div className="tag" style={{background:"rgba(249,115,22,.08)",color:"#555",borderColor:"rgba(249,115,22,.15)",fontSize:10}}>⏰ تُفتح غداً</div>}
                  </div>
                </div>

                {/* Right */}
                <div style={{flexShrink:0}}>
                  {isIdle&&canStart&&(
                    <div style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,#E31837,#a0101f)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>▶</div>
                  )}
                  {isRunning&&(
                    <div style={{width:42,height:42,borderRadius:"50%",border:"2.5px solid #E31837",display:"flex",alignItems:"center",justifyContent:"center",color:"#E31837",fontSize:16,fontWeight:900,fontFamily:"'Inter',sans-serif",background:"rgba(227,24,55,.08)"}}>{timer}</div>
                  )}
                  {isDone&&<div style={{fontSize:24}}>✅</div>}
                  {isCancelled&&<div style={{fontSize:22}}>⏰</div>}
                  {isIdle&&!canStart&&<div style={{color:"#252525",fontSize:20}}>🔒</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function UpgradesPage({user,setUser,showToast}){

  return(
    <div className="page" style={{paddingBottom:95,minHeight:"100vh"}}>
      <div className="page-header">

        <h1 style={{color:"#f0f0f0",fontSize:24,fontWeight:900,marginBottom:5}}>🚀 خطط الترقية</h1>

          <div>
            <div style={{color:"#444",fontSize:10,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>الباقة الحالية</div>
            <div style={{color:PKG[user.packageId].color,fontSize:14,fontWeight:700}}>{PKG[user.packageId].emoji} {PKG[user.packageId].name}</div>
          </div>
          <div style={{textAlign:"left"}}>
            <div style={{color:"#444",fontSize:10,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>رصيدك</div>

  const[p,setP]=useState(0);

    let v=0;const t=setInterval(()=>{v+=1.2;setP(v);if(v>=100){clearInterval(t);setTimeout(onDone,350);}},25);
    return()=>clearInterval(t);
  },[]);
  return(
    <div style={{position:"fixed",inset:0,background:"#030303",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:9999}}>
      <div style={{width:92,height:92,background:"linear-gradient(135deg,#E31837,#8B0000)",borderRadius:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,fontWeight:900,color:"#fff",fontFamily:"'Inter',sans-serif",boxShadow:"0 0 70px rgba(227,24,55,.6),0 0 120px rgba(227,24,55,.15)",marginBottom:34,animation:"float 3s ease-in-out infinite"}}>B</div>
      <div style={{color:"#E31837",fontSize:28,fontWeight:900,fontFamily:"'Inter',sans-serif",letterSpacing:4,marginBottom:7}}>BLACKROCK</div>
      <div style={{color:"#252525",fontSize:11,fontFamily:"'Inter',sans-serif",letterSpacing:5,textTransform:"uppercase",marginBottom:50}}>EARN PLATFORM</div>
      <div style={{width:190,height:3,background:"#111",borderRadius:2,overflow:"hidden",marginBottom:12}}>
        <div style={{height:"100%",width:p+"%",background:"linear-gradient(90deg,#E31837,#FFB800)",borderRadius:2,transition:"width .03s linear"}}/>
      </div>
      <div style={{color:"#333",fontSize:12,fontFamily:"'Inter',sans-serif"}}>{Math.floor(p)}%</div>
      <div style={{color:"#1a1a1a",fontSize:10,fontFamily:"'Inter',sans-serif",marginTop:8,letterSpacing:2}}>NYSE: BLK · EIN: 32-0174431</div>
    </div>
  );
}

/* ════════════════════════════════════════
   ROOT APP
════════════════════════════════════════ */
function App(){
  const[splash,setSplash]=useState(true);
  const[page,setPage]=useState("home");
  const[toast,setToast]=useState(null);
  const[lang,setLang]=useState("ar");
  const[user,setUser]=useState(()=>{
    const s=loadUser();
    if(s)return s;
    const u={...DEFAULT_USER,joinDate:nowDateFull(),joinTimestamp:Date.now()};
    saveUser(u);return u;
  });

  // Auto-save user
  useEffect(()=>{if(!splash)saveUser(user);},[user]);

  // Update active days
  useEffect(()=>{
    if(!splash){
      const today=todayStr();
      if((user.lastActiveDay||"")!==today){
        setUser(u=>{const nu={...u,activeDays:u.activeDays+1,lastActiveDay:today};saveUser(nu);return nu;});
      }
    }
  },[splash]);

  const showToast=useCallback((msg,type)=>setToast({msg,type:type||"info",id:Date.now()}),[]);
  const unread=(user.notifications||[]).filter(n=>!n.read).length;

  function renderPage(){
    if(page==="home")return<HomePage user={user} setUser={setUser} setPage={setPage} showToast={showToast}/>;
    if(page==="tasks")return<TasksPage user={user} setUser={setUser} showToast={showToast}/>;
    if(page==="upgrades")return<UpgradesPage user={user} setUser={setUser} showToast={showToast}/>;
    if(page==="profile")return<ProfilePage user={user} setUser={setUser} showToast={showToast} lang={lang} setLang={setLang}/>;
  }

  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#030303",position:"relative",overflow:"hidden"}}>
      {splash&&<Splash onDone={()=>setSplash(false)}/>}
      {toast&&<Toast key={toast.id} msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      {!splash&&<div style={{overflowY:"auto",maxHeight:"100vh",paddingBottom:0}}>{renderPage()}</div>}
      {!splash&&<BottomNav page={page} setPage={setPage} unread={unread}/>}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
